  Page.Processing = {
    _cullRecs: [],
    _processing: [],
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1FA93; Processing</div></div>' +
        '<div id="processing-board">'+loadingHTML()+'</div>';
    },
    start: function(){
      this._load();
      addInterval(this._load.bind(this), 30000);
    },
    stop: function(){},
    _load: async function(){
      var bl = await API.get('/api/bloodlines');
      if(bl) _bloodlines = bl;
      var birds = await API.get('/api/birds');
      if(birds) _birds = birds;
      this._cullRecs = await API.get('/api/flock/cull-recommendations') || [];
      this._processing = await API.get('/api/processing') || [];
      this._renderBoard();
    },
    _renderBoard: function(){
      var el = document.getElementById('processing-board');
      if(!el) return;

      // Separate processing into scheduled and completed
      var scheduled = this._processing.filter(function(p){ return p.status === 'Scheduled'; });
      var completed = this._processing.filter(function(p){ return p.status === 'Completed'; });

      // Filter cull recs to exclude birds already in processing
      var processedBirdIds = {};
      this._processing.forEach(function(p){ processedBirdIds[p.bird_id] = true; });
      var recommended = this._cullRecs.filter(function(r){ return !processedBirdIds[r.bird_id]; });

      var html = '<div class="kanban">';

      // Recommended column
      html += '<div class="kanban-col">';
      html += '<div class="kanban-col-header" style="color:var(--warning)">&#x26A0;&#xFE0F; Recommended <span class="col-count">'+recommended.length+'</span></div>';
      if(recommended.length === 0){
        html += '<div class="no-data" style="padding:.5rem;font-size:.8rem">No recommendations</div>';
      }
      recommended.forEach(function(r){
        var bird = findBird(r.bird_id);
        var reason = formatCullReason(r.reason);
        html += '<div class="kanban-card">';
        html += '<div class="kanban-card-header">';
        if(bird) html += bandDot(bird.band_color, 12)+' ';
        html += birdLink(r.bird_id);
        if(bird) html += ' <span style="font-size:.72rem;color:#888">'+bloodlineName(bird.bloodline_id)+'</span>';
        html += '</div>';
        html += '<div class="kanban-card-reason">'+reason+'</div>';
        html += '<div class="kanban-card-actions"><button class="btn-primary" style="font-size:.72rem;padding:.2rem .5rem" onclick="Page.Processing.scheduleFromRec('+r.bird_id+',\''+reason.replace(/'/g,"\\'")+'\')">Schedule</button></div>';
        html += '</div>';
      });
      html += '</div>';

      // Scheduled column
      html += '<div class="kanban-col">';
      html += '<div class="kanban-col-header" style="color:var(--blue)">&#x1F4C5; Scheduled <span class="col-count">'+scheduled.length+'</span></div>';
      if(scheduled.length === 0){
        html += '<div class="no-data" style="padding:.5rem;font-size:.8rem">Nothing scheduled</div>';
      }
      scheduled.forEach(function(p){
        var bird = findBird(p.bird_id);
        html += '<div class="kanban-card">';
        html += '<div class="kanban-card-header">';
        if(bird) html += bandDot(bird.band_color, 12)+' ';
        html += birdLink(p.bird_id);
        if(bird) html += ' <span style="font-size:.72rem;color:#888">'+bloodlineName(bird.bloodline_id)+'</span>';
        html += '</div>';
        html += '<div class="kanban-card-reason">'+(p.reason||'&mdash;')+'</div>';
        html += '<div class="kanban-card-date">Scheduled: '+(p.scheduled_date||'&mdash;')+'</div>';
        html += '<div class="kanban-card-actions"><button class="btn-primary" style="font-size:.72rem;padding:.2rem .5rem" onclick="Page.Processing.markCompleted('+p.id+','+p.bird_id+')">Complete</button></div>';
        html += '</div>';
      });
      html += '</div>';

      // Completed column
      html += '<div class="kanban-col">';
      html += '<div class="kanban-col-header" style="color:var(--safe)">&#x2705; Completed <span class="col-count">'+completed.length+'</span></div>';
      if(completed.length === 0){
        html += '<div class="no-data" style="padding:.5rem;font-size:.8rem">No completed records</div>';
      }
      completed.slice(0, 20).forEach(function(p){
        var bird = findBird(p.bird_id);
        html += '<div class="kanban-card" style="opacity:.8">';
        html += '<div class="kanban-card-header">';
        if(bird) html += bandDot(bird.band_color, 12)+' ';
        html += birdLink(p.bird_id);
        html += '</div>';
        html += '<div class="kanban-card-reason">'+(p.reason||'&mdash;')+'</div>';
        if(p.final_weight_grams) html += '<div class="kanban-card-date">Final: '+p.final_weight_grams.toFixed(0)+'g</div>';
        html += '<div class="kanban-card-date">'+(p.processed_date||'&mdash;')+'</div>';
        html += '</div>';
      });
      html += '</div>';

      html += '</div>';
      el.innerHTML = html;
    },

    scheduleFromRec: async function(birdId, reason){
      var today = new Date().toISOString().split('T')[0];
      var result = await API.post('/api/processing', {
        bird_id: birdId,
        reason: reason,
        scheduled_date: today,
        status: 'Scheduled'
      });
      if(result){ toast('Bird #'+birdId+' scheduled for processing'); }
      else { toast('Failed to schedule','error'); }
      this._load();
    },

    markCompleted: async function(procId, birdId){
      var today = new Date().toISOString().split('T')[0];
      var result = await API.put('/api/processing/'+procId, {
        status: 'Completed',
        processed_date: today
      });
      if(result){
        toast('Bird #'+birdId+' processing completed');
        // Also mark bird as Culled
        await API.put('/api/birds/'+birdId, {status: 'Culled'});
      } else {
        toast('Failed to complete','error');
      }
      this._load();
    }
  };

  /* ---------------------------------------------------------
     CAMERAS PAGE
     --------------------------------------------------------- */
  Page.Cameras = {
    _cameras: [],
    _summaries: {},
    _lastFrames: {},
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1F3A5; Cameras</div><button class="btn-primary" onclick="Page.Cameras.openModal()">+ Add Camera</button></div>' +
        '<div id="cameras-list">'+loadingHTML()+'</div>';
    },
    start: function(){
      this._load();
      addInterval(this._load.bind(this), 30000);
    },
    stop: function(){},
    _load: async function(){
      var cams = await API.get('/api/cameras');
      if(cams) this._cameras = cams; else this._cameras = [];

      var self = this;
      var promises = this._cameras.map(async function(cam){
        var summary = await API.get('/api/cameras/'+cam.id+'/detections/summary');
        if(summary) self._summaries[cam.id] = summary; else self._summaries[cam.id] = [];
        var frames = await API.get('/api/frames?camera_id='+cam.id+'&minutes=1440');
        if(frames && frames.length>0) self._lastFrames[cam.id] = frames[0];
        else self._lastFrames[cam.id] = null;
      });
      await Promise.all(promises);
      this._renderList();
    },
    _renderList: function(){
      var el = document.getElementById('cameras-list');
      if(!el) return;
      if(this._cameras.length===0){
        el.innerHTML = emptyState('&#x1F3A5;','No cameras registered yet','+ Add Camera','Page.Cameras.openModal()');
        return;
      }
      var self = this;
      var html='<div class="camera-grid">';
      this._cameras.forEach(function(cam){
        var statusCls = cam.status==='Active'?'active':'offline';
        var lastFrame = self._lastFrames[cam.id];
        var lastTs = lastFrame ? lastFrame.timestamp.replace('T',' ').substring(0,16) : 'No captures';
        var lastStage = lastFrame ? lastFrame.life_stage : '';

        html+='<div class="camera-card">';
        html+='<div class="camera-card-header"><h4>'+cam.name+'</h4><span class="camera-status-badge '+statusCls+'">'+cam.status+'</span></div>';
        html+='<div class="camera-meta"><span>'+cam.location+'</span><span>'+cam.feed_url+'</span></div>';
        html+='<div class="camera-feed-placeholder">Live feed &mdash; connect Pi to enable</div>';
        html+='<div class="camera-meta"><span>Last capture: '+lastTs+'</span>';
        if(lastStage) html+='<span>Stage: '+lastStage+'</span>';
        html+='</div>';

        var summary = self._summaries[cam.id] || [];
        if(summary.length>0){
          var maxCount = Math.max.apply(null, summary.map(function(s){return s.count}));
          html+='<div class="detection-summary"><div class="detection-summary-title">Recent Detections</div>';
          summary.forEach(function(s){
            var pct = maxCount>0 ? (s.count/maxCount)*100 : 0;
            html+='<div class="detection-bar">';
            html+='<span class="detection-bar-label">'+s.label+'</span>';
            html+='<div style="flex:1;background:var(--beige);border-radius:3px;height:6px"><div class="detection-bar-fill" style="width:'+pct.toFixed(0)+'%"></div></div>';
            html+='<span class="detection-bar-count">'+s.count+' ('+(s.avg_confidence*100).toFixed(0)+'%)</span>';
            html+='</div>';
          });
          html+='</div>';
        } else {
          html+='<div class="no-data" style="padding:.4rem;font-size:.8rem">No detections yet</div>';
        }
        html+='</div>';
      });
      html+='</div>';
      el.innerHTML=html;
    },
    openModal: function(){
      var html = '<div class="modal-overlay" id="cam-modal-overlay" onclick="if(event.target===this)Page.Cameras.closeModal()">' +
        '<div class="modal"><h3>Add Camera</h3>' +
        '<label>Name</label><input id="mc-cam-name" type="text" placeholder="e.g. Brooder Cam">' +
        '<label>Location</label><input id="mc-cam-loc" type="text" placeholder="e.g. Brooder 1, Pen A">' +
        '<label>Feed URL</label><input id="mc-cam-url" type="text" placeholder="e.g. http://192.168.1.50:8080/video">' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Cameras.closeModal()">Cancel</button><button class="btn-primary" onclick="Page.Cameras.submitCamera()">Add Camera</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeModal: function(){
      var ov = document.getElementById('cam-modal-overlay');
      if(ov) ov.remove();
    },
    submitCamera: async function(){
      var name = document.getElementById('mc-cam-name').value.trim();
      var loc = document.getElementById('mc-cam-loc').value.trim();
      var url = document.getElementById('mc-cam-url').value.trim();
      if(!name || !loc || !url){ toast('All fields are required','error'); return; }
      var result = await API.post('/api/cameras', {
        name: name, location: loc, feed_url: url, status: 'Active'
      });
      this.closeModal();
      if(result) toast('Camera "'+name+'" added');
      else toast('Failed to add camera','error');
      this._load();
    }
  };

  /* ---------------------------------------------------------
     NURSERY PAGE
     --------------------------------------------------------- */
  Page.Nursery = {
    _groups: [],
    render: function(app){
      app.innerHTML = '<div class="page-top-bar"><h2>Nursery</h2><button class="btn-primary" onclick="Page.Nursery.openCreateModal()">+ New Group</button></div>' +
        '<div id="nursery-list">'+loadingHTML()+'</div>';
    },
    start: function(){ this._load(); },
    stop: function(){},
    _load: async function(){
      this._groups = await API.get('/api/chick-groups') || [];
      this._renderList();
    },
    _renderList: function(){
      var el = document.getElementById('nursery-list');
      if(!el) return;
      if(this._groups.length === 0){
        el.innerHTML = emptyState('&#x1F424;','No chick groups yet','+ New Group','Page.Nursery.openCreateModal()');
        return;
      }
      var now = new Date();
      var html = '<div class="clutch-grid">';
      this._groups.forEach(function(g){
        var hatchD = new Date(g.hatch_date+'T00:00:00');
        var ageDays = Math.floor((now - hatchD) / 86400000);
        var mortalityPct = g.initial_count > 0 ? ((g.initial_count - g.current_count) / g.initial_count * 100) : 0;
        var blName = bloodlineName(g.bloodline_id);
        var statusCls = g.status === 'Active' ? 'active' : g.status === 'Graduated' ? 'sold' : 'deceased';

        html += '<div class="clutch-card'+(g.status !== 'Active' ? ' muted' : '')+'">';
        html += '<div class="clutch-card-body">';
        html += '<h4>Group #'+g.id+(blName ? ' &mdash; '+blName : '')+' <span class="status-badge '+statusCls+'">'+g.status+'</span></h4>';

        html += '<div class="clutch-egg-counts">';
        html += '<span><span class="egg-num">'+g.current_count+'/'+g.initial_count+'</span><span class="egg-lbl">Chicks</span></span>';
        html += '<span><span class="egg-num">'+ageDays+'d</span><span class="egg-lbl">Age</span></span>';
        html += '<span><span class="egg-num">'+mortalityPct.toFixed(0)+'%</span><span class="egg-lbl">Mortality</span></span>';
        html += '</div>';

        html += '<div style="font-size:.85rem;color:#888;margin:.4rem 0">';
        html += 'Hatched: '+g.hatch_date;
        if(g.brooder_id) html += ' &bull; Brooder #'+g.brooder_id;
        if(g.clutch_id) html += ' &bull; Clutch #'+g.clutch_id;
        html += '</div>';

        if(g.status === 'Active'){
          html += '<div class="clutch-actions">';
          html += '<button class="status-btn" onclick="Page.Nursery.openMortalityModal('+g.id+')">Log Mortality</button>';
          if(ageDays >= 28){
            html += '<button class="btn-primary" onclick="Page.Nursery.openGraduateModal('+g.id+')">Band This Group</button>';
          } else {
            html += '<button class="btn-secondary" disabled title="Available at 28+ days (currently '+ageDays+'d)">Band ('+ageDays+'/28d)</button>';
          }
          html += '</div>';
        }

        html += '</div></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    },
    openCreateModal: async function(){
      var bloodlines = await API.get('/api/bloodlines') || [];
      var brooders = await API.get('/api/brooders') || [];
      var blOpts = ''; bloodlines.forEach(function(bl){ blOpts += '<option value="'+bl.id+'">'+bl.name+'</option>'; });
      var brOpts = '<option value="">-- None --</option>';
      brooders.forEach(function(b){ brOpts += '<option value="'+b.id+'">'+b.name+'</option>'; });
      var today = new Date().toISOString().split('T')[0];
      var html = '<div class="modal-overlay" id="nursery-modal-overlay" onclick="if(event.target===this)Page.Nursery.closeModal()">' +
        '<div class="modal"><h3>New Chick Group</h3>' +
        '<label>Bloodline</label><select id="mn-bloodline">'+blOpts+'</select>' +
        '<label>Chick Count</label><input id="mn-count" type="number" min="1" value="12">' +
        '<label>Hatch Date</label><input id="mn-hatch" type="date" value="'+today+'">' +
        '<label>Brooder</label><select id="mn-brooder">'+brOpts+'</select>' +
        '<label>Notes</label><textarea id="mn-notes" placeholder="Optional"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Nursery.closeModal()">Cancel</button><button class="btn-primary" onclick="Page.Nursery.submitCreate()">Create</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeModal: function(){
      var ov = document.getElementById('nursery-modal-overlay');
      if(ov) ov.remove();
    },
    submitCreate: async function(){
      var bloodline = parseInt(document.getElementById('mn-bloodline').value);
      var count = parseInt(document.getElementById('mn-count').value);
      var hatch = document.getElementById('mn-hatch').value;
      var brooder = document.getElementById('mn-brooder').value;
      var notes = document.getElementById('mn-notes').value.trim() || null;
      if(!bloodline || !count || !hatch){ toast('Bloodline, count, and hatch date required','error'); return; }
      var result = await API.post('/api/chick-groups', {
        bloodline_id: bloodline, initial_count: count, hatch_date: hatch,
        brooder_id: brooder ? parseInt(brooder) : null, clutch_id: null, notes: notes
      });
      this.closeModal();
      if(result) toast('Chick group #'+result.id+' created');
      else toast('Failed to create group','error');
      this._load();
    },
    openMortalityModal: function(id){
      var html = '<div class="modal-overlay" id="mort-modal-overlay" onclick="if(event.target===this)Page.Nursery.closeMortalityModal()">' +
        '<div class="modal"><h3>Log Mortality &mdash; Group #'+id+'</h3>' +
        '<label>Count Lost</label><input id="mm-count" type="number" min="1" value="1">' +
        '<label>Reason</label><input id="mm-reason" type="text" placeholder="e.g. found dead, weak, etc.">' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Nursery.closeMortalityModal()">Cancel</button><button class="btn-primary" onclick="Page.Nursery.submitMortality('+id+')">Log</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeMortalityModal: function(){
      var ov = document.getElementById('mort-modal-overlay');
      if(ov) ov.remove();
    },
    submitMortality: async function(id){
      var count = parseInt(document.getElementById('mm-count').value);
      var reason = document.getElementById('mm-reason').value.trim();
      if(!count || !reason){ toast('Count and reason required','error'); return; }
      var result = await API.put('/api/chick-groups/'+id+'/mortality', {count: count, reason: reason});
      this.closeMortalityModal();
      if(result) toast(count+' mortality logged');
      else toast('Failed to log mortality','error');
      this._load();
    },
    openGraduateModal: async function(id){
      var group = this._groups.find(function(g){ return g.id === id; });
      if(!group) return;
      var n = group.current_count;
      var rows = '';
      for(var i=0; i<n; i++){
        rows += '<tr>' +
          '<td>'+(i+1)+'</td>' +
          '<td><select class="grad-sex"><option value="Unknown">Unknown</option><option value="Male">Male</option><option value="Female">Female</option></select></td>' +
          '<td><input type="text" class="grad-band" placeholder="Band color"></td>' +
          '<td><input type="text" class="grad-nfc" placeholder="NFC tag (optional)"></td>' +
          '<td><input type="text" class="grad-notes" placeholder="Notes"></td>' +
          '</tr>';
      }
      var html = '<div class="modal-overlay" id="grad-modal-overlay" onclick="if(event.target===this)Page.Nursery.closeGraduateModal()">' +
        '<div class="modal" style="max-width:700px"><h3>Band Group #'+id+' &mdash; '+n+' Chicks</h3>' +
        '<div style="background:var(--beige);padding:.6rem;border-radius:8px;margin-bottom:.75rem;font-size:.85rem">' +
        '<strong>Quick fill:</strong> Mark remaining as ' +
        '<select id="qf-sex"><option value="Female">Female</option><option value="Male">Male</option><option value="Unknown">Unknown</option></select>' +
        ' with band color <input id="qf-band" type="text" style="width:80px" placeholder="color"> ' +
        '<button class="status-btn" onclick="Page.Nursery._quickFill()">Apply</button></div>' +
        '<div style="max-height:350px;overflow-y:auto"><table class="data-table" style="width:100%"><thead><tr><th>#</th><th>Sex</th><th>Band</th><th>NFC</th><th>Notes</th></tr></thead>' +
        '<tbody id="grad-tbody">'+rows+'</tbody></table></div>' +
        '<div id="grad-error" style="color:var(--dusty-rose);font-size:.85rem;margin-top:.4rem"></div>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Nursery.closeGraduateModal()">Cancel</button><button class="btn-primary" onclick="Page.Nursery.submitGraduate('+id+')">Graduate &amp; Create Birds</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeGraduateModal: function(){
      var ov = document.getElementById('grad-modal-overlay');
      if(ov) ov.remove();
    },
    _quickFill: function(){
      var sex = document.getElementById('qf-sex').value;
      var band = document.getElementById('qf-band').value.trim();
      var rows = document.querySelectorAll('#grad-tbody tr');
      rows.forEach(function(row){
        var sexSel = row.querySelector('.grad-sex');
        var bandInp = row.querySelector('.grad-band');
        if(sexSel.value === 'Unknown') sexSel.value = sex;
        if(!bandInp.value && band) bandInp.value = band;
      });
    },
    submitGraduate: async function(id){
      var errEl = document.getElementById('grad-error');
      var rows = document.querySelectorAll('#grad-tbody tr');
      var birds = [];
      var maleBands = [];
      var hasDup = false;
      rows.forEach(function(row){
        var sex = row.querySelector('.grad-sex').value;
        var band = row.querySelector('.grad-band').value.trim() || null;
        var nfc = row.querySelector('.grad-nfc').value.trim() || null;
        var notes = row.querySelector('.grad-notes').value.trim() || null;
        birds.push({sex: sex, band_color: band, nfc_tag_id: nfc, notes: notes});
        if(sex === 'Male' && band){
          if(maleBands.indexOf(band) >= 0) hasDup = true;
          maleBands.push(band);
        }
      });
      if(hasDup){
        if(errEl) errEl.textContent = 'Duplicate band colors among males! Each male needs a unique band.';
        return;
      }
      var result = await API.put('/api/chick-groups/'+id+'/graduate', {birds: birds});
      this.closeGraduateModal();
      if(result){
        toast('Graduated '+birds.length+' birds!');
        Router.navigate('#/flock');
      } else {
        toast('Graduation failed','error');
        this._load();
      }
    }
  };

  /* ---------------------------------------------------------
     NFC SCAN PAGE
     --------------------------------------------------------- */
  Page.NfcScan = {
    render: function(app){
      var isHttps = location.protocol === 'https:';
      var hasWebNfc = 'NDEFReader' in window;
      var html = '<div class="page-top-bar"><h2>NFC Tag Scanner</h2></div>';
      html += '<div class="panel"><div class="panel-body" style="text-align:center;padding:2rem">';
      if(!isHttps){
        var httpsUrl = 'https://' + location.hostname + ':3443' + location.pathname + location.hash;
        html += '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:1rem;margin-bottom:1.5rem;color:#856404">';
        html += '<strong>HTTPS Required for NFC</strong><br>';
        html += 'For NFC scanning, access this page at<br><a href="'+httpsUrl+'" style="color:#0d6efd;word-break:break-all">'+httpsUrl+'</a><br>from your Android phone.';
        html += '<br><small style="color:#888">You may need to accept the self-signed certificate warning.</small>';
        html += '</div>';
      }
      if(isHttps && hasWebNfc){
        html += '<p>Tap an NFC tag to look up the bird.</p>';
        html += '<button class="btn-primary" id="nfc-scan-btn" onclick="Page.NfcScan.startScan()">Start Scanning</button>';
        html += '<div id="nfc-scan-status" style="margin-top:1rem"></div>';
      } else if(isHttps && !hasWebNfc){
        html += '<p style="color:#888">Web NFC is not available in this browser.<br>Requires Android Chrome.</p>';
      }
      html += '<hr style="margin:1.5rem 0">';
      html += '<p>Or enter a tag ID manually:</p>';
      html += '<div style="display:flex;gap:.5rem;justify-content:center;align-items:center;flex-wrap:wrap">';
      html += '<input type="text" id="nfc-manual-input" placeholder="NFC Tag ID" style="width:200px">';
      html += '<button class="btn-primary" onclick="Page.NfcScan.manualLookup()">Look Up</button>';
      html += '</div>';
      html += '<div id="nfc-result" style="margin-top:1.5rem"></div>';
      html += '</div></div>';
      app.innerHTML = html;
    },
    start: function(){},
    stop: function(){},
    startScan: async function(){
      try {
        var ndef = new NDEFReader();
        await ndef.scan();
        document.getElementById('nfc-scan-status').textContent = 'Scanning... hold tag to device';
        ndef.addEventListener('reading', function(event){
          var records = event.message.records;
          var tagId = '';
          for(var i=0;i<records.length;i++){
            if(records[i].recordType === 'text'){
              var dec = new TextDecoder();
              tagId = dec.decode(records[i].data);
              break;
            }
          }
          if(!tagId) tagId = event.serialNumber || '';
          if(tagId) Page.NfcScan._lookup(tagId);
        });
      } catch(e) {
        document.getElementById('nfc-scan-status').innerHTML = '<span style="color:var(--dusty-rose)">Scan error: '+e.message+'</span>';
      }
    },
    manualLookup: function(){
      var tag = document.getElementById('nfc-manual-input').value.trim();
      if(!tag){ toast('Enter a tag ID','error'); return; }
      this._lookup(tag);
    },
    _lookup: async function(tagId){
      var resultEl = document.getElementById('nfc-result');
      if(resultEl) resultEl.innerHTML = loadingHTML();
      var bird = await API.get('/api/nfc/'+encodeURIComponent(tagId));
      if(bird){
        toast('Found bird #'+bird.id);
        Router.navigate('#/flock/bird/'+bird.id);
      } else {
        if(resultEl) resultEl.innerHTML = '<div style="color:var(--dusty-rose)">No bird found with NFC tag "'+tagId+'"</div>';
      }
    }
  };

  Page.Settings = {
    _backups: [],
    render: function(app){
      app.innerHTML = '<div class="page-top-bar"><h2>Settings</h2></div>' +
        '<div class="panel"><div class="panel-header"><span class="panel-header-left">&#x1F4BE; Database Backups</span></div><div class="panel-body">' +
        '<button class="btn-primary" onclick="Page.Settings.createBackup()" style="margin-bottom:1rem">Create Backup Now</button>' +
        '<div id="backup-list">'+loadingHTML()+'</div>' +
        '</div></div>';
    },
    start: function(){ this._load(); },
    stop: function(){},
    _load: async function(){
      this._backups = await API.get('/api/backups') || [];
      this._renderList();
    },
    _renderList: function(){
      var el = document.getElementById('backup-list');
      if(!el) return;
      if(this._backups.length === 0){
        el.innerHTML = '<div class="no-data">No backups yet. Create one to protect your data.</div>';
        return;
      }
      var html = '<table class="data-table"><thead><tr><th>Filename</th><th>Size</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
      this._backups.forEach(function(b){
        var sizeKB = (b.size_bytes / 1024).toFixed(1);
        var created = b.created ? b.created.split('T')[0]+' '+b.created.split('T')[1].substring(0,5) : '';
        html += '<tr><td>'+b.filename+'</td><td>'+sizeKB+' KB</td><td>'+created+'</td>';
        html += '<td><button class="status-btn" onclick="Page.Settings.confirmRestore(\''+b.filename+'\')">Restore</button></td></tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    },
    createBackup: async function(){
      var result = await API.post('/api/backup', {});
      if(result) toast('Backup created: '+result.filename);
      else toast('Backup failed','error');
      this._load();
    },
    confirmRestore: function(filename){
      var html = '<div class="modal-overlay" id="restore-modal-overlay" onclick="if(event.target===this)Page.Settings.closeRestore()">' +
        '<div class="modal"><h3>Restore Backup?</h3>' +
        '<p>This will replace the current database with <strong>'+filename+'</strong>.</p>' +
        '<p style="color:var(--dusty-rose)">A pre-restore backup will be created automatically. The server must be restarted after restore.</p>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Settings.closeRestore()">Cancel</button><button class="btn-danger" onclick="Page.Settings.doRestore(\''+filename+'\')">Restore</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeRestore: function(){
      var ov = document.getElementById('restore-modal-overlay');
      if(ov) ov.remove();
    },
    doRestore: async function(filename){
      var result = await API.post('/api/restore', {filename: filename});
      this.closeRestore();
      if(result !== null) toast('Database restored. Restart server to apply.');
      else toast('Restore failed','error');
    }
  };

  /* =========================================================
     Boot
     ========================================================= */
  Router.init();
})();
