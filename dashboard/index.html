    _buildWeightChart: function(){
      var weights = this._weights.slice().sort(function(a,b){
        return new Date(a.date) - new Date(b.date);
      });
      if(weights.length === 0) return '';

      var W = 380, H = 180, padL = 45, padR = 15, padT = 15, padB = 30;
      var chartW = W - padL - padR;
      var chartH = H - padT - padB;

      var vals = weights.map(function(w){ return w.weight_grams; });
      var minVal = Math.min.apply(null, vals);
      var maxVal = Math.max.apply(null, vals);
      var range = maxVal - minVal || 10;
      minVal = Math.max(0, minVal - range*0.1);
      maxVal = maxVal + range*0.1;
      range = maxVal - minVal;

      var dates = weights.map(function(w){ return new Date(w.date+'T00:00:00'); });
      var minDate = dates[0].getTime();
      var maxDate = dates[dates.length-1].getTime();
      var dateRange = maxDate - minDate || 1;

      var points = [];
      weights.forEach(function(w, i){
        var x = padL + ((dates[i].getTime() - minDate) / dateRange) * chartW;
        var y = padT + (1 - (w.weight_grams - minVal) / range) * chartH;
        points.push({x:x, y:y, val:w.weight_grams, date:w.date});
      });

      var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';

      // Grid lines
      var gridSteps = 4;
      for(var i=0; i<=gridSteps; i++){
        var gy = padT + (i/gridSteps)*chartH;
        var gVal = maxVal - (i/gridSteps)*range;
        svg += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#e0d8d0" stroke-width="0.5"/>';
        svg += '<text x="'+(padL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-size="8" fill="#aaa">'+gVal.toFixed(0)+'g</text>';
      }

      // Axis
      svg += '<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(H-padB)+'" stroke="#ccc" stroke-width="1"/>';
      svg += '<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#ccc" stroke-width="1"/>';

      // Date labels
      if(weights.length > 1){
        svg += '<text x="'+padL+'" y="'+(H-padB+14)+'" font-size="7" fill="#aaa">'+weights[0].date+'</text>';
        svg += '<text x="'+(W-padR)+'" y="'+(H-padB+14)+'" text-anchor="end" font-size="7" fill="#aaa">'+weights[weights.length-1].date+'</text>';
      }

      // Area fill
      if(points.length > 1){
        var areaPath = 'M'+points[0].x+','+points[0].y;
        for(var i=1;i<points.length;i++) areaPath+=' L'+points[i].x+','+points[i].y;
        areaPath += ' L'+points[points.length-1].x+','+(H-padB)+' L'+points[0].x+','+(H-padB)+' Z';
        svg += '<path d="'+areaPath+'" fill="rgba(183,196,160,0.2)"/>';
      }

      // Line
      if(points.length > 1){
        var linePath = 'M'+points[0].x+','+points[0].y;
        for(var i=1;i<points.length;i++) linePath+=' L'+points[i].x+','+points[i].y;
        svg += '<path d="'+linePath+'" fill="none" stroke="var(--sage)" stroke-width="2" stroke-linejoin="round"/>';
      }

      // Points
      points.forEach(function(p){
        svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="3.5" fill="var(--sage)" stroke="#fff" stroke-width="1.5"><title>'+p.date+': '+p.val.toFixed(1)+'g</title></circle>';
      });

      svg += '</svg>';
      return svg;
    },

    _buildGrowthMetrics: function(){
      var weights = this._weights.slice().sort(function(a,b){
        return new Date(a.date) - new Date(b.date);
      });
      var currentWeight = weights.length > 0 ? weights[weights.length-1].weight_grams : null;
      var avgDailyGain = '&mdash;';
      var daysToBW = '&mdash;';
      var butcherWeight = 200; // grams

      if(weights.length >= 2){
        var first = weights[0];
        var last = weights[weights.length-1];
        var days = daysBetween(new Date(first.date+'T00:00:00'), new Date(last.date+'T00:00:00'));
        if(days > 0){
          var gain = (last.weight_grams - first.weight_grams) / days;
          avgDailyGain = gain.toFixed(1) + 'g';
          if(gain > 0 && currentWeight < butcherWeight){
            daysToBW = Math.ceil((butcherWeight - currentWeight) / gain);
          } else if(currentWeight >= butcherWeight){
            daysToBW = 'Ready';
          }
        }
      }

      var html = '<div class="growth-metrics">';
      html += '<div class="gm-card"><div class="gm-val">'+(currentWeight ? currentWeight.toFixed(1)+'g' : '&mdash;')+'</div><div class="gm-lbl">Current Weight</div></div>';
      html += '<div class="gm-card"><div class="gm-val">'+avgDailyGain+'</div><div class="gm-lbl">Avg Daily Gain</div></div>';
      html += '<div class="gm-card"><div class="gm-val">'+daysToBW+'</div><div class="gm-lbl">Days to 200g</div></div>';
      html += '<div class="gm-card"><div class="gm-val">'+weights.length+'</div><div class="gm-lbl">Weight Records</div></div>';
      html += '</div>';
      return html;
    },

    openWeightModal: function(){
      var today = new Date().toISOString().split('T')[0];
      var html = '<div class="modal-overlay" id="weight-modal-overlay" onclick="if(event.target===this)Page.BirdDetail.closeWeightModal()">' +
        '<div class="modal"><h3>Log Weight for Bird #'+this._birdId+'</h3>' +
        '<label>Weight (grams)</label><input id="mw-weight" type="number" step="0.1" min="0" placeholder="e.g. 185.5">' +
        '<label>Date</label><input id="mw-date" type="date" value="'+today+'">' +
        '<label>Notes (optional)</label><textarea id="mw-notes" placeholder="Optional notes"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.BirdDetail.closeWeightModal()">Cancel</button><button class="btn-primary" onclick="Page.BirdDetail.submitWeight()">Save</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeWeightModal: function(){
      var ov = document.getElementById('weight-modal-overlay');
      if(ov) ov.remove();
    },
    submitWeight: async function(){
      var weight = parseFloat(document.getElementById('mw-weight').value);
      var date = document.getElementById('mw-date').value;
      var notes = document.getElementById('mw-notes').value.trim() || null;
      if(isNaN(weight) || !date){ toast('Weight and date are required','error'); return; }
      var result = await API.post('/api/birds/'+this._birdId+'/weight', {
        weight_grams: weight,
        date: date,
        notes: notes
      });
      this.closeWeightModal();
      if(result){ toast('Weight logged: '+weight+'g'); }
      else { toast('Failed to log weight','error'); }
      this._load();
    },
    updateStatus: async function(status){
      await API.put('/api/birds/'+this._birdId, {status: status});
      toast('Bird #'+this._birdId+' marked as '+status);
      this._load();
    },
    scheduleProcessing: async function(){
      var today = new Date().toISOString().split('T')[0];
      var result = await API.post('/api/processing', {
        bird_id: this._birdId,
        reason: 'Manual',
        scheduled_date: today,
        status: 'Scheduled'
      });
      if(result){ toast('Bird #'+this._birdId+' scheduled for processing'); }
      else { toast('Failed to schedule processing','error'); }
    }
  };

  /* ---------------------------------------------------------
     CLUTCH PAGE
     --------------------------------------------------------- */
  Page.Clutches = {
    _clutches: [],
    _groups: [],
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1F95A; Clutches</div><button class="btn-primary" onclick="Page.Clutches.openModal()">+ Add Clutch</button></div>' +
        '<div id="clutch-timeline-section"></div>' +
        '<div id="clutch-list">'+loadingHTML()+'</div>';
    },
    start: function(){
      this._load();
      addInterval(this._load.bind(this), 60000);
    },
    stop: function(){},
    _load: async function(){
      var bl = await API.get('/api/lineages');
      if(bl) _lineages = bl;
      var groups = await API.get('/api/breeding-groups');
      if(groups) this._groups = groups;
      var data = await API.get('/api/clutches');
      if(data) this._clutches = data;
      this._renderTimeline();
      this._renderList();
    },

    _renderTimeline: function(){
      var el = document.getElementById('clutch-timeline-section');
      if(!el) return;
      var incubating = this._clutches.filter(function(c){ return c.status==='Incubating'; });
      if(incubating.length===0){ el.innerHTML=''; return; }

      var now = new Date();
      // Find date range
      var allDates = [];
      incubating.forEach(function(c){
        allDates.push(new Date(c.set_date+'T00:00:00'));
        allDates.push(new Date(c.expected_hatch_date+'T00:00:00'));
      });
      var minDate = new Date(Math.min.apply(null, allDates));
      var maxDate = new Date(Math.max.apply(null, allDates));
      // Add 1 day padding
      minDate.setDate(minDate.getDate() - 1);
      maxDate.setDate(maxDate.getDate() + 1);
      var totalDays = daysBetween(minDate, maxDate);
      if(totalDays < 1) totalDays = 1;

      var barHeight = 26;
      var barGap = 6;
      var totalH = incubating.length * (barHeight + barGap) + 22;

      var html = '<div class="timeline-wrap"><h3>Incubation Timeline</h3>';
      html += '<div class="timeline-gantt" style="height:'+totalH+'px;position:relative">';

      // Today line
      var todayPct = ((now - minDate) / (maxDate - minDate)) * 100;
      if(todayPct >= 0 && todayPct <= 100){
        html += '<div class="timeline-today" style="left:'+todayPct.toFixed(1)+'%"><span class="timeline-today-label">Today</span></div>';
      }

      incubating.forEach(function(c, i){
        var setD = new Date(c.set_date+'T00:00:00');
        var hatchD = new Date(c.expected_hatch_date+'T00:00:00');
        var leftPct = ((setD - minDate) / (maxDate - minDate)) * 100;
        var widthPct = ((hatchD - setD) / (maxDate - minDate)) * 100;
        var elapsed = Math.max(0, (now - setD) / 86400000);
        var pct = Math.min(100, (elapsed/17)*100);
        var bg = pct >= 70 ? 'var(--dusty-rose)' : pct >= 40 ? 'var(--warning)' : 'var(--sage)';
        var top = 22 + i * (barHeight + barGap);
        var blName = lineageName(c.lineage_id);
        html += '<div class="timeline-gantt-bar" style="left:'+leftPct.toFixed(1)+'%;width:'+Math.max(widthPct,3).toFixed(1)+'%;top:'+top+'px;height:'+barHeight+'px;background:'+bg+'" title="Clutch #'+c.id+(blName?' - '+escapeHtml(blName):'')+'">';
        html += '#'+c.id;
        html += '</div>';
      });

      // Date axis
      html += '</div>';
      html += '<div class="timeline-date-axis"><span>'+minDate.toISOString().split('T')[0]+'</span><span>'+maxDate.toISOString().split('T')[0]+'</span></div>';
      html += '</div>';

      el.innerHTML = html;
    },

    _renderList: function(){
      var el = document.getElementById('clutch-list');
      if(!el) return;
      if(this._clutches.length===0){
        el.innerHTML = emptyState('&#x1F95A;','No clutches yet','+ Add Clutch','Page.Clutches.openModal()');
        return;
      }
      var now = new Date();
      var html='<div class="clutch-grid">';

      var sorted = this._clutches.slice().sort(function(a,b){
        if(a.status==='Incubating' && b.status!=='Incubating') return -1;
        if(a.status!=='Incubating' && b.status==='Incubating') return 1;
        return b.id - a.id;
      });

      sorted.forEach(function(c){
        var isIncubating = c.status==='Incubating';
        var muted = isIncubating ? '' : ' muted';
        var setD = new Date(c.set_date+'T00:00:00');
        var hatchD = new Date(c.expected_hatch_date+'T00:00:00');
        var elapsed = Math.max(0,(now-setD)/86400000);
        var day = Math.min(Math.floor(elapsed), 17);
        var pct = Math.min(100,(elapsed/17)*100);

        var blName = lineageName(c.lineage_id);
        var eggs = c.eggs_set;
        var fertile = c.eggs_fertile!=null ? c.eggs_fertile : '?';
        var hatched = c.eggs_hatched!=null ? c.eggs_hatched : '?';

        // Ring color
        var ringColor = pct >= 70 ? 'var(--dusty-rose)' : pct >= 40 ? 'var(--warning)' : 'var(--sage)';
        var circumference = 2 * Math.PI * 40; // r=40
        var dashLen = isIncubating ? (pct / 100) * circumference : circumference;

        html += '<div class="clutch-card'+muted+'">';

        // Ring
        html += '<div class="clutch-ring-wrap">';
        html += '<svg viewBox="0 0 100 100" width="80" height="80">';
        html += '<circle cx="50" cy="50" r="40" fill="none" stroke="#e0d8d0" stroke-width="7"/>';
        html += '<circle cx="50" cy="50" r="40" fill="none" stroke="'+ringColor+'" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+dashLen.toFixed(1)+' '+circumference.toFixed(1)+'" transform="rotate(-90 50 50)"/>';
        if(isIncubating){
          html += '<text x="50" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="var(--charcoal)">'+day+'</text>';
          html += '<text x="50" y="62" text-anchor="middle" font-size="9" fill="#aaa">of 17</text>';
        } else {
          html += '<text x="50" y="54" text-anchor="middle" font-size="11" font-weight="600" fill="#aaa">'+c.status+'</text>';
        }
        html += '</svg></div>';

        // Body
        html += '<div class="clutch-card-body">';
        html += '<h4>Clutch #'+c.id+(blName ? ' &mdash; '+escapeHtml(blName) : '')+'</h4>';
        if(c.breeding_group_name){
          html += '<div style="font-size:.78rem;color:var(--sage-dark);margin:-.2rem 0 .35rem">Group: '+escapeHtml(c.breeding_group_name)+'</div>';
        }

        // Egg counts
        html += '<div class="clutch-egg-counts">';
        html += '<span><span class="egg-num">'+eggs+'</span><span class="egg-lbl">Set</span></span>';
        html += '<span><span class="egg-num">'+fertile+'</span><span class="egg-lbl">Fertile</span></span>';
        html += '<span><span class="egg-num">'+hatched+'</span><span class="egg-lbl">Hatched</span></span>';
        html += '</div>';

        // Key dates
        if(isIncubating){
          var candleDate = addDays(c.set_date, 7);
          var lockdownDate = addDays(c.set_date, 14);
          var hatchDate = c.expected_hatch_date;
          var events = [
            {name:'Set', date:c.set_date, past: now >= setD},
            {name:'Candle', date:candleDate, past: now >= new Date(candleDate+'T00:00:00')},
            {name:'Lockdown', date:lockdownDate, past: now >= new Date(lockdownDate+'T00:00:00')},
            {name:'Hatch', date:hatchDate, past: now >= hatchD}
          ];
          // Find next upcoming
          var nextIdx = -1;
          for(var i=0;i<events.length;i++){
            if(!events[i].past){ nextIdx = i; break; }
          }
          html += '<div class="clutch-dates">';
          events.forEach(function(ev, idx){
            var cls = idx === nextIdx ? ' highlight' : '';
            html += '<span class="'+cls+'" style="margin-right:.6rem">'+(idx===nextIdx?'&#x25B6; ':'')+ev.name+': '+ev.date+'</span>';
          });
          html += '</div>';

          html += '<div class="clutch-actions">';
          html += '<button class="status-btn" onclick="event.stopPropagation();Page.Clutches.showCandling('+c.id+')">Record Candling</button>';
          html += '<button class="status-btn" onclick="event.stopPropagation();Page.Clutches.showHatch('+c.id+')">Record Hatch</button>';
          html += '</div>';
          html += '<div id="clutch-inline-'+c.id+'"></div>';
        }

        // Hatch metrics for hatched clutches
        if(c.status === 'Hatched' && c.eggs_hatched != null){
          html += '<div class="hatch-metrics">';
          var fertile = c.eggs_fertile != null ? c.eggs_fertile : c.eggs_set;
          var fertilityRate = (fertile / c.eggs_set * 100);
          var hatchOfFertile = fertile > 0 ? (c.eggs_hatched / fertile * 100) : 0;
          var fcls = fertilityRate >= 80 ? 'metric-good' : fertilityRate >= 60 ? 'metric-warn' : 'metric-bad';
          var hcls = hatchOfFertile >= 75 ? 'metric-good' : hatchOfFertile >= 55 ? 'metric-warn' : 'metric-bad';
          html += '<span class="'+fcls+'">Fertility: '+fertilityRate.toFixed(0)+'%</span>';
          html += '<span class="'+hcls+'">Hatch: '+hatchOfFertile.toFixed(0)+'%</span>';
          if(c.eggs_stillborn) html += '<span class="metric-bad">Stillborn: '+c.eggs_stillborn+'</span>';
          if(c.eggs_quit) html += '<span class="metric-warn">Quit: '+c.eggs_quit+'</span>';
          if(c.eggs_infertile) html += '<span>Infertile: '+c.eggs_infertile+'</span>';
          if(c.eggs_damaged) html += '<span>Damaged: '+c.eggs_damaged+'</span>';
          html += '</div>';
        }

        html += '</div></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    },

    showCandling: function(id){
      var el = document.getElementById('clutch-inline-'+id);
      if(!el) return;
      el.innerHTML='<div class="inline-form"><label>Fertile eggs</label><input type="number" id="candle-count-'+id+'" min="0"><button class="btn-primary" onclick="Page.Clutches.recordCandling('+id+')">Save</button><button class="btn-cancel" onclick="document.getElementById(\'clutch-inline-'+id+'\').innerHTML=\'\'">Cancel</button></div>';
    },
    showHatch: function(id){
      var clutch = this._clutches.find(function(c){ return c.id === id; });
      var eggs = clutch ? clutch.eggs_set : 0;
      var fertile = clutch && clutch.eggs_fertile != null ? clutch.eggs_fertile : '';
      var html = '<div class="modal-overlay" id="hatch-modal-overlay" onclick="if(event.target===this)Page.Clutches.closeHatchModal()">' +
        '<div class="modal"><h3>Record Hatch &mdash; Clutch #'+id+'</h3>' +
        '<label>Hatched Count</label><input id="mh-hatched" type="number" min="0" max="'+eggs+'" placeholder="How many chicks?">' +
        '<label>Stillborn</label><input id="mh-stillborn" type="number" min="0" value="0">' +
        '<label>Quit (died in shell)</label><input id="mh-quit" type="number" min="0" value="0">' +
        '<label>Infertile (clear eggs)</label><input id="mh-infertile" type="number" min="0" value="'+(fertile || 0)+'">' +
        '<label>Damaged</label><input id="mh-damaged" type="number" min="0" value="0">' +
        '<label>Hatch Notes</label><textarea id="mh-notes" placeholder="Optional notes about the hatch"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Clutches.closeHatchModal()">Cancel</button><button class="btn-primary" onclick="Page.Clutches.submitHatch('+id+')">Record Hatch</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeHatchModal: function(){
      var ov = document.getElementById('hatch-modal-overlay');
      if(ov) ov.remove();
    },
    recordCandling: async function(id){
      var count = parseInt(document.getElementById('candle-count-'+id).value);
      if(isNaN(count)) return;
      var result = await API.put('/api/clutches/'+id, {eggs_fertile: count});
      if(result) toast('Candling recorded: '+count+' fertile');
      this._load();
    },
    submitHatch: async function(id){
      var hatched = parseInt(document.getElementById('mh-hatched').value);
      if(isNaN(hatched)){ toast('Hatched count is required','error'); return; }
      var stillborn = parseInt(document.getElementById('mh-stillborn').value) || 0;
      var quit = parseInt(document.getElementById('mh-quit').value) || 0;
      var infertile = parseInt(document.getElementById('mh-infertile').value) || 0;
      var damaged = parseInt(document.getElementById('mh-damaged').value) || 0;
      var notes = document.getElementById('mh-notes').value.trim() || null;

      var body = {
        eggs_hatched: hatched, status: 'Hatched',
        eggs_stillborn: stillborn, eggs_quit: quit,
        eggs_infertile: infertile, eggs_damaged: damaged,
        hatch_notes: notes
      };

      var clutch = this._clutches.find(function(c){ return c.id === id; });
      // If fertile not set yet, compute from remaining
      if(clutch && clutch.eggs_fertile == null){
        body.eggs_fertile = clutch.eggs_set - infertile;
      }

      var result = await API.put('/api/clutches/'+id, body);
      this.closeHatchModal();
      if(result){
        toast('Hatch recorded: '+hatched+' chicks!');
        // Offer to create chick group if hatched > 0
        if(hatched > 0 && clutch){
          this._showChickGroupPrompt(id, hatched, clutch.lineage_id);
        } else {
          this._load();
        }
      }
    },
    _showChickGroupPrompt: async function(clutchId, hatched, lineageId){
      var brooders = await API.get('/api/brooders') || [];
      var brOpts = '<option value="">-- No brooder --</option>';
      brooders.forEach(function(b){
        brOpts += '<option value="'+b.id+'">'+b.name+' ('+b.life_stage+')</option>';
      });
      var html = '<div class="modal-overlay" id="chickgroup-prompt-overlay" onclick="if(event.target===this)Page.Clutches.closeChickGroupPrompt()">' +
        '<div class="modal"><h3>Create Chick Group?</h3>' +
        '<p>'+hatched+' chicks hatched from Clutch #'+clutchId+'. Create a nursery group to track them?</p>' +
        '<label>Assign to Brooder</label><select id="mcg-brooder">'+brOpts+'</select>' +
        '<input type="hidden" id="mcg-clutch" value="'+clutchId+'">' +
        '<input type="hidden" id="mcg-count" value="'+hatched+'">' +
        '<input type="hidden" id="mcg-lineage" value="'+(lineageId||'')+'">' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Clutches.closeChickGroupPrompt()">Skip</button><button class="btn-primary" onclick="Page.Clutches.submitChickGroup()">Create Group</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeChickGroupPrompt: function(){
      var ov = document.getElementById('chickgroup-prompt-overlay');
      if(ov) ov.remove();
      this._load();
    },
    submitChickGroup: async function(){
      var clutchId = parseInt(document.getElementById('mcg-clutch').value);
      var count = parseInt(document.getElementById('mcg-count').value);
      var lineage = parseInt(document.getElementById('mcg-lineage').value);
      var brooder = document.getElementById('mcg-brooder').value;
      var today = new Date().toISOString().split('T')[0];

      if(!lineage){ toast('Clutch has no lineage — set it first','error'); return; }

      var body = {
        clutch_id: clutchId,
        lineage_id: lineage,
        brooder_id: brooder ? parseInt(brooder) : null,
        initial_count: count,
        hatch_date: today,
        notes: null
      };
      var result = await API.post('/api/chick-groups', body);
      this.closeChickGroupPrompt();
      if(result){
        toast('Chick group #'+result.id+' created with '+count+' chicks!');
        Router.navigate('#/nursery');
      } else {
        toast('Failed to create chick group','error');
        this._load();
      }
    },
    openModal: function(){
      var blOpts = '<option value="">-- None --</option>';
      _lineages.forEach(function(bl){
        blOpts+='<option value="'+bl.id+'">'+bl.name+'</option>';
      });
      // Breeding group options (optional — the group is the male × females cross).
      var grpOpts = '<option value="">-- None --</option>';
      this._groups.forEach(function(g){
        grpOpts+='<option value="'+g.id+'">'+escapeHtml(g.name)+'</option>';
      });
      var today = new Date().toISOString().split('T')[0];
      var html = '<div class="modal-overlay" id="clutch-modal-overlay" onclick="if(event.target===this)Page.Clutches.closeModal()">' +
        '<div class="modal"><h3>Add Clutch</h3>' +
        '<label>Breeding Group</label><select id="mc-group">'+grpOpts+'</select>' +
        '<label>Lineage</label><select id="mc-lineage">'+blOpts+'</select>' +
        '<label>Eggs Set</label><input id="mc-eggs" type="number" min="1" value="12">' +
        '<label>Set Date</label><input id="mc-date" type="date" value="'+today+'">' +
        '<label>Notes</label><textarea id="mc-notes" placeholder="Optional notes"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Clutches.closeModal()">Cancel</button><button class="btn-primary" onclick="Page.Clutches.submitClutch()">Add Clutch</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeModal: function(){
      var ov = document.getElementById('clutch-modal-overlay');
      if(ov) ov.remove();
    },
    submitClutch: async function(){
      var group = document.getElementById('mc-group').value;
      var lineage = document.getElementById('mc-lineage').value;
      var eggs = parseInt(document.getElementById('mc-eggs').value);
      var setDate = document.getElementById('mc-date').value;
      var notes = document.getElementById('mc-notes').value.trim() || null;

      if(!eggs || !setDate){ toast('Eggs count and set date are required','error'); return; }

      var result = await API.post('/api/clutches', {
        breeding_group_id: group ? parseInt(group) : null,
        lineage_id: lineage ? parseInt(lineage) : null,
        eggs_set: eggs, eggs_fertile: null, eggs_hatched: null,
        set_date: setDate, status: 'Incubating', notes: notes
      });
      this.closeModal();
      if(result) toast('Clutch #'+result.id+' created');
      else toast('Failed to create clutch','error');
      this._load();
    }
  };

  Page.Breeding = {
    _tab: 'groups',
    _groups: [],
    _suggestions: [],
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1F48D; Breeding</div></div>' +
        '<div class="tabs">' +
          '<div class="tab active" id="tab-groups" onclick="Page.Breeding.switchTab(\'groups\')">Groups</div>' +
          '<div class="tab" id="tab-suggestions" onclick="Page.Breeding.switchTab(\'suggestions\')">Pair Suggestions</div>' +
        '</div>' +
        '<div id="breeding-content">'+loadingHTML()+'</div>';
    },
    start: function(){
      this._tab = 'groups';
      this._load();
      addInterval(this._load.bind(this), 60000);
    },
    stop: function(){},
    _load: async function(){
      var bl = await API.get('/api/lineages');
      if(bl) _lineages = bl;
      var birds = await API.get('/api/birds');
      if(birds) _birds = birds;
      this._groups = await API.get('/api/breeding-groups') || [];
      this._suggestions = await API.get('/api/breeding/suggest') || [];
      this._renderContent();
    },
    switchTab: function(tab){
      this._tab = tab;
      document.getElementById('tab-groups').classList.toggle('active', tab==='groups');
      document.getElementById('tab-suggestions').classList.toggle('active', tab==='suggestions');
      this._renderContent();
    },
    _renderContent: function(){
      var el = document.getElementById('breeding-content');
      if(!el) return;
      if(this._tab === 'groups') this._renderGroups(el);
      else this._renderSuggestions(el);
    },
    _renderGroups: function(el){
      if(this._groups.length === 0){
        el.innerHTML = emptyState('&#x1F48D;','No breeding groups yet','','');
        return;
      }
      var html = '';
      this._groups.forEach(function(g){
        var males = g.male_ids || [];
        var isInfertile = g.status === 'infertile' || males.length === 0;
        var femaleCount = g.female_ids ? g.female_ids.length : 0;
        var ratioOk = femaleCount >= 3 && femaleCount <= 5;
        var ratioWarn = femaleCount >= 2 && femaleCount <= 6;
        var ratioCls = ratioOk ? 'good' : ratioWarn ? 'warn' : 'bad';
        var ratioText = '1:'+femaleCount;

        html += '<div class="breed-group-card'+(isInfertile ? ' infertile' : '')+'">';
        html += '<h4>'+escapeHtml(g.name);
        if(isInfertile){
          html += ' <span class="infertile-badge">Infertile</span>';
        } else {
          html += ' <span class="ratio-badge '+ratioCls+'">'+ratioText+'</span>';
        }
        html += '</h4>';

        // Male(s) — the junction can hold more than one.
        html += '<div style="font-size:.78rem;color:#888;margin-bottom:.3rem">'+(males.length > 1 ? 'MALES' : 'MALE')+'</div>';
        html += '<div class="breed-birds">';
        if(males.length > 0){
          males.forEach(function(mid){
            var male = findBird(mid);
            if(male){
              html += '<span class="breed-bird-chip">'+bandDot(male.band_color, 10)+' '+birdLink(male.id)+' <span style="color:#888;font-size:.72rem">'+formatLineages(male.lineages)+'</span></span>';
            } else {
              html += '<span class="breed-bird-chip">'+birdLink(mid)+'</span>';
            }
          });
        } else {
          html += '<span style="font-size:.8rem;color:#c77800;font-style:italic">No male assigned &mdash; group is infertile</span>';
        }
        html += '</div>';

        // Females
        html += '<div style="font-size:.78rem;color:#888;margin:.4rem 0 .3rem">FEMALES</div>';
        html += '<div class="breed-birds">';
        if(g.female_ids && g.female_ids.length > 0){
          g.female_ids.forEach(function(fid){
            var fb = findBird(fid);
            if(fb){
              html += '<span class="breed-bird-chip">'+bandDot(fb.band_color, 10)+' '+birdLink(fb.id)+' <span style="color:#888;font-size:.72rem">'+formatLineages(fb.lineages)+'</span></span>';
            } else {
              html += '<span class="breed-bird-chip">'+birdLink(fid)+'</span>';
            }
          });
        } else {
          html += '<span style="font-size:.8rem;color:#aaa;font-style:italic">No females assigned</span>';
        }
        html += '</div>';

        if(g.start_date) html += '<div style="font-size:.72rem;color:#aaa;margin-top:.4rem">Started: '+g.start_date+'</div>';
        html += '</div>';
      });
      el.innerHTML = html;
    },
    _renderSuggestions: function(el){
      if(this._suggestions.length === 0){
        el.innerHTML = emptyState('&#x1F48D;','Need at least 1 male and 1 female for pairing suggestions','','');
        return;
      }
      var safest = this._suggestions.filter(function(p){return p.safe}).slice(0,10);
      var risky = this._suggestions.filter(function(p){return !p.safe}).slice(0,5);
      var html = '';

      if(safest.length > 0){
        html += '<div style="font-size:.78rem;color:#999;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em;font-weight:600">Safe Pairings</div>';
        safest.forEach(function(p){
          var mBird = findBird(p.male_id);
          var fBird = findBird(p.female_id);
          html += '<div class="pair-row safe-pair">';
          html += '<div class="pair-info">';
          if(mBird) html += bandDot(mBird.band_color, 12)+' ';
          html += birdLink(p.male_id, 'Male #'+p.male_id);
          if(mBird) html += ' <span style="font-size:.75rem;color:#888">'+formatLineages(mBird.lineages)+'</span>';
          html += ' &times; ';
          if(fBird) html += bandDot(fBird.band_color, 12)+' ';
          html += birdLink(p.female_id, 'Female #'+p.female_id);
          if(fBird) html += ' <span style="font-size:.75rem;color:#888">'+formatLineages(fBird.lineages)+'</span>';
          html += '</div>';
          html += '<span class="coeff safe">'+p.coefficient.toFixed(3)+'</span>';
          html += '</div>';
        });
      }

      if(risky.length > 0){
        html += '<div style="font-size:.78rem;color:#999;margin:.8rem 0 .4rem;text-transform:uppercase;letter-spacing:.04em;font-weight:600">Risky Pairings</div>';
        risky.forEach(function(p){
          var mBird = findBird(p.male_id);
          var fBird = findBird(p.female_id);
          html += '<div class="pair-row risky-pair">';
          html += '<div class="pair-info">';
          if(mBird) html += bandDot(mBird.band_color, 12)+' ';
          html += birdLink(p.male_id, 'Male #'+p.male_id);
          if(mBird) html += ' <span style="font-size:.75rem;color:#888">'+formatLineages(mBird.lineages)+'</span>';
          html += ' &times; ';
          if(fBird) html += bandDot(fBird.band_color, 12)+' ';
          html += birdLink(p.female_id, 'Female #'+p.female_id);
          if(fBird) html += ' <span style="font-size:.75rem;color:#888">'+formatLineages(fBird.lineages)+'</span>';
          html += '</div>';
          html += '<span class="coeff risky">'+p.coefficient.toFixed(3)+'</span>';
          html += '</div>';
        });
      }

      if(!html) html = '<div class="no-data">No pair data available</div>';
      el.innerHTML = html;
    }
  };

  Page.Processing = {
    _flockStats: null,
    _processing: [],
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1FA93; Processing</div></div>' +
        '<div id="processing-board">'+loadingHTML()+'</div>';
    },
    start: function(){
      this._load();
      addInterval(this._load.bind(this), 30000);
    },
    stop: function(){},
    _load: async function(){
      var bl = await API.get('/api/lineages');
      if(bl) _lineages = bl;
      var birds = await API.get('/api/birds');
      if(birds) _birds = birds;
      // The cull-recommendations endpoint now returns a flock-stats snapshot
      // rather than a prescribed list — the cull workflow moved to the
      // Android Flock screen's Cull Mode. We fetch the stats just to render
      // a small breeding-capacity summary at the top of the board.
      this._flockStats = await API.get('/api/flock/cull-recommendations');
      this._processing = await API.get('/api/processing') || [];
      this._renderBoard();
    },
    _renderBoard: function(){
      var el = document.getElementById('processing-board');
      if(!el) return;

      var scheduled = this._processing.filter(function(p){ return p.status === 'Scheduled'; });
      var completed = this._processing.filter(function(p){ return p.status === 'Completed'; });

      var html = '';
      // Breeding-capacity summary banner. Replaces the old "Recommended"
      // kanban column — there's no prescribed list any more; the user picks
      // cull candidates manually via the Android app's Cull Mode.
      if(this._flockStats){
        var s = this._flockStats;
        var safeColor = s.safe_to_cull > 0 ? 'var(--safe)' : 'var(--warning)';
        html +=
          '<div class="panel" style="margin-bottom:1rem"><div class="panel-body" style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:.9rem">' +
          '<div><strong>'+s.total_males+'</strong> male'+(s.total_males===1?'':'s')+'</div>' +
          '<div><strong>'+s.total_females+'</strong> female'+(s.total_females===1?'':'s')+'</div>' +
          '<div>Minimum needed: <strong>'+s.minimum_males_needed+'</strong></div>' +
          '<div>Safe to cull: <strong style="color:'+safeColor+'">'+s.safe_to_cull+'</strong></div>' +
          '</div></div>';
      }

      html += '<div class="kanban">';

      // Scheduled column
      html += '<div class="kanban-col">';
      html += '<div class="kanban-col-header" style="color:var(--blue)">&#x1F4C5; Scheduled <span class="col-count">'+scheduled.length+'</span></div>';
      if(scheduled.length === 0){
        html += '<div class="no-data" style="padding:.5rem;font-size:.8rem">Nothing scheduled</div>';
      }
      scheduled.forEach(function(p){
        var bird = findBird(p.bird_id);
        html += '<div class="kanban-card">';
        html += '<div class="kanban-card-header">';
        if(bird) html += bandDot(bird.band_color, 12)+' ';
        html += birdLink(p.bird_id);
        if(bird) html += ' <span style="font-size:.72rem;color:#888">'+formatLineages(bird.lineages)+'</span>';
        html += '</div>';
        html += '<div class="kanban-card-reason">'+escapeHtml(p.reason||'—')+'</div>';
        html += '<div class="kanban-card-date">Scheduled: '+(p.scheduled_date||'&mdash;')+'</div>';
        html += '<div class="kanban-card-actions"><button class="btn-primary" style="font-size:.72rem;padding:.2rem .5rem" onclick="Page.Processing.markCompleted('+p.id+','+p.bird_id+')">Complete</button></div>';
        html += '</div>';
      });
      html += '</div>';

      // Completed column
      html += '<div class="kanban-col">';
      html += '<div class="kanban-col-header" style="color:var(--safe)">&#x2705; Completed <span class="col-count">'+completed.length+'</span></div>';
      if(completed.length === 0){
        html += '<div class="no-data" style="padding:.5rem;font-size:.8rem">No completed records</div>';
      }
      completed.slice(0, 20).forEach(function(p){
        var bird = findBird(p.bird_id);
        html += '<div class="kanban-card" style="opacity:.8">';
        html += '<div class="kanban-card-header">';
        if(bird) html += bandDot(bird.band_color, 12)+' ';
        html += birdLink(p.bird_id);
        html += '</div>';
        html += '<div class="kanban-card-reason">'+escapeHtml(p.reason||'—')+'</div>';
        if(p.final_weight_grams) html += '<div class="kanban-card-date">Final: '+p.final_weight_grams.toFixed(0)+'g</div>';
        html += '<div class="kanban-card-date">'+(p.processed_date||'&mdash;')+'</div>';
        html += '</div>';
      });
      html += '</div>';

      html += '</div>';
      el.innerHTML = html;
    },

    scheduleFromRec: async function(birdId, reason){
      var today = new Date().toISOString().split('T')[0];
      var result = await API.post('/api/processing', {
        bird_id: birdId,
        reason: reason,
        scheduled_date: today,
        status: 'Scheduled'
      });
      if(result){ toast('Bird #'+birdId+' scheduled for processing'); }
      else { toast('Failed to schedule','error'); }
      this._load();
    },

    markCompleted: async function(procId, birdId){
      var today = new Date().toISOString().split('T')[0];
      var result = await API.put('/api/processing/'+procId, {
        status: 'Completed',
        processed_date: today
      });
      if(result){
        toast('Bird #'+birdId+' processing completed');
        // Also mark bird as Culled
        await API.put('/api/birds/'+birdId, {status: 'Culled'});
      } else {
        toast('Failed to complete','error');
      }
      this._load();
    }
  };

        html+='<div class="camera-card-header"><h4>'+escapeHtml(b.name)+' Camera</h4><div style="display:flex;align-items:center;gap:.4rem"><span class="camera-status-badge active" id="cam-status-'+b.id+'">Live</span><button class="camera-settings-btn" onclick="Page.Cameras.editUrl('+b.id+')" title="Camera settings">&#x2699;</button></div></div>';

        html+='<div class="camera-feed" id="cam-feed-'+b.id+'"><img src="'+escapeHtml(streamUrl)+'" alt="'+escapeHtml(b.name)+' feed" style="width:100%;max-height:400px;object-fit:contain;min-height:200px"></div>';

        // Housing-type-aware headcount (eggs / chicks / birds), matching the
        // Dashboard page so `_pollHeadcount` reads consistent data-attrs.
        var camHousing = (b.housing_type || 'brooder').toLowerCase();

    submitGraduate: async function(id){
      var errEl = document.getElementById('grad-error');
      var rows = document.querySelectorAll('#grad-tbody tr');
      var birds = [];
      var maleBands = [];
      var hasDup = false;
      rows.forEach(function(row){
        var sex = row.querySelector('.grad-sex').value;
        var band = row.querySelector('.grad-band').value.trim() || null;
        var nfc = row.querySelector('.grad-nfc').value.trim() || null;
        var notes = row.querySelector('.grad-notes').value.trim() || null;
        birds.push({sex: sex, band_color: band, nfc_tag_id: nfc, notes: notes});
        if(sex === 'Male' && band){
          if(maleBands.indexOf(band) >= 0) hasDup = true;
          maleBands.push(band);
        }
      });
      if(hasDup){
        if(errEl) errEl.textContent = 'Duplicate band colors among males! Each male needs a unique band.';

      // Issue #14: include the optional hutch destination. Empty string means

      // Backend is POST (not PUT — pre-existing bug fixed as part of #14).

  Page.NfcScan = {
    _ac: null, /* active AbortController — one operation at a time */

    _cancelActive: function(){
      if(this._ac){ this._ac.abort(); this._ac = null; }
    },

    _generateTagId: function(){
      var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      var code = '';
      for(var i=0;i<6;i++) code += chars.charAt(Math.floor(Math.random()*chars.length));
      return 'QUAIL-' + code;
    },
    _loadLineages: async function(){
      var bl = await API.get('/api/lineages');
      if(bl) _lineages = bl;
      var sel = document.getElementById('nfc-lineage');
      if(!sel) return;
      var opts = '';
      _lineages.forEach(function(b){ opts+='<option value="'+b.id+'">'+b.name+'</option>'; });
      sel.innerHTML = opts;
    },
    _getRecordBytes: function(record){
      if(!record.data) return new Uint8Array(0);
      /* DataView: respect byteOffset + byteLength to avoid reading outside the view */
      if(record.data.buffer) return new Uint8Array(record.data.buffer, record.data.byteOffset, record.data.byteLength);
      return new Uint8Array(record.data);
    },
    _decodeNfcText: function(record){
      if(record.recordType === 'text'){
        /* Web NFC API already strips the NDEF language prefix —
           record.data contains only the text payload */
        var bytes = Page.NfcScan._getRecordBytes(record);
        if(bytes.length === 0) return '';
        return new TextDecoder(record.encoding || 'utf-8').decode(bytes);
      }
      if(record.recordType === 'url'){
        var bytes = Page.NfcScan._getRecordBytes(record);
        var url = new TextDecoder().decode(bytes);
        var match = url.match(/QUAIL-[A-Z0-9]{6}/);
        return match ? match[0] : url;
      }
      return '';
    },
    _decodeAllRecords: function(records){
      for(var i=0;i<records.length;i++){
        var decoded = Page.NfcScan._decodeNfcText(records[i]);
        if(decoded) return decoded;
      }
      return '';
    },
    _bytesToHex: function(bytes, max){
      var hex = [];
      for(var i=0;i<Math.min(bytes.length,max||50);i++) hex.push(('0'+bytes[i].toString(16)).slice(-2));
      return hex.join(' ');
    },
    _buildDebugHtml: function(event){
      var records = event.message.records;
      var sn = event.serialNumber || '(none)';
      var h = '<div style="background:#f8f8f0;border:1px solid #d0c8c0;border-radius:8px;margin-top:.8rem;text-align:left;font-size:.78rem;overflow:hidden">';
      h += '<div onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\'" '
        + 'style="padding:.5rem .8rem;cursor:pointer;background:#eee8df;font-weight:600;user-select:none">'
        + 'Debug Info &#x25BC;</div>';
      h += '<div style="padding:.6rem .8rem;display:none;font-family:monospace;line-height:1.6;word-break:break-all">';
      h += '<b>serialNumber:</b> '+sn+'<br>';
      h += '<b>records.length:</b> '+records.length+'<br>';
      var finalTagId = Page.NfcScan._decodeAllRecords(records);
      for(var i=0;i<records.length;i++){
        var r = records[i];
        var bytes = Page.NfcScan._getRecordBytes(r);
        var decoded = Page.NfcScan._decodeNfcText(r);
        var rawStr = new TextDecoder().decode(bytes);
        var quailMatch = /^QUAIL-[A-Z0-9]{6}$/.test(decoded);
        h += '<hr style="border:none;border-top:1px dashed #ccc;margin:.4rem 0">';
        h += '<b>Record['+i+']</b><br>';
        h += '&nbsp; recordType: <code>'+r.recordType+'</code><br>';
        h += '&nbsp; mediaType: <code>'+(r.mediaType||'(none)')+'</code><br>';
        h += '&nbsp; encoding: <code>'+(r.encoding||'(none)')+'</code><br>';
        h += '&nbsp; lang: <code>'+(r.lang||'(none)')+'</code><br>';
        h += '&nbsp; data.byteLength: <code>'+bytes.length+'</code><br>';
        h += '&nbsp; raw hex: <code>'+Page.NfcScan._bytesToHex(bytes,50)+'</code><br>';
        h += '&nbsp; raw string: <code>"'+rawStr.substring(0,80)+'"</code><br>';
        if(r.recordType==='text'){
          h += '&nbsp; (Web NFC pre-parsed: lang=<code>"'+(r.lang||'')+ '"</code>, encoding=<code>"'+(r.encoding||'utf-8')+'"</code>)<br>';
        }
        h += '&nbsp; _decodeNfcText: <code>"'+decoded+'"</code><br>';
        h += '&nbsp; matches QUAIL pattern: <code>'+quailMatch+'</code><br>';
      }
      h += '<hr style="border:none;border-top:1px dashed #ccc;margin:.4rem 0">';
      h += '<b>Final tag ID:</b> <code>"'+finalTagId+'"</code>';
      if(!finalTagId) h += ' (fallback serialNumber: <code>'+sn+'</code>)';
      h += '<br>';
      h += '<b>Sent to API:</b> <code>/api/nfc/'+(finalTagId||sn)+'</code>';
      h += '</div></div>';
      return h;
    },

    /* Render countdown + cancel button into a status element.
       Returns { ac, cleanup } — caller awaits their NFC op, then calls cleanup(). */
    _timedStatus: function(statusEl, msg, seconds){
      this._cancelActive();
      var ac = new AbortController();
      this._ac = ac;
      var remaining = seconds;
      var timedOut = false;
      function render(){
        if(!statusEl) return;
        statusEl.innerHTML = '<span class="nfc-pulse">'+msg+' ('+remaining+'s)</span> '
          +'<button class="btn-cancel" style="padding:.2rem .6rem;font-size:.8rem;vertical-align:middle" '
          +'onclick="Page.NfcScan._cancelActive()">Cancel</button>';
      }
      render();
      var iv = setInterval(function(){
        remaining--;
        if(remaining<=0){ clearInterval(iv); timedOut=true; ac.abort(); }
        else render();
      },1000);
      return {
        ac:ac,
        timedOut:function(){ return timedOut; },
        cleanup:function(){ clearInterval(iv); }
      };
    },

    /* ========== Section 1: Scan ========== */
    startScan: async function(){
      var statusEl = document.getElementById('nfc-scan-status');
      var resultEl = document.getElementById('nfc-scan-result');
      var debugEl = document.getElementById('nfc-debug');
      if(resultEl) resultEl.innerHTML = '';
      if(debugEl) debugEl.innerHTML = '';
      var t = this._timedStatus(statusEl, 'Scanning\u2026 hold tag to device', 30);
      var ac = t.ac;
      try {
        var ndef = new NDEFReader();
        await ndef.scan({signal:ac.signal});
        /* Wait for exactly one reading event or abort */
        var event = await new Promise(function(resolve,reject){
          if(ac.signal.aborted){ reject(new DOMException('','AbortError')); return; }
          ndef.addEventListener('reading',function(e){resolve(e);},{once:true});
          ndef.addEventListener('readingerror',function(){resolve(null);},{once:true});
          ac.signal.addEventListener('abort',function(){reject(new DOMException('','AbortError'));});
        });
        t.cleanup();
        if(!event){
          if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">Could not read tag. Try repositioning.</span>';
          return;
        }
        /* Show debug info */
        if(debugEl) debugEl.innerHTML = Page.NfcScan._buildDebugHtml(event);
        var tagId = Page.NfcScan._decodeAllRecords(event.message.records);
        if(!tagId) tagId = event.serialNumber||'';
        if(!tagId){
          if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">Tag had no readable data.</span>';
          return;
        }
        if(statusEl) statusEl.innerHTML='<span style="color:var(--safe)">Read tag: <strong>'+escapeHtml(tagId)+'</strong></span>';
        if(/^QUAIL-[A-Z0-9]{6}$/.test(tagId)){
          Page.NfcScan._scanLookup(tagId);
        } else {
          if(resultEl) resultEl.innerHTML='<div style="color:#888;font-size:.85rem">Tag contains non-QuailSync data: "'+escapeHtml(tagId)+'"</div>';
        }
      } catch(e){
        t.cleanup();
        if(e.name==='AbortError'){
          var msg = t.timedOut() ? 'No tag detected \u2014 try again.' : 'Scan cancelled.';
          if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">'+msg+'</span>';
        } else {
          if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">Scan error: '+e.message+'</span>';
        }
      }
    },
    _scanLookup: async function(tagId){
      var resultEl = document.getElementById('nfc-scan-result');
      if(resultEl) resultEl.innerHTML = loadingHTML();
      var bird = await API.get('/api/nfc/'+encodeURIComponent(tagId));
      if(bird){
        toast('Found bird #'+bird.id);
        Router.navigate('#/flock/bird/'+bird.id);
      } else {
        if(resultEl){
          resultEl.innerHTML = '<div style="background:var(--beige);border:1px solid #d0c8c0;border-radius:8px;padding:1rem;text-align:left">'
            +'<p style="color:var(--dusty-rose);font-weight:600;margin-bottom:.5rem">Tag '+escapeHtml(tagId)+' is not linked to any bird in the system.</p>'
            +'<button class="btn-primary" style="font-size:.85rem;padding:.4rem .8rem" '
            +'onclick="Page.NfcScan._prefillRegisterForm(\''+escapeHtml(tagId)+'\')">Register New Bird with This Tag</button>'
            +'</div>';
        }
      }
    },
    manualLookup: function(){
      var tag = (document.getElementById('nfc-manual-input').value||'').trim();
      if(!tag){ toast('Enter a tag ID','error'); return; }

    /* ========== Section 2: Register ========== */
    _getFormValues: function(){
      return {
        tagId: (document.getElementById('nfc-tag-id').value||'').trim(),
        sex: document.getElementById('nfc-sex').value,
        band_color: (document.getElementById('nfc-band').value||'').trim()||null,

    _resetForm: function(){
      document.getElementById('nfc-tag-id').value = this._generateTagId();

    _buildBirdBody: function(v){
      return {
        nfc_tag_id:v.tagId, sex:v.sex, band_color:v.band_color,
        lineage_id:v.lineage_id, hatch_date:v.hatch_date,
        mother_id:null, father_id:null,
        generation:v.generation, status:'Active', notes:v.notes
      };
    },
    _postBird: async function(body, statusEl){
      try {
        var r = await fetch('/api/birds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(!r.ok){
          var errText = await r.text();
          console.error('POST /api/birds failed:',r.status,errText);
          if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">Server error ('+r.status+'): '+errText.substring(0,200)+'</span>';
          return null;
        }
        return await r.json();
      } catch(e){
        console.error('POST /api/birds exception:',e);
        if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">Network error: '+e.message+'</span>';
        return null;
      }
    },

    /* Write Tag & Create Bird — full flow.
       Critical: ndef.write() must be called directly from the button click
       handler (user gesture) with no intervening scan() calls. */
    writeAndCreate: async function(){
      var v = this._getFormValues();
      if(!v.lineage_id||!v.hatch_date){ toast('Lineage and hatch date are required','error'); return; }
      if(!v.tagId){ toast('Tag ID is required','error'); return; }
      var statusEl = document.getElementById('nfc-write-status');
      var btn = document.getElementById('nfc-write-btn');
      if(btn) btn.disabled = true;

      /* Step 1: write the tag — immediately from user gesture */
      console.log('[NFC] writeAndCreate: tagId=',v.tagId);
      var t = this._timedStatus(statusEl,'Hold tag to the back of your phone to write',30);
      try {
        var ndef = new NDEFReader();
        console.log('[NFC] calling ndef.write() with explicit text record...');
        await ndef.write(
          { records: [{ recordType: "text", data: v.tagId }] },
          { signal: t.ac.signal }
        );
        console.log('[NFC] ndef.write() resolved — tag written');
        t.cleanup();
      } catch(e){
        console.error('[NFC] ndef.write() failed:',e.name,e.message);
        t.cleanup();
        if(btn) btn.disabled = false;
        if(e.name==='AbortError'){
          var msg = t.timedOut() ? 'No tag detected \u2014 try again.' : 'Write cancelled.';
          if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">'+msg+'</span>';
        } else {
          if(statusEl) statusEl.innerHTML='<span style="color:var(--dusty-rose)">Tag write failed: '+e.message+'</span>';
        }
        return;
      }

      /* Step 2: verify by reading back (best-effort, won't block on failure) */
      if(statusEl) statusEl.innerHTML='<span class="nfc-pulse">Tag written! Verifying\u2026</span>';
      try {
        console.log('[NFC] starting verification read...');
        var vNdef = new NDEFReader();
        await vNdef.scan();
        var readBack = await new Promise(function(resolve){
          var vTimer = setTimeout(function(){ resolve(''); },5000);
          vNdef.addEventListener('reading',function(ev){
            clearTimeout(vTimer);
            resolve(Page.NfcScan._decodeAllRecords(ev.message.records));
          },{once:true});
          vNdef.addEventListener('readingerror',function(){
            clearTimeout(vTimer);
            resolve('');
          },{once:true});
        });
        console.log('[NFC] verification read result:',readBack);
        if(readBack===v.tagId){
          if(statusEl) statusEl.innerHTML='<span style="color:var(--safe)">Verified! Read back: <strong>'+escapeHtml(readBack)+'</strong></span>';
        } else if(readBack){
          if(statusEl) statusEl.innerHTML='<span style="color:var(--warning)">Written but read back "'+escapeHtml(readBack)+'" (expected "'+escapeHtml(v.tagId)+'")</span>';
        } else {
          if(statusEl) statusEl.innerHTML='<span style="color:var(--safe)">Tag written! (verification timed out \u2014 tag may have been removed)</span>';
        }
      } catch(e){
        console.log('[NFC] verification scan failed:',e.message,'(non-fatal)');
        if(statusEl) statusEl.innerHTML='<span style="color:var(--safe)">Tag written!</span>';
      }

      /* Step 3: create bird record */
      if(statusEl) statusEl.innerHTML+='<br><span style="color:var(--sage-dark)">Creating bird record\u2026</span>';
      console.log('[NFC] POSTing bird with nfc_tag_id:',v.tagId);
      var body = this._buildBirdBody(v);
      var result = await this._postBird(body,statusEl);
      if(btn) btn.disabled = false;
      if(result){
        console.log('[NFC] bird created, id:',result.id);
        toast('Bird #'+result.id+' created and tag written!');
        this._resetForm();
      } else {
        console.error('[NFC] bird creation failed');
        toast('Tag written but bird creation failed','error');
      }
    },

    createOnly: async function(){
      var v = this._getFormValues();
      if(!v.lineage_id||!v.hatch_date){ toast('Lineage and hatch date are required','error'); return; }
      if(!v.tagId){ toast('Tag ID is required','error'); return; }
      var statusEl = document.getElementById('nfc-write-status');
      if(statusEl) statusEl.innerHTML='<span style="color:var(--sage-dark)">Creating bird\u2026</span>';
      var body = this._buildBirdBody(v);
      var result = await this._postBird(body,statusEl);
      if(result){
        toast('Bird #'+result.id+' created! Write tag ID "'+v.tagId+'" to the physical tag manually.');
        this._resetForm();
      } else {
        toast('Failed to create bird','error');
      }
    }
  };

        return;
      }
      var resp = await API.put('/api/settings', {
        desired_males_per_group: males,
        max_females_per_male: maxF,
      });
      if(resp){
        this._breedingConfig = resp;
        toast('Breeding settings saved');
      } else {
        toast('Save failed','error');
      }
    },
    _renderList: function(){
      var el = document.getElementById('backup-list');
      if(!el) return;
      if(this._backups.length === 0){
        el.innerHTML = '<div class="no-data">No backups yet. Create one to protect your data.</div>';
        return;
      }
      var html = '<table class="data-table"><thead><tr><th>Filename</th><th>Size</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
      this._backups.forEach(function(b){
        var sizeKB = (b.size_bytes / 1024).toFixed(1);
        var created = b.created ? b.created.split('T')[0]+' '+b.created.split('T')[1].substring(0,5) : '';
        html += '<tr><td>'+b.filename+'</td><td>'+sizeKB+' KB</td><td>'+created+'</td>';
        html += '<td><button class="status-btn" onclick="Page.Settings.confirmRestore(\''+b.filename+'\')">Restore</button></td></tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    },
    createBackup: async function(){
      var result = await API.post('/api/backup', {});
      if(result) toast('Backup created: '+result.filename);
      else toast('Backup failed','error');
      this._load();
    },
    confirmRestore: function(filename){
      var html = '<div class="modal-overlay" id="restore-modal-overlay" onclick="if(event.target===this)Page.Settings.closeRestore()">' +
        '<div class="modal"><h3>Restore Backup?</h3>' +
        '<p>This will replace the current database with <strong>'+filename+'</strong>.</p>' +
        '<p style="color:var(--dusty-rose)">A pre-restore backup will be created automatically. The server must be restarted after restore.</p>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Settings.closeRestore()">Cancel</button><button class="btn-danger" onclick="Page.Settings.doRestore(\''+filename+'\')">Restore</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeRestore: function(){
      var ov = document.getElementById('restore-modal-overlay');
      if(ov) ov.remove();
    },
    doRestore: async function(filename){
      var result = await API.post('/api/restore', {filename: filename});
      this.closeRestore();
      if(result !== null) toast('Database restored. Restart server to apply.');
      else toast('Restore failed','error');
    }
  };

  /* ---------------------------------------------------------
     SENSORS (Govee temp/humidity sensor assignment)
     --------------------------------------------------------- */
  Page.Devices = {
    _tab: 'sensors',
    _sensors: [],
    _cameras: [],
    _brooders: [],
    render: function(app){
      app.innerHTML = '<div class="page-top-bar"><h2>Devices</h2></div>' +
        '<div class="tabs">' +
          '<div class="tab active" id="tab-devices-sensors" onclick="Page.Devices.switchTab(\'sensors\')">&#x1F321;&#xFE0F; Sensors</div>' +
          '<div class="tab" id="tab-devices-cameras" onclick="Page.Devices.switchTab(\'cameras\')">&#x1F4F7; Cameras</div>' +
        '</div>' +
        '<div class="panel">' +
          '<div class="panel-header"><span class="panel-header-left" id="devices-panel-title">&#x1F321;&#xFE0F; Govee Sensors</span>' +
          '<a class="view-all-link" onclick="Page.Devices._load()">Refresh</a></div>' +
          '<div class="panel-body" id="devices-body">'+loadingHTML()+'</div>' +
        '</div>';
    },
    // Lightweight DB-only GETs; auto-refresh every 60s (addInterval fires once now).
    start: function(){ this._tab = 'sensors'; var self = this; addInterval(function(){ self._load(); }, 60000); },
    stop: function(){},

    switchTab: function(tab){
      this._tab = tab;
      document.getElementById('tab-devices-sensors').classList.toggle('active', tab==='sensors');
      document.getElementById('tab-devices-cameras').classList.toggle('active', tab==='cameras');
      var title = document.getElementById('devices-panel-title');
      if(title) title.innerHTML = tab==='cameras' ? '&#x1F4F7; Trail Cameras' : '&#x1F321;&#xFE0F; Govee Sensors';
      this._render();
    },

    _load: async function(){
      var results = await Promise.all([
        API.get('/api/govee/sensors'),
        API.get('/api/trail-cameras'),
        API.get('/api/brooders'),
      ]);
      this._sensors = results[0] || [];
      this._cameras = results[1] || [];
      this._brooders = results[2] || [];
      // Best-effort last-photo timestamp per camera from the observations log.
      await Promise.all(this._cameras.map(async function(c){
        try {
          var latest = await API.get('/api/trailcam/latest/' + encodeURIComponent(c.spypoint_camera_id));
          c._lastPhoto = (latest && latest.timestamp) ? latest.timestamp : null;
        } catch(e){ c._lastPhoto = null; }
      }));
      this._render();
    },

    _brooderOptions: function(){
      return this._brooders.map(function(b){
        return '<option value="'+b.id+'">'+escapeHtml(b.name)+'</option>';
      }).join('');
    },

    _render: function(){
      var el = document.getElementById('devices-body');
      if(!el) return;
      if(this._tab === 'cameras') this._renderCameras(el);
      else this._renderSensors(el);
    },

    _renderSensors: function(el){
      if(!this._sensors.length){
        el.innerHTML = '<div class="no-data">No Govee sensors registered yet. They appear here automatically once the poller reports one.</div>';
        return;
      }
      var opts = this._brooderOptions();
      var hasBrooders = this._brooders.length > 0;

      var rows = this._sensors.map(function(s){
        var name = escapeHtml(s.name || s.govee_device_id || ('Sensor #'+s.id));
        var model = escapeHtml(s.model || '—');
        var r = s.latest_reading;
        var temp = r ? r.temperature_f.toFixed(1)+'°F' : '—';
        var hum = r ? r.humidity.toFixed(0)+'%' : '—';

        // Online indicator + >10-min warning derive from the same recency check.
        var stale = sensorIsStale(s.last_seen);
        var dot = stale ? 'var(--warning)' : 'var(--safe)';
        var statusText = stale ? ('No data &gt;'+SENSOR_STALE_MINUTES+'m') : 'Online';
        var statusHtml = '<span style="display:inline-flex;align-items:center;gap:.3rem">'
          + '<span style="width:9px;height:9px;border-radius:50%;background:'+dot+';display:inline-block"></span>'
          + '<span style="color:'+(stale?'var(--warning)':'#666')+'">'+statusText+'</span></span>';

        var assignCell;
        if(s.assignment){
          assignCell = '<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">'
            + '<span style="font-weight:600;color:var(--sage-dark)">'+escapeHtml(s.assignment.brooder_name)+'</span>'
            + '<button class="status-btn" onclick="Page.Devices.unassign('+s.id+')">Unassign</button></div>';
        } else if(hasBrooders){
          assignCell = '<div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">'
            + '<select id="sensor-assign-'+s.id+'" style="padding:.35rem;border-radius:6px;border:1px solid #ccc">'+opts+'</select>'
            + '<button class="btn-primary" style="padding:.35rem .7rem" onclick="Page.Devices.assign('+s.id+')">Assign</button></div>';
        } else {
          assignCell = '<span style="color:#999">No brooders to assign</span>';
        }

        return '<tr style="cursor:default">'
          + '<td>'+name+'</td>'
          + '<td>'+model+'</td>'
          + '<td>'+temp+'</td>'
          + '<td>'+hum+'</td>'
          + '<td>'+statusHtml+'</td>'
          + '<td>'+assignCell+'</td>'
          + '<td style="color:#888;font-size:.8rem">'+relativeTime(s.last_seen)+'</td>'
          + '</tr>';
      }).join('');

      el.innerHTML = '<table class="data-table"><thead><tr>'
        + '<th>Sensor</th><th>Model</th><th>Temp</th><th>Humidity</th><th>Status</th><th>Assignment</th><th>Last seen</th>'
        + '</tr></thead><tbody>'+rows+'</tbody></table>';
    },

    _renderCameras: function(el){
      if(!this._cameras.length){
        el.innerHTML = '<div class="no-data">No trail cameras registered yet. They appear here automatically once the poller reports one.</div>';
        return;
      }
      var opts = this._brooderOptions();
      var hasBrooders = this._brooders.length > 0;

      var rows = this._cameras.map(function(c){
        var name = escapeHtml(c.name || c.spypoint_camera_id || ('Camera #'+c.id));
        var model = escapeHtml(c.model || '—');

        var assignCell;
        if(c.assignment){
          assignCell = '<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">'
            + '<span style="font-weight:600;color:var(--sage-dark)">'+escapeHtml(c.assignment.brooder_name)+'</span>'
            + '<button class="status-btn" onclick="Page.Devices.unassignCamera('+c.id+')">Unassign</button></div>';
        } else if(hasBrooders){
          assignCell = '<div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">'
            + '<select id="camera-assign-'+c.id+'" style="padding:.35rem;border-radius:6px;border:1px solid #ccc">'+opts+'</select>'
            + '<button class="btn-primary" style="padding:.35rem .7rem" onclick="Page.Devices.assignCamera('+c.id+')">Assign</button></div>';
        } else {
          assignCell = '<span style="color:#999">No brooders to assign</span>';
        }

        var lastPhoto = c._lastPhoto ? relativeTime(c._lastPhoto) : '—';
        return '<tr style="cursor:default">'
          + '<td>'+name+'</td>'
          + '<td>'+model+'</td>'
          + '<td>'+assignCell+'</td>'
          + '<td style="color:#888;font-size:.8rem">'+relativeTime(c.last_seen)+'</td>'
          + '<td style="color:#888;font-size:.8rem">'+lastPhoto+'</td>'
          + '</tr>';
      }).join('');

      el.innerHTML = '<table class="data-table"><thead><tr>'
        + '<th>Camera</th><th>Model</th><th>Assignment</th><th>Last seen</th><th>Last photo</th>'
        + '</tr></thead><tbody>'+rows+'</tbody></table>';
    },

    // --- assign / unassign (shared transport, per-device URLs) ---
    assign: function(sensorId){
      var sel = document.getElementById('sensor-assign-'+sensorId);
      if(!sel || !sel.value){ toast('Select a brooder first','error'); return; }
      this._put('/api/govee/sensors/'+sensorId+'/assign', parseInt(sel.value, 10), 'Sensor assigned');
    },
    assignCamera: function(cameraId){
      var sel = document.getElementById('camera-assign-'+cameraId);
      if(!sel || !sel.value){ toast('Select a brooder first','error'); return; }
      this._put('/api/trail-cameras/'+cameraId+'/assign', parseInt(sel.value, 10), 'Camera assigned');
    },
    unassign: function(sensorId){
      var s = this._sensors.find(function(x){ return x.id === sensorId; });
      var where = (s && s.assignment) ? s.assignment.brooder_name : 'this brooder';
      if(!confirm('Unassign this sensor from '+where+'?')) return;
      this._del('/api/govee/sensors/'+sensorId+'/assign', 'Sensor unassigned');
    },
    unassignCamera: function(cameraId){
      var c = this._cameras.find(function(x){ return x.id === cameraId; });
      var where = (c && c.assignment) ? c.assignment.brooder_name : 'this brooder';
      if(!confirm('Unassign this camera from '+where+'?')) return;
      this._del('/api/trail-cameras/'+cameraId+'/assign', 'Camera unassigned');
    },

    // Direct fetch (not API.put/delete, which swallow the body on non-2xx) so we
    // can surface the server's error message.
    _put: async function(url, brooderId, okMsg){
      try {
        var resp = await fetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ brooder_id: brooderId }),
        });
        if(!resp.ok){ var msg = await resp.text(); toast(msg || 'Assign failed','error'); return; }
        toast(okMsg);
        this._load();
      } catch(e){ toast('Assign failed: '+(e && e.message ? e.message : 'network error'),'error'); }
    },
    _del: async function(url, okMsg){
      try {
        var resp = await fetch(url, { method: 'DELETE' });
        if(!resp.ok){ var msg = await resp.text(); toast(msg || 'Unassign failed','error'); return; }
        toast(okMsg);
        this._load();
      } catch(e){ toast('Unassign failed: '+(e && e.message ? e.message : 'network error'),'error'); }
    }
  };

  /* =========================================================
     Boot
     ========================================================= */
  Router.init();
})();
</script>
