<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuailSync Dashboard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --sage:#B7C4A0;
    --dusty-rose:#D4A0A0;
    --beige:#F5F0EB;
    --cream:#FEFCF9;
    --charcoal:#4A4A4A;
    --sage-light:#d2dcc3;
    --sage-dark:#9ab085;
    --rose-light:#e8c8c8;
    --danger:#c0392b;
    --warning:#e67e22;
    --safe:#27ae60;
    --blue:#5b9bd5;
    --radius:12px;
    --shadow:0 2px 8px rgba(0,0,0,.07);
    --sidebar-w:210px;
    --sidebar-collapsed:60px;
  }

  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--beige);
    color:var(--charcoal);
    line-height:1.5;
    min-height:100vh;
    display:flex;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:var(--sidebar-w);
    min-height:100vh;
    background:var(--cream);
    border-right:1px solid #e0d8d0;
    display:flex;flex-direction:column;
    transition:width .2s;
    position:fixed;left:0;top:0;bottom:0;
    z-index:100;
  }
  .sidebar-logo{
    padding:1rem 1rem .85rem;
    font-size:1.15rem;font-weight:700;
    border-bottom:1px solid var(--beige);
    white-space:nowrap;overflow:hidden;
    display:flex;align-items:center;gap:.45rem;
    letter-spacing:-.01em;
  }
  .sidebar-logo .logo-egg{font-size:1.3rem}
  .sidebar-logo .logo-text{margin-left:.1rem}
  .sidebar-nav{flex:1;padding:.5rem 0}
  .sidebar-item{
    display:flex;align-items:center;gap:.65rem;
    padding:.65rem 1rem;
    cursor:pointer;
    font-size:.88rem;font-weight:500;
    color:var(--charcoal);
    text-decoration:none;
    border-left:3px solid transparent;
    transition:all .15s;
    white-space:nowrap;overflow:hidden;
  }
  .sidebar-item:hover{background:var(--beige)}
  .sidebar-item.active{
    background:var(--sage-light);
    border-left-color:var(--sage);
    font-weight:700;
    color:#3a5a28;
  }
  .sidebar-item .icon{font-size:1.05rem;flex-shrink:0;width:24px;text-align:center}
  .sidebar-item .label{overflow:hidden;text-overflow:ellipsis}
  .sidebar-footer{
    padding:.75rem 1rem;
    border-top:1px solid var(--beige);
    font-size:.8rem;
    display:flex;align-items:center;gap:.5rem;
    white-space:nowrap;overflow:hidden;
  }
  .status-dot{
    width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;
  }
  .status-dot.connected{background:var(--safe)}
  .status-dot.disconnected{background:var(--danger)}

  .hamburger{
    display:none;
    position:fixed;top:.75rem;left:.75rem;z-index:200;
    background:var(--cream);border:1px solid #e0d8d0;border-radius:8px;
    width:36px;height:36px;cursor:pointer;
    font-size:1.2rem;align-items:center;justify-content:center;
  }

  /* ---------- Main ---------- */
  .main{
    margin-left:var(--sidebar-w);
    flex:1;
    min-height:100vh;
    transition:margin-left .2s;
  }
  .main-header{
    background:var(--sage);
    padding:1rem 2rem;
    font-size:1.25rem;font-weight:700;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    color:#fff;
    letter-spacing:-.01em;
  }
  #app{
    padding:1.5rem 2rem;max-width:1440px;margin:0 auto;
    transition:opacity .2s ease;
  }
  #app.fade-out{opacity:0}

  /* ---------- Toast ---------- */
  .toast-container{
    position:fixed;top:1rem;right:1rem;z-index:999;
    display:flex;flex-direction:column;gap:.5rem;
    pointer-events:none;
  }
  .toast{
    padding:.65rem 1.1rem;border-radius:10px;
    font-size:.85rem;font-weight:500;
    box-shadow:0 4px 16px rgba(0,0,0,.12);
    transform:translateX(120%);
    transition:transform .3s ease, opacity .3s ease;
    opacity:0;pointer-events:auto;
    max-width:360px;
  }
  .toast.show{transform:translateX(0);opacity:1}
  .toast-success{background:#e8f5e9;color:#1b5e20;border-left:4px solid var(--safe)}
  .toast-error{background:#fce4e4;color:#b71c1c;border-left:4px solid var(--danger)}
  .toast-info{background:#e3f2fd;color:#0d47a1;border-left:4px solid var(--blue)}

  /* ---------- Loading Spinner ---------- */
  .loading-wrap{display:flex;align-items:center;justify-content:center;padding:2rem}
  .spinner{
    width:32px;height:32px;border:3px solid var(--beige);
    border-top-color:var(--sage);border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- Empty State ---------- */
  .empty-state{
    text-align:center;padding:2.5rem 1.5rem;color:#999;
  }
  .empty-state .empty-icon{font-size:2.5rem;margin-bottom:.6rem}
  .empty-state p{font-size:.9rem;margin-bottom:1rem;color:#888}
  .empty-state .btn-primary{font-size:.85rem}

  /* ---------- Panels & Cards ---------- */
  .panel{
    background:var(--cream);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  .panel-header{
    padding:.75rem 1rem;
    font-weight:600;font-size:.95rem;
    border-bottom:1px solid var(--beige);
    display:flex;align-items:center;justify-content:space-between;gap:.5rem;
  }
  .panel-header-left{display:flex;align-items:center;gap:.5rem}
  .panel-body{
    padding:1rem;
    flex:1;
    font-size:.875rem;
  }
  .view-all-link{
    font-size:.78rem;color:var(--sage-dark);font-weight:500;
    cursor:pointer;text-decoration:none;
  }
  .view-all-link:hover{text-decoration:underline}

  /* ---------- Dashboard Grid ---------- */
  .dash-grid{display:grid;gap:1.25rem}
  .dash-row-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}

  /* ---------- Quick Stats ---------- */
  .quick-stats{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
  .qs-card{
    background:var(--beige);border-radius:10px;padding:.85rem;text-align:center;
  }
  .qs-card .qs-num{font-size:1.6rem;font-weight:700;line-height:1.2}
  .qs-card .qs-label{font-size:.72rem;color:#888;text-transform:uppercase;letter-spacing:.04em}

  /* ---------- Stacked Bar ---------- */
  .bar-chart-row{
    display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;font-size:.82rem;
  }
  .bar-chart-label{width:60px;text-align:right;font-weight:600;font-size:.78rem;color:#777}
  .bar-chart-track{flex:1;height:22px;border-radius:6px;background:var(--beige);overflow:hidden;display:flex}
  .bar-chart-seg{height:100%;transition:width .4s;position:relative}
  .bar-chart-count{margin-left:.4rem;font-size:.78rem;color:#888;min-width:24px}
  .bar-legend{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.6rem}
  .bar-legend-item{display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:#777}
  .bar-legend-dot{width:10px;height:10px;border-radius:3px}

  /* ---------- Brooder sparkline ---------- */
  .sparkline{display:flex;align-items:flex-end;gap:2px;height:36px}
  .spark-bar{
    flex:1;min-width:3px;border-radius:2px 2px 0 0;
    background:var(--sage);transition:height .3s;
  }
  .reading-row{display:flex;justify-content:space-between;margin-bottom:.35rem}
  .reading-label{color:#777;font-size:.78rem}
  .reading-value{font-weight:600;font-size:1.05rem}

  /* ---------- Alerts ---------- */
  .alert-item{
    padding:.5rem .75rem;border-radius:8px;margin-bottom:.4rem;
    font-size:.8rem;
  }
  .alert-item.warning{background:#fef3e2;border-left:3px solid var(--warning)}
  .alert-item.critical{background:#fce4e4;border-left:3px solid var(--danger)}
  .alert-time{color:#999;font-size:.7rem;float:right}
  .alerts-scroll{max-height:220px;overflow-y:auto}
  .no-data{color:#aaa;font-style:italic;text-align:center;padding:1rem}

  /* ---------- Data Table ---------- */
  .data-table{
    width:100%;border-collapse:collapse;font-size:.85rem;
  }
  .data-table th{
    text-align:left;padding:.6rem .75rem;
    background:var(--sage-light);font-weight:600;font-size:.78rem;
    text-transform:uppercase;letter-spacing:.03em;color:#555;
    position:sticky;top:0;
  }
  .data-table td{
    padding:.5rem .75rem;border-bottom:1px solid var(--beige);
  }
  .data-table tbody tr{cursor:pointer;transition:background .1s}
  .data-table tbody tr:hover{background:rgba(183,196,160,.15)}
  .data-table tbody tr:nth-child(even){background:rgba(0,0,0,.015)}
  .data-table tbody tr:nth-child(even):hover{background:rgba(183,196,160,.15)}
  .table-wrap{overflow-x:auto;border-radius:var(--radius);background:var(--cream);box-shadow:var(--shadow)}

  /* ---------- Band color dot ---------- */
  .band-dot{
    width:14px;height:14px;border-radius:50%;display:inline-block;
    border:1px solid rgba(0,0,0,.15);vertical-align:middle;
  }
  .band-dot-lg{
    width:48px;height:48px;border-radius:50%;display:inline-flex;
    align-items:center;justify-content:center;
    border:2px solid rgba(0,0,0,.12);font-size:1.2rem;
    flex-shrink:0;
  }

  /* ---------- Bird Link ---------- */
  .bird-link{
    color:var(--sage-dark);font-weight:600;cursor:pointer;
    text-decoration:none;
  }
  .bird-link:hover{text-decoration:underline;color:#7a9a64}

  /* ---------- Filter bar ---------- */
  .filter-bar{
    display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;align-items:center;
  }
  .filter-btn{
    padding:.35rem .75rem;border-radius:20px;
    border:1px solid #d0c8c0;background:var(--cream);
    font-size:.8rem;cursor:pointer;transition:all .15s;
    color:var(--charcoal);
  }
  .filter-btn:hover{border-color:var(--sage)}
  .filter-btn.active{
    background:var(--sage);color:#fff;border-color:var(--sage);
  }

  /* ---------- Status / action buttons ---------- */
  .status-btn{
    padding:.25rem .6rem;border-radius:12px;
    border:1px solid #d0c8c0;background:var(--cream);
    font-size:.73rem;cursor:pointer;transition:all .15s;
    color:var(--charcoal);
  }
  .status-btn:hover{background:var(--rose-light);border-color:var(--dusty-rose)}

  /* ---------- Page top bar ---------- */
  .page-top{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;
  }
  .page-title{font-size:1.1rem;font-weight:700}
  .btn-primary{
    padding:.45rem 1rem;border-radius:8px;
    background:var(--sage);color:#fff;border:none;
    font-size:.85rem;font-weight:600;cursor:pointer;
    transition:background .15s;
  }
  .btn-primary:hover{background:var(--sage-dark)}
  .btn-secondary{
    padding:.4rem .85rem;border-radius:8px;
    background:var(--beige);color:var(--charcoal);
    border:1px solid #d0c8c0;
    font-size:.82rem;font-weight:500;cursor:pointer;
    transition:all .15s;
  }
  .btn-secondary:hover{border-color:var(--sage);background:var(--sage-light)}
  .btn-danger{
    padding:.4rem .85rem;border-radius:8px;
    background:#fce4e4;color:var(--danger);
    border:1px solid #e8b0b0;
    font-size:.82rem;font-weight:500;cursor:pointer;
    transition:all .15s;
  }
  .btn-danger:hover{background:#f5c6c6}

  /* ---------- Back button ---------- */
  .back-btn{
    display:inline-flex;align-items:center;gap:.3rem;
    font-size:.85rem;color:#888;cursor:pointer;
    margin-bottom:1rem;text-decoration:none;
    transition:color .15s;
  }
  .back-btn:hover{color:var(--charcoal)}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;
    z-index:500;animation:fadeIn .15s;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{
    background:var(--cream);border-radius:var(--radius);
    padding:1.5rem;width:90%;max-width:480px;
    box-shadow:0 8px 32px rgba(0,0,0,.15);
    max-height:90vh;overflow-y:auto;
    animation:slideUp .2s ease;
  }
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h3{margin-bottom:1rem;font-size:1rem}
  .modal label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.2rem;margin-top:.6rem;color:#666}
  .modal input,.modal select,.modal textarea{
    width:100%;padding:.45rem .6rem;border:1px solid #d0c8c0;
    border-radius:8px;font-size:.85rem;font-family:inherit;
    background:#fff;
  }
  .modal textarea{resize:vertical;min-height:60px}
  .modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}
  .btn-cancel{
    padding:.4rem .9rem;border-radius:8px;
    background:var(--beige);border:1px solid #d0c8c0;
    font-size:.85rem;cursor:pointer;
  }

  /* ---------- Bird Detail ---------- */
  .bird-profile{
    display:flex;gap:1.5rem;align-items:flex-start;
    background:var(--cream);border-radius:var(--radius);
    padding:1.25rem;box-shadow:var(--shadow);margin-bottom:1.25rem;
    flex-wrap:wrap;
  }
  .bird-profile-info{flex:1;min-width:200px}
  .bird-profile-info h2{font-size:1.15rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.6rem}
  .bird-meta-grid{
    display:grid;grid-template-columns:auto 1fr;gap:.2rem .8rem;
    font-size:.85rem;
  }
  .bird-meta-grid dt{color:#888;font-weight:500}
  .bird-meta-grid dd{font-weight:600}
  .status-badge{
    display:inline-block;padding:2px 10px;border-radius:12px;
    font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
  }
  .status-badge.active{background:#e8f5e9;color:#1b5e20}
  .status-badge.culled{background:#fce4e4;color:#b71c1c}
  .status-badge.deceased{background:#e0e0e0;color:#555}
  .status-badge.sold{background:#e3f2fd;color:#0d47a1}

  .bird-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
  .bird-detail-grid .panel{min-height:0}

  .growth-metrics{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
  .gm-card{background:var(--beige);border-radius:8px;padding:.7rem;text-align:center}
  .gm-card .gm-val{font-size:1.3rem;font-weight:700}
  .gm-card .gm-lbl{font-size:.7rem;color:#888;text-transform:uppercase}

  .bird-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem}
  .bird-notes{
    background:var(--beige);border-radius:8px;padding:.8rem;
    font-size:.85rem;color:#666;white-space:pre-wrap;
    min-height:60px;
  }

  /* ---------- Weight Chart SVG ---------- */
  .weight-chart-wrap{padding:.5rem 0}
  .weight-chart-wrap svg{width:100%;height:auto}

  /* ---------- Clutch Cards ---------- */
  .clutch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
  .clutch-card{
    background:var(--cream);border-radius:var(--radius);
    padding:1.1rem;box-shadow:var(--shadow);
    display:flex;gap:1rem;align-items:flex-start;
  }
  .clutch-card.muted{opacity:.55}
  .clutch-card-body{flex:1;min-width:0}
  .clutch-card-body h4{font-size:.9rem;margin-bottom:.4rem}
  .clutch-dates{font-size:.78rem;color:#777;margin:.4rem 0}
  .clutch-dates .highlight{color:var(--sage-dark);font-weight:700}
  .clutch-egg-counts{display:flex;gap:.8rem;font-size:.8rem;margin:.4rem 0}
  .clutch-egg-counts span{display:flex;flex-direction:column;align-items:center}
  .clutch-egg-counts .egg-num{font-size:1.1rem;font-weight:700}
  .clutch-egg-counts .egg-lbl{font-size:.65rem;color:#999;text-transform:uppercase}
  .clutch-actions{display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap}
  .hatch-metrics{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;font-size:.8rem}
  .hatch-metrics span{padding:2px 8px;border-radius:6px;background:var(--beige)}
  .metric-good{color:#2d7a3a;background:#d4edda!important}
  .metric-warn{color:#856404;background:#fff3cd!important}
  .metric-bad{color:#a94442;background:#f8d7da!important}
  .btn-danger{background:var(--dusty-rose);color:#fff;border:none;padding:.45rem 1rem;border-radius:8px;cursor:pointer;font-weight:600}
  .btn-danger:hover{opacity:.85}
  .inline-form{
    margin-top:.5rem;padding:.5rem;background:var(--beige);border-radius:8px;
    display:flex;gap:.4rem;align-items:flex-end;flex-wrap:wrap;
  }
  .inline-form label{font-size:.72rem;margin:0}
  .inline-form input{width:80px;padding:.25rem .4rem;font-size:.8rem}
  .inline-form button{padding:.25rem .6rem;font-size:.78rem}

  /* ---------- Clutch Ring ---------- */
  .clutch-ring-wrap{flex-shrink:0}
  .clutch-ring-wrap svg{display:block}

  /* ---------- Clutch Timeline ---------- */
  .timeline-wrap{
    background:var(--cream);border-radius:var(--radius);
    padding:1rem;box-shadow:var(--shadow);margin-bottom:1.25rem;
    overflow-x:auto;
  }
  .timeline-wrap h3{font-size:.9rem;margin-bottom:.75rem}
  .timeline-gantt{position:relative;min-height:30px;padding-top:22px}
  .timeline-gantt-bar{
    position:absolute;height:22px;border-radius:6px;
    font-size:.68rem;font-weight:600;color:#fff;
    display:flex;align-items:center;justify-content:center;
    white-space:nowrap;overflow:hidden;
    cursor:default;min-width:40px;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
  }
  .timeline-today{
    position:absolute;top:0;bottom:0;width:2px;background:var(--danger);
    z-index:2;
  }
  .timeline-today-label{
    position:absolute;top:-18px;font-size:.6rem;color:var(--danger);
    font-weight:600;white-space:nowrap;transform:translateX(-50%);
  }
  .timeline-date-axis{display:flex;justify-content:space-between;font-size:.6rem;color:#aaa;margin-top:.3rem}

  /* ---------- Breeding Page ---------- */
  .tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:2px solid var(--beige)}
  .tab{
    padding:.6rem 1.2rem;font-size:.88rem;font-weight:500;
    cursor:pointer;color:#999;border-bottom:2px solid transparent;
    margin-bottom:-2px;transition:all .15s;
  }
  .tab:hover{color:var(--charcoal)}
  .tab.active{color:var(--charcoal);font-weight:700;border-bottom-color:var(--sage)}

  .breed-group-card{
    background:var(--cream);border-radius:var(--radius);
    padding:1rem;box-shadow:var(--shadow);margin-bottom:.75rem;
  }
  .breed-group-card h4{font-size:.9rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
  .ratio-badge{
    font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;
  }
  .ratio-badge.good{background:#e8f5e9;color:#1b5e20}
  .ratio-badge.warn{background:#fef3e2;color:#e65100}
  .ratio-badge.bad{background:#fce4e4;color:#b71c1c}
  .breed-birds{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;font-size:.82rem}
  .breed-bird-chip{
    display:inline-flex;align-items:center;gap:.3rem;
    padding:.2rem .5rem;border-radius:8px;background:var(--beige);
    font-size:.78rem;
  }

  .pair-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:.5rem .75rem;border-radius:8px;margin-bottom:.4rem;
    font-size:.82rem;
  }
  .pair-row.safe-pair{background:#e8f5e9}
  .pair-row.risky-pair{background:#fce4e4}
  .pair-info{display:flex;align-items:center;gap:.5rem}
  .coeff{font-weight:600;font-size:.75rem;padding:2px 8px;border-radius:10px}
  .coeff.safe{background:var(--safe);color:#fff}
  .coeff.risky{background:var(--danger);color:#fff}

  /* ---------- Processing Kanban ---------- */
  .kanban{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;align-items:start}
  .kanban-col{
    background:var(--beige);border-radius:var(--radius);
    padding:.75rem;min-height:200px;
  }
  .kanban-col-header{
    font-size:.82rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;margin-bottom:.6rem;
    display:flex;align-items:center;gap:.4rem;
  }
  .kanban-col-header .col-count{
    background:var(--cream);font-size:.7rem;padding:1px 7px;border-radius:10px;
    font-weight:600;
  }
  .kanban-card{
    background:var(--cream);border-radius:10px;
    padding:.7rem .85rem;box-shadow:0 1px 4px rgba(0,0,0,.06);
    margin-bottom:.5rem;font-size:.82rem;
  }
  .kanban-card-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem}
  .kanban-card-reason{font-size:.75rem;color:#888;margin-bottom:.4rem}
  .kanban-card-date{font-size:.7rem;color:#aaa}
  .kanban-card-actions{display:flex;gap:.3rem;margin-top:.4rem}

  /* ---------- Camera cards ---------- */
  .camera-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1rem}
  .camera-card{
    background:var(--cream);border-radius:var(--radius);
    padding:1rem;box-shadow:var(--shadow);
  }
  .camera-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
  .camera-card-header h4{font-size:.9rem;margin:0}
  .camera-status-badge{
    font-size:.7rem;font-weight:600;padding:2px 10px;border-radius:10px;
  }
  .camera-status-badge.active{background:var(--safe);color:#fff}
  .camera-status-badge.offline{background:var(--danger);color:#fff}
  .camera-meta{font-size:.8rem;color:#777;margin-bottom:.5rem}
  .camera-meta span{margin-right:1rem}
  .camera-feed-placeholder{
    background:var(--beige);border-radius:8px;height:150px;
    display:flex;align-items:center;justify-content:center;
    color:#aaa;font-size:.85rem;font-style:italic;
    border:2px dashed #d0c8c0;margin-bottom:.6rem;
  }
  .detection-summary{margin-top:.5rem}
  .detection-summary-title{font-size:.75rem;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem}
  .detection-bar{
    display:flex;align-items:center;gap:.5rem;
    font-size:.8rem;padding:.2rem 0;
  }
  .detection-bar-fill{
    height:6px;border-radius:3px;background:var(--sage);min-width:4px;
  }
  .detection-bar-label{min-width:60px;font-weight:600}
  .detection-bar-count{color:#888;font-size:.75rem}

  /* ---------- Responsive ---------- */
  @media(max-width:900px){
    .dash-row-2{grid-template-columns:1fr}
    .bird-detail-grid{grid-template-columns:1fr}
    .kanban{grid-template-columns:1fr}
  }
  @media(max-width:768px){
    .sidebar{width:var(--sidebar-collapsed)}
    .sidebar .label,.sidebar .logo-text,.sidebar-footer .conn-text{display:none}
    .main{margin-left:var(--sidebar-collapsed)}
    .hamburger{display:flex}
    .sidebar.open{width:var(--sidebar-w)}
    .sidebar.open .label,.sidebar.open .logo-text,.sidebar.open .conn-text{display:inline}
    #app{padding:1rem}
    .main-header{padding:.75rem 1rem .75rem 3.5rem}
    .clutch-grid{grid-template-columns:1fr}
  }
  @media(max-width:480px){
    .data-table{font-size:.78rem}
    .data-table th,.data-table td{padding:.4rem .5rem}
  }
</style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<button class="hamburger" id="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo"><span class="logo-egg">&#x1F423;</span><span class="logo-text">QuailSync</span></div>
  <div class="sidebar-nav">
    <a class="sidebar-item" data-route="#/dashboard" onclick="Router.navigate('#/dashboard')">
      <span class="icon">&#x1F3E0;</span><span class="label">Dashboard</span>
    </a>
    <a class="sidebar-item" data-route="#/flock" onclick="Router.navigate('#/flock')">
      <span class="icon">&#x1F426;</span><span class="label">Flock</span>
    </a>
    <a class="sidebar-item" data-route="#/clutches" onclick="Router.navigate('#/clutches')">
      <span class="icon">&#x1F95A;</span><span class="label">Clutches</span>
    </a>
    <a class="sidebar-item" data-route="#/nursery" onclick="Router.navigate('#/nursery')">
      <span class="icon">&#x1F424;</span><span class="label">Nursery</span>
    </a>
    <a class="sidebar-item" data-route="#/breeding" onclick="Router.navigate('#/breeding')">
      <span class="icon">&#x1F48D;</span><span class="label">Breeding</span>
    </a>
    <a class="sidebar-item" data-route="#/processing" onclick="Router.navigate('#/processing')">
      <span class="icon">&#x1FA93;</span><span class="label">Processing</span>
    </a>
    <a class="sidebar-item" data-route="#/cameras" onclick="Router.navigate('#/cameras')">
      <span class="icon">&#x1F3A5;</span><span class="label">Cameras</span>
    </a>
    <a class="sidebar-item" data-route="#/nfc/scan" onclick="Router.navigate('#/nfc/scan')">
      <span class="icon">&#x1F4F1;</span><span class="label">Scan NFC</span>
    </a>
    <a class="sidebar-item" data-route="#/settings" onclick="Router.navigate('#/settings')">
      <span class="icon">&#x2699;&#xFE0F;</span><span class="label">Settings</span>
    </a>
  </div>
  <div class="sidebar-footer">
    <span id="status-dot" class="status-dot disconnected"></span>
    <span class="conn-text" id="connection-label">Disconnected</span>
  </div>
</nav>

<div class="main">
  <div class="main-header" id="page-header">Dashboard</div>
  <div id="app"></div>
</div>

<script>
(function(){
  'use strict';

  /* =========================================================
     API helper
     ========================================================= */
  var API = {
    get: async function(path){
      try{ var r=await fetch(path); if(!r.ok) return null; return r.json(); }
      catch(e){ return null; }
    },
    post: async function(path, body){
      try{
        var r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(!r.ok){ var err=await r.text(); console.error('POST '+path+' failed:',err); return null; }
        return r.json();
      }catch(e){ return null; }
    },
    put: async function(path, body){
      try{
        var r=await fetch(path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(!r.ok) return null;
        return r.json();
      }catch(e){ return null; }
    }
  };

  /* =========================================================
     Shared state
     ========================================================= */
  var _intervals = [];
  var _bloodlines = [];
  var _birds = [];

  function clearIntervals(){
    _intervals.forEach(function(id){ clearInterval(id); });
    _intervals = [];
  }
  function addInterval(fn, ms){
    fn();
    _intervals.push(setInterval(fn, ms));
  }

  /* =========================================================
     Utility functions
     ========================================================= */
  var BLOODLINE_COLORS = ['#B7C4A0','#D4A0A0','#A0B8D4','#D4C4A0','#C4A0D4','#A0D4C4','#D4A0B8','#B8D4A0','#D4B8A0','#A0C4D4'];

  function bloodlineColor(idx){
    return BLOODLINE_COLORS[idx % BLOODLINE_COLORS.length];
  }

  function toast(message, type){
    var c = document.getElementById('toast-container');
    var el = document.createElement('div');
    el.className = 'toast toast-'+(type||'success');
    el.textContent = message;
    c.appendChild(el);
    setTimeout(function(){ el.classList.add('show'); }, 20);
    setTimeout(function(){
      el.classList.remove('show');
      setTimeout(function(){ el.remove(); }, 300);
    }, 3200);
  }

  function loadingHTML(){
    return '<div class="loading-wrap"><div class="spinner"></div></div>';
  }

  function emptyState(icon, msg, btnText, btnAction){
    var html = '<div class="empty-state"><div class="empty-icon">'+icon+'</div><p>'+msg+'</p>';
    if(btnText) html += '<button class="btn-primary" onclick="'+btnAction+'">'+btnText+'</button>';
    html += '</div>';
    return html;
  }

  function birdLink(id, text){
    if(!id) return '&mdash;';
    return '<a class="bird-link" onclick="Router.navigate(\'#/flock/bird/'+id+'\')">'+(text||'#'+id)+'</a>';
  }

  function bandDot(color, size){
    if(!color) return '';
    var s = size || 14;
    return '<span class="band-dot" style="width:'+s+'px;height:'+s+'px;background:'+color+'" title="'+color+'"></span>';
  }

  function bloodlineName(id){
    var name = '';
    _bloodlines.forEach(function(bl){ if(bl.id===id) name=bl.name; });
    return name;
  }

  function findBird(id){
    var found = null;
    _birds.forEach(function(b){ if(b.id===id) found=b; });
    return found;
  }

  function formatCullReason(reason){
    if(reason === 'ExcessMale') return 'Excess male';
    if(typeof reason === 'object'){
      if(reason.LowWeight) return 'Low weight ('+reason.LowWeight.weight_grams.toFixed(0)+'g)';
      if(reason.HighInbreeding) return 'High inbreeding ('+reason.HighInbreeding.coefficient.toFixed(3)+')';
    }
    return String(reason);
  }

  function formatDate(dateStr){
    if(!dateStr) return '&mdash;';
    return dateStr;
  }

  function daysBetween(d1, d2){
    return Math.ceil((d2 - d1) / 86400000);
  }

  function addDays(dateStr, days){
    var d = new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().split('T')[0];
  }

  /* =========================================================
     Connection status (global, every 10s)
     ========================================================= */
  async function pollStatus(){
    var d = await API.get('/api/status');
    var dot = document.getElementById('status-dot');
    var lbl = document.getElementById('connection-label');
    if(d && d.agent_connected){
      dot.className='status-dot connected';
      lbl.textContent='Connected';
    }else{
      dot.className='status-dot disconnected';
      lbl.textContent='Disconnected';
    }
  }
  setInterval(pollStatus, 10000);
  pollStatus();

  /* =========================================================
     Router
     ========================================================= */
  var Router = window.Router = {
    current: null,
    init: function(){
      window.addEventListener('hashchange', function(){ Router.route(); });
      if(!location.hash || location.hash === '#/' || location.hash === '#') location.hash = '#/dashboard';
      else Router.route();
    },
    navigate: function(hash){
      location.hash = hash;
      document.getElementById('sidebar').classList.remove('open');
    },
    route: function(){
      var hash = location.hash || '#/dashboard';
      // Stop previous page
      if(Router.current && Router.current.stop) Router.current.stop();
      clearIntervals();

      var app = document.getElementById('app');
      var hdr = document.getElementById('page-header');

      // Fade out
      app.classList.add('fade-out');

      setTimeout(function(){
        // Highlight nav
        var navRoute = hash;
        if(hash.indexOf('#/flock/bird/') === 0) navRoute = '#/flock';
        if(hash.indexOf('#/nfc/') === 0) navRoute = '#/nfc/scan';
        document.querySelectorAll('.sidebar-item').forEach(function(el){
          el.classList.toggle('active', el.getAttribute('data-route') === navRoute);
        });

        if(hash.indexOf('#/flock/bird/') === 0){
          var birdId = parseInt(hash.split('/').pop());
          hdr.textContent = 'Bird Detail';
          Router.current = Page.BirdDetail;
          Page.BirdDetail._birdId = birdId;
        } else if(hash === '#/flock'){
          hdr.textContent = 'Flock Management';
          Router.current = Page.Flock;
        } else if(hash === '#/clutches'){
          hdr.textContent = 'Clutch Tracker';
          Router.current = Page.Clutches;
        } else if(hash === '#/nursery'){
          hdr.textContent = 'Nursery';
          Router.current = Page.Nursery;
        } else if(hash === '#/breeding'){
          hdr.textContent = 'Breeding';
          Router.current = Page.Breeding;
        } else if(hash === '#/processing'){
          hdr.textContent = 'Processing';
          Router.current = Page.Processing;
        } else if(hash === '#/cameras'){
          hdr.textContent = 'Cameras';
          Router.current = Page.Cameras;
        } else if(hash === '#/nfc/scan'){
          hdr.textContent = 'Scan NFC';
          Router.current = Page.NfcScan;
        } else if(hash === '#/settings'){
          hdr.textContent = 'Settings';
          Router.current = Page.Settings;
        } else {
          hdr.textContent = 'Dashboard';
          Router.current = Page.Dashboard;
        }

        Router.current.render(app);
        Router.current.start();
        // Fade in
        app.classList.remove('fade-out');
      }, 180);
    }
  };

  /* =========================================================
     Pages
     ========================================================= */
  var Page = window.Page = {};

  /* ---------------------------------------------------------
     DASHBOARD
     --------------------------------------------------------- */
  Page.Dashboard = {
    render: function(app){
      app.innerHTML = '<div class="dash-grid">' +
        '<div class="panel" style="grid-column:1/-1"><div class="panel-header"><span class="panel-header-left">&#x1F321;&#xFE0F; Brooders</span></div><div class="panel-body" id="d-brooder">'+loadingHTML()+'</div></div>' +
        '<div class="dash-row-2">' +
          '<div class="panel"><div class="panel-header"><span class="panel-header-left">&#x1F6A8; Alerts</span><a class="view-all-link" id="d-alerts-viewall" style="display:none">View all</a></div><div class="panel-body"><div class="alerts-scroll" id="d-alerts">'+loadingHTML()+'</div></div></div>' +
          '<div class="panel"><div class="panel-header"><span class="panel-header-left">&#x1F4CA; Quick Stats</span></div><div class="panel-body" id="d-stats">'+loadingHTML()+'</div></div>' +
        '</div>' +
        '<div class="panel"><div class="panel-header"><span class="panel-header-left">&#x1F426; Flock Overview</span><a class="view-all-link" onclick="Router.navigate(\'#/flock\')">View flock</a></div><div class="panel-body" id="d-flock">'+loadingHTML()+'</div></div>' +
      '</div>';
    },
    start: function(){
      addInterval(this._pollBrooder, 30000);
      addInterval(this._pollAlerts, 30000);
      addInterval(this._pollStats, 60000);
      addInterval(this._pollFlock, 60000);
    },
    stop: function(){},

    _pollBrooder: async function(){
      var el = document.getElementById('d-brooder');
      if(!el) return;
      var brooders = await API.get('/api/brooders');
      if(!brooders || brooders.length===0){
        var history = await API.get('/api/brooder/history?minutes=60');
        if(!history || history.length===0){ el.innerHTML=emptyState('&#x1F321;&#xFE0F;','No brooder readings yet','',null); return; }
        var latest=history[0];
        var temp=latest.temperature_celsius.toFixed(1);
        var hum=latest.humidity_percent.toFixed(1);
        var pts=history.slice().reverse().slice(-30);
        var temps=pts.map(function(p){return p.temperature_celsius});
        var tMin=Math.min.apply(null,temps), tMax=Math.max.apply(null,temps);
        var range=tMax-tMin||1;
        var bars='';
        temps.forEach(function(t){
          var h=Math.max(4,((t-tMin)/range)*32);
          bars+='<div class="spark-bar" style="height:'+h+'px" title="'+t.toFixed(1)+'\u00b0F"></div>';
        });
        el.innerHTML='<div class="reading-row"><div><span class="reading-label">Temperature</span><br><span class="reading-value">'+temp+'&deg;F</span></div><div style="text-align:right"><span class="reading-label">Humidity</span><br><span class="reading-value">'+hum+'%</span></div></div><div class="sparkline">'+bars+'</div>';
        return;
      }
      // Multi-brooder
      var html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem">';
      for(var i=0;i<brooders.length;i++){
        var b=brooders[i];
        var status = await API.get('/api/brooders/'+b.id+'/status');
        var readings = await API.get('/api/brooders/'+b.id+'/readings?minutes=60');
        var stageCls = b.life_stage==='Chick'?'background:#e8c8c8;color:#8b4513' : b.life_stage==='Adolescent'?'background:#d2dcc3;color:#2e5c1e' : 'background:#c8d8e8;color:#2e4a5c';
        var alertBorder = (status && status.has_alert) ? 'border-left:4px solid var(--danger)' : 'border-left:4px solid var(--safe)';
        var tempStr = status && status.latest_temp!=null ? status.latest_temp.toFixed(1)+'&deg;F' : '--';
        var humStr = status && status.latest_humidity!=null ? status.latest_humidity.toFixed(1)+'%' : '--';
        var alertHtml = (status && status.has_alert) ? '<div style="font-size:.7rem;color:var(--danger);margin-top:.3rem">'+status.alert_message+'</div>' : '';
        var sparkHtml='';
        if(readings && readings.length>0){
          var pts=readings.slice().reverse().slice(-20);
          var temps=pts.map(function(p){return p.temperature_celsius});
          var tMin=Math.min.apply(null,temps),tMax=Math.max.apply(null,temps);
          var range=tMax-tMin||1;
          temps.forEach(function(t){
            var h=Math.max(3,((t-tMin)/range)*28);
            sparkHtml+='<div class="spark-bar" style="height:'+h+'px" title="'+t.toFixed(1)+'\u00b0F"></div>';
          });
        }
        html+='<div style="background:var(--cream);border-radius:var(--radius);padding:.75rem;'+alertBorder+'">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem"><strong style="font-size:.88rem">'+b.name+'</strong><span style="font-size:.62rem;padding:2px 6px;border-radius:8px;'+stageCls+'">'+b.life_stage+'</span></div>';
        html+='<div class="reading-row" style="margin-bottom:.2rem"><div><span class="reading-label">Temp</span><br><span class="reading-value">'+tempStr+'</span></div><div style="text-align:right"><span class="reading-label">Hum</span><br><span class="reading-value">'+humStr+'</span></div></div>';
        if(sparkHtml) html+='<div class="sparkline">'+sparkHtml+'</div>';
        html+=alertHtml+'</div>';
      }
      html+='</div>';
      el.innerHTML=html;
    },

    _pollAlerts: async function(){
      var data = await API.get('/api/alerts?minutes=120');
      var el = document.getElementById('d-alerts');
      var viewAll = document.getElementById('d-alerts-viewall');
      if(!el) return;
      if(!data || data.length===0){ el.innerHTML='<div class="no-data" style="padding:.5rem">All clear &mdash; no recent alerts</div>'; if(viewAll) viewAll.style.display='none'; return; }
      var html='';
      var show = data.slice(0,5);
      show.forEach(function(a){
        var cls = a.severity==='Critical'?'critical':'warning';
        var time = a.timestamp ? (a.timestamp.split(' ').pop()||'') : '';
        html+='<div class="alert-item '+cls+'"><span class="alert-time">'+time+'</span>'+a.message+'</div>';
      });
      el.innerHTML=html;
      if(viewAll && data.length>5) viewAll.style.display='';
      else if(viewAll) viewAll.style.display='none';
    },

    _pollStats: async function(){
      var el = document.getElementById('d-stats');
      if(!el) return;
      var summary = await API.get('/api/flock/summary');
      var clutches = await API.get('/api/clutches');
      var queue = await API.get('/api/processing/queue');

      var totalBirds = summary ? summary.total_birds : 0;
      var activeCl = 0;
      var nextHatchDays = '&mdash;';
      if(clutches){
        var now = new Date();
        var minDays = Infinity;
        clutches.forEach(function(c){
          if(c.status==='Incubating'){
            activeCl++;
            var hd = new Date(c.expected_hatch_date+'T00:00:00');
            var d = Math.max(0, Math.ceil((hd - now)/86400000));
            if(d < minDays) minDays = d;
          }
        });
        if(minDays < Infinity) nextHatchDays = minDays;
      }
      var pendingProc = queue ? queue.length : 0;

      el.innerHTML = '<div class="quick-stats">' +
        '<div class="qs-card"><div class="qs-num">'+totalBirds+'</div><div class="qs-label">Total Birds</div></div>' +
        '<div class="qs-card"><div class="qs-num">'+activeCl+'</div><div class="qs-label">Active Clutches</div></div>' +
        '<div class="qs-card"><div class="qs-num">'+pendingProc+'</div><div class="qs-label">Pending Processing</div></div>' +
        '<div class="qs-card"><div class="qs-num">'+nextHatchDays+'</div><div class="qs-label">Days to Next Hatch</div></div>' +
      '</div>';
    },

    _pollFlock: async function(){
      var el = document.getElementById('d-flock');
      if(!el) return;
      var bl = await API.get('/api/bloodlines');
      if(bl) _bloodlines = bl;
      var birds = await API.get('/api/birds');
      if(birds) _birds = birds; else _birds = [];
      if(_birds.length === 0){
        el.innerHTML = emptyState('&#x1F426;','No birds in your flock yet','+ Add Bird','Router.navigate(\'#/flock\')');
        return;
      }
      // Build stacked bar data
      var malesByBl = {};
      var femalesByBl = {};
      var totalM = 0, totalF = 0;
      _birds.forEach(function(b){
        if(b.status !== 'Active') return;
        var blId = b.bloodline_id || 0;
        if(b.sex === 'Male'){ malesByBl[blId] = (malesByBl[blId]||0) + 1; totalM++; }
        else if(b.sex === 'Female'){ femalesByBl[blId] = (femalesByBl[blId]||0) + 1; totalF++; }
      });

      // Get unique bloodline IDs that have birds
      var blIds = [];
      var seen = {};
      _birds.forEach(function(b){
        if(b.status==='Active' && !seen[b.bloodline_id]){
          seen[b.bloodline_id] = true;
          blIds.push(b.bloodline_id);
        }
      });

      var html = '';
      // Males bar
      html += '<div class="bar-chart-row"><span class="bar-chart-label">Males</span><div class="bar-chart-track">';
      if(totalM > 0){
        blIds.forEach(function(blId, idx){
          var count = malesByBl[blId] || 0;
          if(count > 0){
            var pct = (count / totalM) * 100;
            html += '<div class="bar-chart-seg" style="width:'+pct.toFixed(1)+'%;background:'+bloodlineColor(idx)+'" title="'+bloodlineName(blId)+': '+count+'"></div>';
          }
        });
      }
      html += '</div><span class="bar-chart-count">'+totalM+'</span></div>';

      // Females bar
      html += '<div class="bar-chart-row"><span class="bar-chart-label">Females</span><div class="bar-chart-track">';
      if(totalF > 0){
        blIds.forEach(function(blId, idx){
          var count = femalesByBl[blId] || 0;
          if(count > 0){
            var pct = (count / totalF) * 100;
            html += '<div class="bar-chart-seg" style="width:'+pct.toFixed(1)+'%;background:'+bloodlineColor(idx)+'" title="'+bloodlineName(blId)+': '+count+'"></div>';
          }
        });
      }
      html += '</div><span class="bar-chart-count">'+totalF+'</span></div>';

      // Legend
      html += '<div class="bar-legend">';
      blIds.forEach(function(blId, idx){
        html += '<span class="bar-legend-item"><span class="bar-legend-dot" style="background:'+bloodlineColor(idx)+'"></span>'+bloodlineName(blId)+'</span>';
      });
      html += '</div>';

      // Summary line
      var active = _birds.filter(function(b){return b.status==='Active'}).length;
      html += '<div style="margin-top:.6rem;font-size:.78rem;color:#999">'+active+' active birds &middot; '+totalM+' males &middot; '+totalF+' females &middot; ratio 1:'+( totalM>0 ? (totalF/totalM).toFixed(1) : '0' )+'</div>';

      el.innerHTML = html;
    }
  };

  /* ---------------------------------------------------------
     FLOCK PAGE
     --------------------------------------------------------- */
  Page.Flock = {
    filter: 'all',
    bloodlineFilter: null,
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1F426; Flock</div><button class="btn-primary" onclick="Page.Flock.openModal()">+ Add Bird</button></div>' +
        '<div class="filter-bar" id="flock-filters"></div>' +
        '<div class="table-wrap"><table class="data-table"><thead><tr>' +
        '<th>ID</th><th>Band</th><th>Sex</th><th>Bloodline</th><th>Hatch</th><th>Gen</th><th>Status</th><th>Parents</th>' +

    _renderFilters: function(){
      var el = document.getElementById('flock-filters');

        {key:'all',label:'All'},
        {key:'active',label:'Active'},
        {key:'males',label:'Males'},
        {key:'females',label:'Females'}
      ];
      var html='';

        html+='<button class="filter-btn '+active+'" onclick="Page.Flock.applyFilter(\''+f.key+'\')">'+f.label+'</button>';

      var seenBl = {};

        seenBl[bl.id] = true;

        html+='<button class="filter-btn '+active+'" onclick="Page.Flock.applyBloodlineFilter('+bl.id+')">'+bl.name+'</button>';

    _renderTable: function(){

      var filtered = _birds.filter(function(b){
        if(self.bloodlineFilter) return b.bloodline_id === self.bloodlineFilter;
        if(self.filter==='active') return b.status==='Active';
        if(self.filter==='males') return b.sex==='Male';
        if(self.filter==='females') return b.sex==='Female';
        return true;
      });

      if(filtered.length===0){
        tbody.innerHTML='<tr><td colspan="8">'+emptyState('&#x1F426;','No birds found','+ Add Bird','Page.Flock.openModal()')+'</td></tr>';

        var parents = '';
        if(b.mother_id || b.father_id){

        } else { parents = '&mdash;'; }

        var statusCls = b.status.toLowerCase();
        var statusHtml = '<span class="status-badge '+statusCls+'">'+b.status+'</span>';

        html+='<tr onclick="Router.navigate(\'#/flock/bird/'+b.id+'\')" style="cursor:pointer"><td>'+birdLink(b.id)+'</td><td>'+bandHtml+'</td><td>'+b.sex+'</td><td>'+blName+'</td><td>'+b.hatch_date+'</td><td>'+b.generation+'</td><td>'+statusHtml+'</td><td>'+parents+'</td></tr>';
      });
      tbody.innerHTML = html;
    },
    applyFilter: function(key){
      this.filter = key;
      this.bloodlineFilter = null;
      this._renderFilters();
      this._renderTable();
    },
    applyBloodlineFilter: function(id){
      this.bloodlineFilter = (this.bloodlineFilter === id) ? null : id;
      this.filter = 'all';
      this._renderFilters();
      this._renderTable();
    },
    openModal: function(){

        '<label>Sex</label><select id="m-sex"><option value="Male">Male</option><option value="Female">Female</option><option value="Unknown">Unknown</option></select>' +

        '<label>Notes</label><textarea id="m-notes" placeholder="Optional notes"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Flock.closeModal()">Cancel</button><button class="btn-primary" onclick="Page.Flock.submitBird()">Add Bird</button></div>' +
        '</div></div>';

    closeModal: function(){

    submitBird: async function(){
      var band = document.getElementById('m-band').value.trim() || null;
      var sex = document.getElementById('m-sex').value;
      var bloodline_id = parseInt(document.getElementById('m-bloodline').value);
      var hatch_date = document.getElementById('m-hatch').value;

    _buildWeightChart: function(){
      var weights = this._weights.slice().sort(function(a,b){
        return new Date(a.date) - new Date(b.date);
      });
      if(weights.length === 0) return '';

      var W = 380, H = 180, padL = 45, padR = 15, padT = 15, padB = 30;
      var chartW = W - padL - padR;
      var chartH = H - padT - padB;

      var vals = weights.map(function(w){ return w.weight_grams; });
      var minVal = Math.min.apply(null, vals);
      var maxVal = Math.max.apply(null, vals);
      var range = maxVal - minVal || 10;
      minVal = Math.max(0, minVal - range*0.1);
      maxVal = maxVal + range*0.1;
      range = maxVal - minVal;

      var dates = weights.map(function(w){ return new Date(w.date+'T00:00:00'); });
      var minDate = dates[0].getTime();
      var maxDate = dates[dates.length-1].getTime();
      var dateRange = maxDate - minDate || 1;

      var points = [];
      weights.forEach(function(w, i){
        var x = padL + ((dates[i].getTime() - minDate) / dateRange) * chartW;
        var y = padT + (1 - (w.weight_grams - minVal) / range) * chartH;
        points.push({x:x, y:y, val:w.weight_grams, date:w.date});
      });

      var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';

      // Grid lines
      var gridSteps = 4;
      for(var i=0; i<=gridSteps; i++){
        var gy = padT + (i/gridSteps)*chartH;
        var gVal = maxVal - (i/gridSteps)*range;
        svg += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#e0d8d0" stroke-width="0.5"/>';
        svg += '<text x="'+(padL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-size="8" fill="#aaa">'+gVal.toFixed(0)+'g</text>';
      }

      // Axis
      svg += '<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(H-padB)+'" stroke="#ccc" stroke-width="1"/>';
      svg += '<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#ccc" stroke-width="1"/>';

      // Date labels
      if(weights.length > 1){
        svg += '<text x="'+padL+'" y="'+(H-padB+14)+'" font-size="7" fill="#aaa">'+weights[0].date+'</text>';
        svg += '<text x="'+(W-padR)+'" y="'+(H-padB+14)+'" text-anchor="end" font-size="7" fill="#aaa">'+weights[weights.length-1].date+'</text>';
      }

      // Area fill
      if(points.length > 1){
        var areaPath = 'M'+points[0].x+','+points[0].y;
        for(var i=1;i<points.length;i++) areaPath+=' L'+points[i].x+','+points[i].y;
        areaPath += ' L'+points[points.length-1].x+','+(H-padB)+' L'+points[0].x+','+(H-padB)+' Z';
        svg += '<path d="'+areaPath+'" fill="rgba(183,196,160,0.2)"/>';
      }

      // Line
      if(points.length > 1){
        var linePath = 'M'+points[0].x+','+points[0].y;
        for(var i=1;i<points.length;i++) linePath+=' L'+points[i].x+','+points[i].y;
        svg += '<path d="'+linePath+'" fill="none" stroke="var(--sage)" stroke-width="2" stroke-linejoin="round"/>';
      }

      // Points
      points.forEach(function(p){
        svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="3.5" fill="var(--sage)" stroke="#fff" stroke-width="1.5"><title>'+p.date+': '+p.val.toFixed(1)+'g</title></circle>';
      });

      svg += '</svg>';
      return svg;
    },

    _buildGrowthMetrics: function(){
      var weights = this._weights.slice().sort(function(a,b){
        return new Date(a.date) - new Date(b.date);
      });
      var currentWeight = weights.length > 0 ? weights[weights.length-1].weight_grams : null;
      var avgDailyGain = '&mdash;';
      var daysToBW = '&mdash;';
      var butcherWeight = 200; // grams

      if(weights.length >= 2){
        var first = weights[0];
        var last = weights[weights.length-1];
        var days = daysBetween(new Date(first.date+'T00:00:00'), new Date(last.date+'T00:00:00'));
        if(days > 0){
          var gain = (last.weight_grams - first.weight_grams) / days;
          avgDailyGain = gain.toFixed(1) + 'g';
          if(gain > 0 && currentWeight < butcherWeight){
            daysToBW = Math.ceil((butcherWeight - currentWeight) / gain);
          } else if(currentWeight >= butcherWeight){
            daysToBW = 'Ready';
          }
        }
      }

      var html = '<div class="growth-metrics">';
      html += '<div class="gm-card"><div class="gm-val">'+(currentWeight ? currentWeight.toFixed(1)+'g' : '&mdash;')+'</div><div class="gm-lbl">Current Weight</div></div>';
      html += '<div class="gm-card"><div class="gm-val">'+avgDailyGain+'</div><div class="gm-lbl">Avg Daily Gain</div></div>';
      html += '<div class="gm-card"><div class="gm-val">'+daysToBW+'</div><div class="gm-lbl">Days to 200g</div></div>';
      html += '<div class="gm-card"><div class="gm-val">'+weights.length+'</div><div class="gm-lbl">Weight Records</div></div>';
      html += '</div>';
      return html;
    },

  Page.Clutches = {
    _clutches: [],
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1F95A; Clutches</div><button class="btn-primary" onclick="Page.Clutches.openModal()">+ Add Clutch</button></div>' +
        '<div id="clutch-timeline-section"></div>' +
        '<div id="clutch-list">'+loadingHTML()+'</div>';
    },
    start: function(){
      this._load();
      addInterval(this._load.bind(this), 60000);
    },
    stop: function(){},
    _load: async function(){
      var bl = await API.get('/api/bloodlines');
      if(bl) _bloodlines = bl;
      var data = await API.get('/api/clutches');
      if(data) this._clutches = data;
      this._renderTimeline();
      this._renderList();
    },

    _renderTimeline: function(){
      var el = document.getElementById('clutch-timeline-section');
      if(!el) return;
      var incubating = this._clutches.filter(function(c){ return c.status==='Incubating'; });
      if(incubating.length===0){ el.innerHTML=''; return; }

      var now = new Date();
      // Find date range
      var allDates = [];
      incubating.forEach(function(c){
        allDates.push(new Date(c.set_date+'T00:00:00'));
        allDates.push(new Date(c.expected_hatch_date+'T00:00:00'));
      });
      var minDate = new Date(Math.min.apply(null, allDates));
      var maxDate = new Date(Math.max.apply(null, allDates));
      // Add 1 day padding
      minDate.setDate(minDate.getDate() - 1);
      maxDate.setDate(maxDate.getDate() + 1);
      var totalDays = daysBetween(minDate, maxDate);
      if(totalDays < 1) totalDays = 1;

      var barHeight = 26;
      var barGap = 6;
      var totalH = incubating.length * (barHeight + barGap) + 22;

      var html = '<div class="timeline-wrap"><h3>Incubation Timeline</h3>';
      html += '<div class="timeline-gantt" style="height:'+totalH+'px;position:relative">';

      // Today line
      var todayPct = ((now - minDate) / (maxDate - minDate)) * 100;
      if(todayPct >= 0 && todayPct <= 100){
        html += '<div class="timeline-today" style="left:'+todayPct.toFixed(1)+'%"><span class="timeline-today-label">Today</span></div>';
      }

      incubating.forEach(function(c, i){
        var setD = new Date(c.set_date+'T00:00:00');
        var hatchD = new Date(c.expected_hatch_date+'T00:00:00');
        var leftPct = ((setD - minDate) / (maxDate - minDate)) * 100;
        var widthPct = ((hatchD - setD) / (maxDate - minDate)) * 100;
        var elapsed = Math.max(0, (now - setD) / 86400000);
        var pct = Math.min(100, (elapsed/17)*100);
        var bg = pct >= 70 ? 'var(--dusty-rose)' : pct >= 40 ? 'var(--warning)' : 'var(--sage)';
        var top = 22 + i * (barHeight + barGap);
        var blName = bloodlineName(c.bloodline_id);
        html += '<div class="timeline-gantt-bar" style="left:'+leftPct.toFixed(1)+'%;width:'+Math.max(widthPct,3).toFixed(1)+'%;top:'+top+'px;height:'+barHeight+'px;background:'+bg+'" title="Clutch #'+c.id+(blName?' - '+blName:'')+'">';
        html += '#'+c.id;
        html += '</div>';
      });

      // Date axis
      html += '</div>';
      html += '<div class="timeline-date-axis"><span>'+minDate.toISOString().split('T')[0]+'</span><span>'+maxDate.toISOString().split('T')[0]+'</span></div>';
      html += '</div>';

      el.innerHTML = html;
    },

    _renderList: function(){
      var el = document.getElementById('clutch-list');
      if(!el) return;
      if(this._clutches.length===0){
        el.innerHTML = emptyState('&#x1F95A;','No clutches yet','+ Add Clutch','Page.Clutches.openModal()');
        return;
      }
      var now = new Date();
      var html='<div class="clutch-grid">';

      var sorted = this._clutches.slice().sort(function(a,b){
        if(a.status==='Incubating' && b.status!=='Incubating') return -1;
        if(a.status!=='Incubating' && b.status==='Incubating') return 1;
        return b.id - a.id;
      });

      sorted.forEach(function(c){
        var isIncubating = c.status==='Incubating';
        var muted = isIncubating ? '' : ' muted';
        var setD = new Date(c.set_date+'T00:00:00');
        var hatchD = new Date(c.expected_hatch_date+'T00:00:00');
        var elapsed = Math.max(0,(now-setD)/86400000);
        var day = Math.min(Math.floor(elapsed), 17);
        var pct = Math.min(100,(elapsed/17)*100);

        var blName = bloodlineName(c.bloodline_id);
        var eggs = c.eggs_set;
        var fertile = c.eggs_fertile!=null ? c.eggs_fertile : '?';
        var hatched = c.eggs_hatched!=null ? c.eggs_hatched : '?';

        // Ring color
        var ringColor = pct >= 70 ? 'var(--dusty-rose)' : pct >= 40 ? 'var(--warning)' : 'var(--sage)';
        var circumference = 2 * Math.PI * 40; // r=40
        var dashLen = isIncubating ? (pct / 100) * circumference : circumference;

        html += '<div class="clutch-card'+muted+'">';

        // Ring
        html += '<div class="clutch-ring-wrap">';
        html += '<svg viewBox="0 0 100 100" width="80" height="80">';
        html += '<circle cx="50" cy="50" r="40" fill="none" stroke="#e0d8d0" stroke-width="7"/>';
        html += '<circle cx="50" cy="50" r="40" fill="none" stroke="'+ringColor+'" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+dashLen.toFixed(1)+' '+circumference.toFixed(1)+'" transform="rotate(-90 50 50)"/>';
        if(isIncubating){
          html += '<text x="50" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="var(--charcoal)">'+day+'</text>';
          html += '<text x="50" y="62" text-anchor="middle" font-size="9" fill="#aaa">of 17</text>';
        } else {
          html += '<text x="50" y="54" text-anchor="middle" font-size="11" font-weight="600" fill="#aaa">'+c.status+'</text>';
        }
        html += '</svg></div>';

        // Body
        html += '<div class="clutch-card-body">';
        html += '<h4>Clutch #'+c.id+(blName ? ' &mdash; '+blName : '')+'</h4>';

        // Egg counts
        html += '<div class="clutch-egg-counts">';
        html += '<span><span class="egg-num">'+eggs+'</span><span class="egg-lbl">Set</span></span>';
        html += '<span><span class="egg-num">'+fertile+'</span><span class="egg-lbl">Fertile</span></span>';
        html += '<span><span class="egg-num">'+hatched+'</span><span class="egg-lbl">Hatched</span></span>';
        html += '</div>';

        // Key dates
        if(isIncubating){
          var candleDate = addDays(c.set_date, 7);
          var lockdownDate = addDays(c.set_date, 14);
          var hatchDate = c.expected_hatch_date;
          var events = [
            {name:'Set', date:c.set_date, past: now >= setD},
            {name:'Candle', date:candleDate, past: now >= new Date(candleDate+'T00:00:00')},
            {name:'Lockdown', date:lockdownDate, past: now >= new Date(lockdownDate+'T00:00:00')},
            {name:'Hatch', date:hatchDate, past: now >= hatchD}
          ];
          // Find next upcoming
          var nextIdx = -1;
          for(var i=0;i<events.length;i++){
            if(!events[i].past){ nextIdx = i; break; }
          }
          html += '<div class="clutch-dates">';
          events.forEach(function(ev, idx){
            var cls = idx === nextIdx ? ' highlight' : '';
            html += '<span class="'+cls+'" style="margin-right:.6rem">'+(idx===nextIdx?'&#x25B6; ':'')+ev.name+': '+ev.date+'</span>';
          });
          html += '</div>';

          html += '<div class="clutch-actions">';
          html += '<button class="status-btn" onclick="event.stopPropagation();Page.Clutches.showCandling('+c.id+')">Record Candling</button>';
          html += '<button class="status-btn" onclick="event.stopPropagation();Page.Clutches.showHatch('+c.id+')">Record Hatch</button>';
          html += '</div>';
          html += '<div id="clutch-inline-'+c.id+'"></div>';
        }

        // Hatch metrics for hatched clutches
        if(c.status === 'Hatched' && c.eggs_hatched != null){
          html += '<div class="hatch-metrics">';
          var fertile = c.eggs_fertile != null ? c.eggs_fertile : c.eggs_set;
          var fertilityRate = (fertile / c.eggs_set * 100);
          var hatchOfFertile = fertile > 0 ? (c.eggs_hatched / fertile * 100) : 0;
          var fcls = fertilityRate >= 80 ? 'metric-good' : fertilityRate >= 60 ? 'metric-warn' : 'metric-bad';
          var hcls = hatchOfFertile >= 75 ? 'metric-good' : hatchOfFertile >= 55 ? 'metric-warn' : 'metric-bad';
          html += '<span class="'+fcls+'">Fertility: '+fertilityRate.toFixed(0)+'%</span>';
          html += '<span class="'+hcls+'">Hatch: '+hatchOfFertile.toFixed(0)+'%</span>';
          if(c.eggs_stillborn) html += '<span class="metric-bad">Stillborn: '+c.eggs_stillborn+'</span>';
          if(c.eggs_quit) html += '<span class="metric-warn">Quit: '+c.eggs_quit+'</span>';
          if(c.eggs_infertile) html += '<span>Infertile: '+c.eggs_infertile+'</span>';
          if(c.eggs_damaged) html += '<span>Damaged: '+c.eggs_damaged+'</span>';
          html += '</div>';
        }

        html += '</div></div>';
      });
      html += '</div>';
      el.innerHTML = html;
    },

    showCandling: function(id){
      var el = document.getElementById('clutch-inline-'+id);
      if(!el) return;
      el.innerHTML='<div class="inline-form"><label>Fertile eggs</label><input type="number" id="candle-count-'+id+'" min="0"><button class="btn-primary" onclick="Page.Clutches.recordCandling('+id+')">Save</button><button class="btn-cancel" onclick="document.getElementById(\'clutch-inline-'+id+'\').innerHTML=\'\'">Cancel</button></div>';
    },
    showHatch: function(id){
      var clutch = this._clutches.find(function(c){ return c.id === id; });
      var eggs = clutch ? clutch.eggs_set : 0;
      var fertile = clutch && clutch.eggs_fertile != null ? clutch.eggs_fertile : '';
      var html = '<div class="modal-overlay" id="hatch-modal-overlay" onclick="if(event.target===this)Page.Clutches.closeHatchModal()">' +
        '<div class="modal"><h3>Record Hatch &mdash; Clutch #'+id+'</h3>' +
        '<label>Hatched Count</label><input id="mh-hatched" type="number" min="0" max="'+eggs+'" placeholder="How many chicks?">' +
        '<label>Stillborn</label><input id="mh-stillborn" type="number" min="0" value="0">' +
        '<label>Quit (died in shell)</label><input id="mh-quit" type="number" min="0" value="0">' +
        '<label>Infertile (clear eggs)</label><input id="mh-infertile" type="number" min="0" value="'+(fertile || 0)+'">' +
        '<label>Damaged</label><input id="mh-damaged" type="number" min="0" value="0">' +
        '<label>Hatch Notes</label><textarea id="mh-notes" placeholder="Optional notes about the hatch"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Clutches.closeHatchModal()">Cancel</button><button class="btn-primary" onclick="Page.Clutches.submitHatch('+id+')">Record Hatch</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeHatchModal: function(){
      var ov = document.getElementById('hatch-modal-overlay');
      if(ov) ov.remove();
    },
    recordCandling: async function(id){
      var count = parseInt(document.getElementById('candle-count-'+id).value);
      if(isNaN(count)) return;
      var result = await API.put('/api/clutches/'+id, {eggs_fertile: count});
      if(result) toast('Candling recorded: '+count+' fertile');
      this._load();
    },
    submitHatch: async function(id){
      var hatched = parseInt(document.getElementById('mh-hatched').value);
      if(isNaN(hatched)){ toast('Hatched count is required','error'); return; }
      var stillborn = parseInt(document.getElementById('mh-stillborn').value) || 0;
      var quit = parseInt(document.getElementById('mh-quit').value) || 0;
      var infertile = parseInt(document.getElementById('mh-infertile').value) || 0;
      var damaged = parseInt(document.getElementById('mh-damaged').value) || 0;
      var notes = document.getElementById('mh-notes').value.trim() || null;

      var body = {
        eggs_hatched: hatched, status: 'Hatched',
        eggs_stillborn: stillborn, eggs_quit: quit,
        eggs_infertile: infertile, eggs_damaged: damaged,
        hatch_notes: notes
      };

      var clutch = this._clutches.find(function(c){ return c.id === id; });
      // If fertile not set yet, compute from remaining
      if(clutch && clutch.eggs_fertile == null){
        body.eggs_fertile = clutch.eggs_set - infertile;
      }

      var result = await API.put('/api/clutches/'+id, body);
      this.closeHatchModal();
      if(result){
        toast('Hatch recorded: '+hatched+' chicks!');
        // Offer to create chick group if hatched > 0
        if(hatched > 0 && clutch){
          this._showChickGroupPrompt(id, hatched, clutch.bloodline_id);
        } else {
          this._load();
        }
      }
    },
    _showChickGroupPrompt: async function(clutchId, hatched, bloodlineId){
      var brooders = await API.get('/api/brooders') || [];
      var brOpts = '<option value="">-- No brooder --</option>';
      brooders.forEach(function(b){
        brOpts += '<option value="'+b.id+'">'+b.name+' ('+b.life_stage+')</option>';
      });
      var html = '<div class="modal-overlay" id="chickgroup-prompt-overlay" onclick="if(event.target===this)Page.Clutches.closeChickGroupPrompt()">' +
        '<div class="modal"><h3>Create Chick Group?</h3>' +
        '<p>'+hatched+' chicks hatched from Clutch #'+clutchId+'. Create a nursery group to track them?</p>' +
        '<label>Assign to Brooder</label><select id="mcg-brooder">'+brOpts+'</select>' +
        '<input type="hidden" id="mcg-clutch" value="'+clutchId+'">' +
        '<input type="hidden" id="mcg-count" value="'+hatched+'">' +
        '<input type="hidden" id="mcg-bloodline" value="'+(bloodlineId||'')+'">' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Clutches.closeChickGroupPrompt()">Skip</button><button class="btn-primary" onclick="Page.Clutches.submitChickGroup()">Create Group</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeChickGroupPrompt: function(){
      var ov = document.getElementById('chickgroup-prompt-overlay');
      if(ov) ov.remove();
      this._load();
    },
    submitChickGroup: async function(){
      var clutchId = parseInt(document.getElementById('mcg-clutch').value);
      var count = parseInt(document.getElementById('mcg-count').value);
      var bloodline = parseInt(document.getElementById('mcg-bloodline').value);
      var brooder = document.getElementById('mcg-brooder').value;
      var today = new Date().toISOString().split('T')[0];

      if(!bloodline){ toast('Clutch has no bloodline — set it first','error'); return; }

      var body = {
        clutch_id: clutchId,
        bloodline_id: bloodline,
        brooder_id: brooder ? parseInt(brooder) : null,
        initial_count: count,
        hatch_date: today,
        notes: null
      };
      var result = await API.post('/api/chick-groups', body);
      this.closeChickGroupPrompt();
      if(result){
        toast('Chick group #'+result.id+' created with '+count+' chicks!');
        Router.navigate('#/nursery');
      } else {
        toast('Failed to create chick group','error');
        this._load();
      }
    },
    openModal: function(){
      var blOpts = '<option value="">-- None --</option>';
      _bloodlines.forEach(function(bl){
        blOpts+='<option value="'+bl.id+'">'+bl.name+'</option>';
      });
      var today = new Date().toISOString().split('T')[0];
      var html = '<div class="modal-overlay" id="clutch-modal-overlay" onclick="if(event.target===this)Page.Clutches.closeModal()">' +
        '<div class="modal"><h3>Add Clutch</h3>' +
        '<label>Bloodline</label><select id="mc-bloodline">'+blOpts+'</select>' +
        '<label>Eggs Set</label><input id="mc-eggs" type="number" min="1" value="12">' +
        '<label>Set Date</label><input id="mc-date" type="date" value="'+today+'">' +
        '<label>Notes</label><textarea id="mc-notes" placeholder="Optional notes"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Clutches.closeModal()">Cancel</button><button class="btn-primary" onclick="Page.Clutches.submitClutch()">Add Clutch</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeModal: function(){
      var ov = document.getElementById('clutch-modal-overlay');
      if(ov) ov.remove();
    },
    submitClutch: async function(){
      var bloodline = document.getElementById('mc-bloodline').value;
      var eggs = parseInt(document.getElementById('mc-eggs').value);
      var setDate = document.getElementById('mc-date').value;
      var notes = document.getElementById('mc-notes').value.trim() || null;

      if(!eggs || !setDate){ toast('Eggs count and set date are required','error'); return; }

      var result = await API.post('/api/clutches', {
        breeding_pair_id: null,
        bloodline_id: bloodline ? parseInt(bloodline) : null,
        eggs_set: eggs, eggs_fertile: null, eggs_hatched: null,
        set_date: setDate, status: 'Incubating', notes: notes
      });
      this.closeModal();
      if(result) toast('Clutch #'+result.id+' created');
      else toast('Failed to create clutch','error');
      this._load();
    }
  };

  Page.Breeding = {
    _tab: 'groups',
    _groups: [],
    _suggestions: [],
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1F48D; Breeding</div></div>' +
        '<div class="tabs">' +
          '<div class="tab active" id="tab-groups" onclick="Page.Breeding.switchTab(\'groups\')">Groups</div>' +
          '<div class="tab" id="tab-suggestions" onclick="Page.Breeding.switchTab(\'suggestions\')">Pair Suggestions</div>' +
        '</div>' +
        '<div id="breeding-content">'+loadingHTML()+'</div>';
    },
    start: function(){
      this._tab = 'groups';
      this._load();
      addInterval(this._load.bind(this), 60000);
    },
    stop: function(){},
    _load: async function(){
      var bl = await API.get('/api/bloodlines');
      if(bl) _bloodlines = bl;
      var birds = await API.get('/api/birds');
      if(birds) _birds = birds;
      this._groups = await API.get('/api/breeding-groups') || [];
      this._suggestions = await API.get('/api/breeding/suggest') || [];
      this._renderContent();
    },
    switchTab: function(tab){
      this._tab = tab;
      document.getElementById('tab-groups').classList.toggle('active', tab==='groups');
      document.getElementById('tab-suggestions').classList.toggle('active', tab==='suggestions');
      this._renderContent();
    },
    _renderContent: function(){
      var el = document.getElementById('breeding-content');
      if(!el) return;
      if(this._tab === 'groups') this._renderGroups(el);
      else this._renderSuggestions(el);
    },
    _renderGroups: function(el){
      if(this._groups.length === 0){
        el.innerHTML = emptyState('&#x1F48D;','No breeding groups yet','','');
        return;
      }
      var html = '';
      this._groups.forEach(function(g){
        var male = findBird(g.male_id);
        var femaleCount = g.female_ids ? g.female_ids.length : 0;
        var ratioOk = femaleCount >= 3 && femaleCount <= 5;
        var ratioWarn = femaleCount >= 2 && femaleCount <= 6;
        var ratioCls = ratioOk ? 'good' : ratioWarn ? 'warn' : 'bad';
        var ratioText = '1:'+femaleCount;

        html += '<div class="breed-group-card">';
        html += '<h4>'+g.name+' <span class="ratio-badge '+ratioCls+'">'+ratioText+'</span></h4>';

        // Male
        html += '<div style="font-size:.78rem;color:#888;margin-bottom:.3rem">MALE</div>';
        html += '<div class="breed-birds">';
        if(male){
          html += '<span class="breed-bird-chip">'+bandDot(male.band_color, 10)+' '+birdLink(male.id)+' <span style="color:#888;font-size:.72rem">'+bloodlineName(male.bloodline_id)+'</span></span>';
        } else {
          html += '<span class="breed-bird-chip">'+birdLink(g.male_id)+'</span>';
        }
        html += '</div>';

        // Females
        html += '<div style="font-size:.78rem;color:#888;margin:.4rem 0 .3rem">FEMALES</div>';
        html += '<div class="breed-birds">';
        if(g.female_ids && g.female_ids.length > 0){
          g.female_ids.forEach(function(fid){
            var fb = findBird(fid);
            if(fb){
              html += '<span class="breed-bird-chip">'+bandDot(fb.band_color, 10)+' '+birdLink(fb.id)+' <span style="color:#888;font-size:.72rem">'+bloodlineName(fb.bloodline_id)+'</span></span>';
            } else {
              html += '<span class="breed-bird-chip">'+birdLink(fid)+'</span>';
            }
          });
        } else {
          html += '<span style="font-size:.8rem;color:#aaa;font-style:italic">No females assigned</span>';
        }
        html += '</div>';

        if(g.start_date) html += '<div style="font-size:.72rem;color:#aaa;margin-top:.4rem">Started: '+g.start_date+'</div>';
        html += '</div>';
      });
      el.innerHTML = html;
    },
    _renderSuggestions: function(el){
      if(this._suggestions.length === 0){
        el.innerHTML = emptyState('&#x1F48D;','Need at least 1 male and 1 female for pairing suggestions','','');
        return;
      }
      var safest = this._suggestions.filter(function(p){return p.safe}).slice(0,10);
      var risky = this._suggestions.filter(function(p){return !p.safe}).slice(0,5);
      var html = '';

      if(safest.length > 0){
        html += '<div style="font-size:.78rem;color:#999;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em;font-weight:600">Safe Pairings</div>';
        safest.forEach(function(p){
          var mBird = findBird(p.male_id);
          var fBird = findBird(p.female_id);
          html += '<div class="pair-row safe-pair">';
          html += '<div class="pair-info">';
          if(mBird) html += bandDot(mBird.band_color, 12)+' ';
          html += birdLink(p.male_id, 'Male #'+p.male_id);
          if(mBird) html += ' <span style="font-size:.75rem;color:#888">'+bloodlineName(mBird.bloodline_id)+'</span>';
          html += ' &times; ';
          if(fBird) html += bandDot(fBird.band_color, 12)+' ';
          html += birdLink(p.female_id, 'Female #'+p.female_id);
          if(fBird) html += ' <span style="font-size:.75rem;color:#888">'+bloodlineName(fBird.bloodline_id)+'</span>';
          html += '</div>';
          html += '<span class="coeff safe">'+p.coefficient.toFixed(3)+'</span>';
          html += '</div>';
        });
      }

      if(risky.length > 0){
        html += '<div style="font-size:.78rem;color:#999;margin:.8rem 0 .4rem;text-transform:uppercase;letter-spacing:.04em;font-weight:600">Risky Pairings</div>';
        risky.forEach(function(p){
          var mBird = findBird(p.male_id);
          var fBird = findBird(p.female_id);
          html += '<div class="pair-row risky-pair">';
          html += '<div class="pair-info">';
          if(mBird) html += bandDot(mBird.band_color, 12)+' ';
          html += birdLink(p.male_id, 'Male #'+p.male_id);
          if(mBird) html += ' <span style="font-size:.75rem;color:#888">'+bloodlineName(mBird.bloodline_id)+'</span>';
          html += ' &times; ';
          if(fBird) html += bandDot(fBird.band_color, 12)+' ';
          html += birdLink(p.female_id, 'Female #'+p.female_id);
          if(fBird) html += ' <span style="font-size:.75rem;color:#888">'+bloodlineName(fBird.bloodline_id)+'</span>';
          html += '</div>';
          html += '<span class="coeff risky">'+p.coefficient.toFixed(3)+'</span>';
          html += '</div>';
        });
      }

      if(!html) html = '<div class="no-data">No pair data available</div>';
      el.innerHTML = html;
    }
  };
