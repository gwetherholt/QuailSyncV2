      '</div>';
    },
    start: function(){
      addInterval(this._pollBrooder, 30000);
      addInterval(this._pollAlerts, 30000);
      // Delay headcount poll so brooder cards are rendered first
      var self = this;
      setTimeout(function(){ self._pollHeadcount(); }, 3000);
      addInterval(function(){ self._pollHeadcount(); }, 30000);
      // Issue #13: backfill hutch resident counts after cards render.
      setTimeout(function(){ self._pollHutchResidents(); }, 3000);
      addInterval(function(){ self._pollHutchResidents(); }, 30000);
      // Govee: backfill assigned-sensor readings onto each housing card.
      setTimeout(function(){ self._pollBrooderSensors(); }, 3000);
      addInterval(function(){ self._pollBrooderSensors(); }, 60000);
      // Trail cameras: backfill assigned-camera chips onto each housing card.
      setTimeout(function(){ self._pollBrooderCameras(); }, 3000);
      addInterval(function(){ self._pollBrooderCameras(); }, 60000);
      // Trail Cam Analytics: 7-day sparkline + activity heatmap per camera.
      this._pollTrailcamAnalytics();
      addInterval(function(){ self._pollTrailcamAnalytics(); }, 300000);
      // Indoor camera: live chick count + latest saved image + assignment.
      this._pollIndoorCam();
      addInterval(function(){ self._pollIndoorCam(); }, 30000);
      addInterval(this._pollStats, 60000);
      addInterval(this._pollFlock, 60000);
    },
    stop: function(){},

    // Sparkline temp cache: { brooderId: [temps...] } — seeded by _pollBrooder, appended by live WS
    _sparkCache: {},

    _buildSparkBars: function(temps, maxBars, barHeight){
      var pts = temps.slice(-maxBars);
      if(pts.length===0) return '';
      var tMin=Math.min.apply(null,pts), tMax=Math.max.apply(null,pts);
      var range=tMax-tMin||1;
      var bars='';
      pts.forEach(function(t){
        var h=Math.max(3,((t-tMin)/range)*barHeight);
        bars+='<div class="spark-bar" style="height:'+h+'px" title="'+t.toFixed(1)+'\u00b0F"></div>';
      });
      return bars;
    },

    _checkAlert: function(temp, hum){
      // Client-side quick check — doesn't know chick age, so uses the full
      // possible range (week 6 low to week 1 high). Real alerts come from the server.
      if(temp < 63 || temp > 102) return 'Temperature '+temp.toFixed(1)+'\u00b0F outside safe range';
      // Humidity alerts disabled — not critical for coturnix quail
      return null;
    },

    _staleTimers: {},
    _STALE_TIMEOUT_MS: 15000,

    _markOffline: function(bid){
      var card = document.querySelector('[data-brooder-id="'+bid+'"]');
      if(!card || card.getAttribute('data-sensor-status')==='offline') return;
      card.setAttribute('data-sensor-status','offline');
      card.style.opacity='0.55';
      var tempEl = card.querySelector('[data-field="temp"]');
      var humEl = card.querySelector('[data-field="hum"]');
      var alertEl = card.querySelector('[data-field="alert"]');
      if(tempEl) tempEl.innerHTML='<span style="color:#999">Offline</span>';
      if(humEl) humEl.innerHTML='<span style="color:#999">--</span>';
      if(alertEl) alertEl.innerHTML='<span style="color:#999">No signal</span>';
    },

    // Called from /ws/live onmessage — update one brooder card instantly from WS payload
    _updateFromWs: function(reading){
      var self = this;
      var temp = reading.temperature_f;
      var hum = reading.humidity_percent;
      var bid = reading.brooder_id || 'legacy';

      // Try to find the specific brooder card; fall back to legacy single-panel
      var card = document.querySelector('[data-brooder-id="'+bid+'"]');
      if(!card) card = document.querySelector('[data-brooder-id="legacy"]');
      if(!card) return;

      // Mark online — restore opacity and status
      card.setAttribute('data-sensor-status','online');
      card.style.opacity='1';

      // Reset staleness timer for this brooder
      if(self._staleTimers[bid]) clearTimeout(self._staleTimers[bid]);
      self._staleTimers[bid] = setTimeout(function(){ self._markOffline(bid); }, self._STALE_TIMEOUT_MS);

      // Update temp + humidity values
      var tempEl = card.querySelector('[data-field="temp"]');
      var humEl = card.querySelector('[data-field="hum"]');
      if(tempEl) tempEl.innerHTML = temp.toFixed(1)+'&deg;F';
      if(humEl) humEl.innerHTML = hum.toFixed(1)+'%';

      // Update sparkline cache + rebuild
      var key = String(bid);
      if(!this._sparkCache[key]) this._sparkCache[key] = [];
      this._sparkCache[key].push(temp);
      var maxBars = bid==='legacy' ? 30 : 20;
      var barH = bid==='legacy' ? 32 : 28;
      if(this._sparkCache[key].length > maxBars + 10) this._sparkCache[key] = this._sparkCache[key].slice(-maxBars);
      var sparkEl = card.querySelector('[data-field="spark"]');
      if(sparkEl) sparkEl.innerHTML = this._buildSparkBars(this._sparkCache[key], maxBars, barH);

      // Update alert state
      var alertMsg = this._checkAlert(temp, hum);
      var alertEl = card.querySelector('[data-field="alert"]');
      if(alertMsg){
        card.style.borderLeft = '4px solid var(--danger)';
        if(alertEl) alertEl.innerHTML = alertMsg;
        else {
          var div = document.createElement('div');
          div.setAttribute('data-field','alert');
          div.style.cssText = 'font-size:.7rem;color:var(--danger);margin-top:.3rem';
          div.textContent = alertMsg;
          card.appendChild(div);
        }
      } else {
        card.style.borderLeft = '4px solid var(--safe)';
        if(alertEl) alertEl.innerHTML = '';
      }
    },

    _pollBrooder: async function(){
      var self = Page.Dashboard;
      var el = document.getElementById('d-brooder');
      if(!el) return;
      var brooders = await API.get('/api/brooders');
      if(!brooders || brooders.length===0){
        var history = await API.get('/api/brooder/history?minutes=60');
        if(!history || history.length===0){ el.innerHTML=emptyState('&#x1F321;&#xFE0F;','No brooder readings yet','',null); return; }
        var latest=history[0];
        var temp=latest.temperature_f.toFixed(1);
        var hum=latest.humidity_percent.toFixed(1);
        var pts=history.slice().reverse().slice(-30);
        var temps=pts.map(function(p){return p.temperature_f});
        self._sparkCache['legacy'] = temps.slice();
        el.innerHTML='<div data-brooder-id="legacy" style="border-left:4px solid var(--safe)"><div class="reading-row"><div><span class="reading-label">Temperature</span><br><span class="reading-value" data-field="temp">'+temp+'&deg;F</span></div><div style="text-align:right"><span class="reading-label">Humidity</span><br><span class="reading-value" data-field="hum">'+hum+'%</span></div></div><div class="sparkline" data-field="spark">'+self._buildSparkBars(temps,30,32)+'</div><div data-field="alert"></div></div>';
        return;
      }
      // Multi-brooder — fetch all status/readings in parallel, plus the
      // chick-groups list once (issue #14 needs to know which brooders have
      // an Active group ready to graduate, so it can show the button).
      var fetches = brooders.map(function(b){
        return Promise.all([API.get('/api/brooders/'+b.id+'/status'), API.get('/api/brooders/'+b.id+'/readings?minutes=60')]);
      });
      var groupsPromise = API.get('/api/chick-groups');
      var results = await Promise.all(fetches);
      var allGroups = (await groupsPromise) || [];

      // Issue #11: group by housing_type. Hutches don't have sensors, so
      // their cards skip the temp/humidity/sparkline block.
      var SECTIONS = [
        { type: 'incubator', label: 'Incubators', icon: '&#x1F95A;' },  // egg
        { type: 'brooder',   label: 'Brooders',   icon: '&#x1F425;' },  // chick
        { type: 'hutch',     label: 'Hutches',    icon: '&#x1F426;' },  // bird
      ];
      var byType = { incubator: [], brooder: [], hutch: [] };
      for (var i = 0; i < brooders.length; i++) {
        var t = (brooders[i].housing_type || 'brooder').toLowerCase();
        if (!byType[t]) t = 'brooder';
        // The "ready" group for this brooder is the Active group whose
        // is_ready_to_transition=true. Server already does the date math.
        var readyGroup = null;
        for (var gi = 0; gi < allGroups.length; gi++) {
          var g = allGroups[gi];
          if (g.brooder_id === brooders[i].id && g.status === 'Active' && g.is_ready_to_transition) {
            readyGroup = g; break;
          }
        }
        byType[t].push({ b: brooders[i], status: results[i][0], readings: results[i][1], readyGroup: readyGroup });
      }

      function renderCard(entry) {
        var b = entry.b, status = entry.status, readings = entry.readings;
        var isHutch = (b.housing_type || 'brooder').toLowerCase() === 'hutch';
        var stageCls = b.life_stage==='Chick'?'background:#e8c8c8;color:#8b4513' : b.life_stage==='Adolescent'?'background:#d2dcc3;color:#2e5c1e' : 'background:#c8d8e8;color:#2e4a5c';
        var isOffline = !isHutch && status && status.sensor_status === 'offline';
        var alertBorder = isHutch ? 'border-left:4px solid #d4c5a0' :
          isOffline ? 'border-left:4px solid #aaa' :
          (status && status.has_alert) ? 'border-left:4px solid var(--danger)' : 'border-left:4px solid var(--safe)';
        var tempStr = '--', humStr = '--';
        if (!isHutch) {
          if (isOffline) {
            tempStr = '<span style="color:#999">Offline</span>';
            humStr = '<span style="color:#999">--</span>';
          } else {
            tempStr = status && status.latest_temp!=null ? status.latest_temp.toFixed(1)+'&deg;F' : '--';
            humStr = status && status.latest_humidity!=null ? status.latest_humidity.toFixed(1)+'%' : '--';
          }
        }
        // Two paths: offline → render trusted markup; alert message → render
        // *escaped* server-supplied text. The single combined `alertHtml`
        // path was being run through escapeHtml() which double-escaped the
        // offline `<span>` and rendered it as literal text.
        var alertOfflineMarkup = (!isHutch && isOffline) ? '<span style="color:#999">No signal</span>' : '';
        var alertMessage = (!isHutch && !isOffline && status && status.has_alert) ? status.alert_message : '';
        // Seed sparkline cache from REST data (no-op for hutches)
        var sparkTemps = [];
        if(!isHutch && readings && readings.length>0){
          var pts=readings.slice().reverse().slice(-20);
          sparkTemps=pts.map(function(p){return p.temperature_f});
        }
        self._sparkCache[String(b.id)] = sparkTemps.slice();
        var offlineStyle = isOffline ? 'opacity:0.55;' : '';
        var card = '<div data-brooder-id="'+b.id+'" data-sensor-status="'+(isOffline?'offline':'online')+'" style="background:var(--cream);border-radius:var(--radius);padding:.75rem;'+offlineStyle+alertBorder+'">';
        card+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem"><strong style="font-size:.88rem">'+escapeHtml(b.name)+'</strong><span style="font-size:.62rem;padding:2px 6px;border-radius:8px;'+stageCls+'">'+escapeHtml(b.life_stage)+'</span></div>';
        var hasCam = !!b.camera_url;
        card+='<div style="font-size:.65rem;margin-bottom:.25rem" data-field="cam-status">';
        if(hasCam){ card+='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--safe);margin-right:4px"></span><span style="color:var(--safe)">Cam</span>'; }
        card+='</div>';
        if (isHutch) {
          // No temp/humidity sensors expected; residents (housed birds) are
          // the primary signal here. `data-residents-hc` is updated by the
          // residents poll below. Clicking the count area opens the detail
          // modal (issue #13) — the inner "+ Assign" button stops propagation
          // so it still launches the picker directly.
          card+='<div data-residents-hc="'+b.id+'" onclick="Page.Dashboard.openHutchDetailModal('+b.id+')" title="View residents" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:.4rem;font-size:.78rem;padding:6px 8px;background:var(--beige);border-radius:6px;margin-bottom:.3rem">'
            + '<span><span class="reading-value" style="font-weight:600;color:#7d8b6a">--</span><span style="color:#999"> residents</span></span>'
            + '<button class="btn-cancel" style="font-size:.72rem;padding:3px 8px" onclick="event.stopPropagation();Page.Dashboard.openAssignBirdsModal('+b.id+')">+ Assign</button>'
            + '</div>';
        } else {
          card+='<div style="display:flex;gap:.5rem;align-items:flex-start;margin-bottom:.2rem">';
          card+='<div style="flex:1"><div class="reading-row"><div><span class="reading-label">Temp</span><br><span class="reading-value" data-field="temp">'+tempStr+'</span></div><div style="text-align:right"><span class="reading-label">Hum</span><br><span class="reading-value" data-field="hum">'+humStr+'</span></div></div></div>';
          if(hasCam){ card+='<a onclick="Router.navigate(\'#/cameras\')" title="View camera"><img class="camera-thumb" src="'+escapeHtml(b.camera_url)+'" width="100" height="75" onerror="this.style.display=\'none\'"></a>'; }
          card+='</div>';
          card+='<div class="sparkline" data-field="spark">'+self._buildSparkBars(sparkTemps,20,28)+'</div>';
        }
        // Residents label is housing-type aware: eggs for incubators, chicks
        // for brooders, birds for hutches. `data-housing-type` carries the
        // value through so the headcount poll (_pollHeadcount) can pick the
        // right plural when it updates the count later.
        var housing = (b.housing_type || 'brooder').toLowerCase();
        var residentsPlural = housing === 'incubator' ? 'eggs' : housing === 'hutch' ? 'birds' : 'chicks';
        var housingIcon = housing === 'incubator' ? '&#x1F95A;' : housing === 'hutch' ? '&#x1F426;' : '&#x1F425;';
        card+='<div data-field="headcount" data-brooder-hc="'+b.id+'" data-housing-type="'+housing+'" style="display:flex;align-items:center;gap:.4rem;font-size:.78rem;margin-top:.3rem;padding:4px 8px;background:var(--beige);border-radius:6px"><span style="font-size:1rem">'+housingIcon+'</span><span class="reading-value" style="font-weight:600;color:#7d8b6a">--</span><span style="color:#999"> '+residentsPlural+'</span></div>';
        // Assigned Govee sensor readings — backfilled by _pollBrooderSensors
        // after render (hidden until/unless this unit has sensors assigned).
        card+='<div data-brooder-sensors="'+b.id+'" style="display:none;margin-top:.3rem;font-size:.74rem"></div>';
        // Assigned trail cameras — backfilled by _pollBrooderCameras.
        card+='<div data-brooder-cameras="'+b.id+'" style="display:none;margin-top:.15rem;font-size:.74rem"></div>';
        if (alertOfflineMarkup) {
          card+='<div data-field="alert" style="font-size:.7rem;color:var(--danger);margin-top:.3rem">'+alertOfflineMarkup+'</div>';
        } else if (alertMessage) {
          card+='<div data-field="alert" style="font-size:.7rem;color:var(--danger);margin-top:.3rem">'+escapeHtml(alertMessage)+'</div>';
        }
        // Issue #14: "Graduate → Hutch" CTA on brooder cards whose Active
        // chick group is past the 5-week ready threshold. Hutches/incubators
        // never get this button — only brooders host chick groups.
        if (!isHutch && entry.readyGroup) {
          var rg = entry.readyGroup;
          card+='<button class="btn-primary" style="font-size:.75rem;padding:5px 8px;margin-top:.4rem;width:100%" '
            + 'title="Open the banding modal — picks a hutch as part of graduation" '
            + 'onclick="Router.navigate(\'#/nursery\');setTimeout(function(){if(Page.Nursery&&Page.Nursery.openGraduateModal)Page.Nursery.openGraduateModal('+rg.id+')},300)">'
            + 'Graduate &#x2192; Hutch (Group #'+rg.id+', '+rg.current_count+' chicks)'
            + '</button>';
        }
        card+='</div>';
        return card;
      }

      // "Add Housing" CTA — anchored at the top-right of the panel body so
      // it stays discoverable regardless of how many housing units exist.
      var html = '<div style="display:flex;justify-content:flex-end;margin-bottom:.5rem">'
        + '<button class="btn-primary" onclick="Page.Dashboard.openAddHousingModal()" style="font-size:.85rem;padding:6px 12px">+ Add Housing</button>'
        + '</div>';
      SECTIONS.forEach(function(section){
        var entries = byType[section.type];
        if (!entries.length) return;
        // Now that there's no umbrella header above these three sections, give
        // them a bit more visual weight so they read as primary section heads.
        html += '<h3 style="margin:.5rem 0 .5rem;font-size:1.0rem;color:#444;font-weight:600;border-bottom:1px solid var(--beige);padding-bottom:.3rem">'+section.icon+' '+section.label+' ('+entries.length+')</h3>';
        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem;margin-bottom:.75rem">';
        entries.forEach(function(e){ html += renderCard(e); });
        html += '</div>';
      });
      el.innerHTML = html;
    },

    _pollHeadcount: async function(){
      console.log('[headcount] polling...');
      // Find all headcount elements by their unique data-brooder-hc attribute
      var els = document.querySelectorAll('[data-brooder-hc]');
      if(!els.length){ console.log('[headcount] no headcount elements found'); return; }
      for(var i=0;i<els.length;i++){
        var hcEl=els[i];
        var bid=hcEl.getAttribute('data-brooder-hc');
        try{
          var hc=await API.get('/api/brooders/'+bid+'/headcount/latest');
          console.log('[headcount] brooder '+bid+': count='+( hc ? hc.count : 'null'));
          if(hc && hc.count!=null){
            var ts=new Date(hc.timestamp);
            var ago=Math.round((Date.now()-ts.getTime())/60000);
            var agoStr=ago<1?'just now':ago<60?ago+'m ago':Math.round(ago/60)+'h ago';
            // Pluralise + pick icon by housing type (carried via data-attr).
            var housing = (hcEl.getAttribute('data-housing-type') || 'brooder').toLowerCase();
            var singular = housing === 'incubator' ? 'egg' : housing === 'hutch' ? 'bird' : 'chick';
            var icon = housing === 'incubator' ? '&#x1F95A;' : housing === 'hutch' ? '&#x1F426;' : '&#x1F425;';
            var label = singular + (hc.count !== 1 ? 's' : '');
            hcEl.innerHTML='<span style="font-size:1rem">'+icon+'</span><span class="reading-value" style="font-weight:600;color:#7d8b6a">'+hc.count+'</span><span style="color:#7d8b6a"> '+label+'</span><span style="color:#999;margin-left:auto">'+agoStr+'</span>';
          }
        }catch(e){ console.log('[headcount] error for brooder '+bid+': '+e); hcEl.innerHTML=''; }
      }
    },

    /* ---------- Add Housing modal ---------- */
    // Suggested defaults per housing type — `lifeStage` auto-fills when the
    // user picks a Type, and the QR code seeds to "{type}-{n}" where n is
    // current housing count + 1 (best-effort, user can edit before submit).
    _housingDefaults: {
      incubator: { life_stage: 'Chick', qr_prefix: 'incubator' },
      brooder:   { life_stage: 'Chick', qr_prefix: 'brooder' },
      hutch:     { life_stage: 'Adult', qr_prefix: 'hutch' },
    },

    openAddHousingModal: async function(){
      // Use current count as a "next id" hint for the QR auto-fill.
      var existing = await API.get('/api/brooders');
      var nextN = ((existing && existing.length) || 0) + 1;
      var defaults = this._housingDefaults.brooder;
      var html = '<div class="modal-overlay" id="housing-modal-overlay" onclick="if(event.target===this)Page.Dashboard.closeAddHousingModal()">'
        + '<div class="modal"><h3>Add Housing</h3>'
        + '<label>Name</label><input id="m-housing-name" type="text" placeholder="e.g. Nurture Right 360">'
        + '<label>Type</label><select id="m-housing-type" onchange="Page.Dashboard._onHousingTypeChange()">'
        +   '<option value="incubator">Incubator</option>'
        +   '<option value="brooder" selected>Brooder</option>'
        +   '<option value="hutch">Hutch</option>'
        + '</select>'
        + '<label>Life Stage</label><select id="m-housing-stage">'
        +   '<option value="Chick">Chick</option>'
        +   '<option value="Adolescent">Adolescent</option>'
        +   '<option value="Adult">Adult</option>'
        + '</select>'
        + '<label>QR Code</label><input id="m-housing-qr" type="text" value="' + defaults.qr_prefix + '-' + nextN + '">'
        + '<label>Notes</label><textarea id="m-housing-notes" placeholder="Optional notes"></textarea>'
        + '<div class="modal-actions">'
        +   '<button class="btn-cancel" onclick="Page.Dashboard.closeAddHousingModal()">Cancel</button>'
        +   '<button class="btn-primary" onclick="Page.Dashboard.submitAddHousing()">Create</button>'
        + '</div>'
        + '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
      // Stash nextN so the type-change handler can rebuild the QR default.
      var modal = document.getElementById('housing-modal-overlay');
      if (modal) modal.dataset.nextN = String(nextN);
      // Set initial life-stage to match the default Brooder type.
      document.getElementById('m-housing-stage').value = defaults.life_stage;
    },

    _onHousingTypeChange: function(){
      var type = document.getElementById('m-housing-type').value;
      var defaults = this._housingDefaults[type] || this._housingDefaults.brooder;
      document.getElementById('m-housing-stage').value = defaults.life_stage;
      // Refresh QR auto-fill only if the user hasn't edited it away from the
      // previous prefix; otherwise leave their custom value alone.
      var modal = document.getElementById('housing-modal-overlay');
      var nextN = (modal && modal.dataset.nextN) || '1';
      var qrEl = document.getElementById('m-housing-qr');
      // Heuristic: if the field still looks like an auto-default ({prefix}-{n}),
      // regenerate. If it looks edited, leave it alone.
      var looksAuto = /^(incubator|brooder|hutch)-\d+$/.test(qrEl.value);
      if (looksAuto) qrEl.value = defaults.qr_prefix + '-' + nextN;
    },

    closeAddHousingModal: function(){
      var ov = document.getElementById('housing-modal-overlay');
      if (ov) ov.remove();
    },

    submitAddHousing: async function(){
      var name = document.getElementById('m-housing-name').value.trim();
      var type = document.getElementById('m-housing-type').value;
      var stage = document.getElementById('m-housing-stage').value;
      var qr = document.getElementById('m-housing-qr').value.trim();
      var notes = document.getElementById('m-housing-notes').value.trim() || null;
      if (!name) { toast('Name is required', 'error'); return; }
      var body = {
        name: name,
        lineage_id: null,
        life_stage: stage,
        qr_code: qr,
        notes: notes,
        camera_url: null,
        housing_type: type,
      };
      try {
        var resp = await API.post('/api/brooders', body);
        if (resp && resp.id != null) {
          toast('Housing created: ' + name);
          this.closeAddHousingModal();
          this._pollBrooder();
        } else {
          toast('Failed to create housing', 'error');
        }
      } catch (e) {
        toast('Failed to create housing: ' + (e && e.message ? e.message : 'unknown'), 'error');
      }
    },

    /* ---------- Govee sensors: per-card readings backfill ---------- */

    // Backfill assigned Govee sensor readings onto each housing card. One
    // GET /api/govee/sensors (DB-only, no Govee API hit) grouped by assignment;
    // cards with no assigned sensor stay hidden. Each card carries a
    // `data-brooder-sensors="<id>"` placeholder.
    _pollBrooderSensors: async function(){
      var els = document.querySelectorAll('[data-brooder-sensors]');
      if (!els.length) return;
      var sensors = await API.get('/api/govee/sensors');
      if (!sensors) return;
      var byBrooder = {};
      sensors.forEach(function(s){
        if (s.assignment && s.assignment.brooder_id != null) {
          (byBrooder[s.assignment.brooder_id] = byBrooder[s.assignment.brooder_id] || []).push(s);
        }
      });
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        var bid = parseInt(el.getAttribute('data-brooder-sensors'), 10);
        var list = byBrooder[bid] || [];
        if (!list.length) { el.style.display = 'none'; el.innerHTML = ''; continue; }
        el.style.display = '';
        el.innerHTML = list.map(function(s){
          var name = escapeHtml(s.name || s.govee_device_id || ('Sensor #' + s.id));
          var r = s.latest_reading;
          var reading = r
            ? (r.temperature_f.toFixed(1) + '°F · ' + r.humidity.toFixed(0) + '%')
            : 'no data';
          var warn = sensorIsStale(s.last_seen)
            ? ' <span title="No data in over ' + SENSOR_STALE_MINUTES + ' min" style="color:var(--warning)">⚠</span>'
            : '';
          return '<div style="display:flex;align-items:center;gap:.3rem;padding:2px 0">'
            + '<span>🌡️</span>'
            + '<span style="color:#888">' + name + ':</span>'
            + '<span style="font-weight:600;color:#7d8b6a">' + reading + '</span>' + warn
            + '</div>';
        }).join('');
      }
    },

    // Backfill assigned trail cameras onto each housing card. One
    // GET /api/trail-cameras grouped by assignment; cards with no assigned
    // camera stay hidden. Each card carries a `data-brooder-cameras="<id>"`.
    _pollBrooderCameras: async function(){
      var els = document.querySelectorAll('[data-brooder-cameras]');
      if (!els.length) return;
      var cameras = await API.get('/api/trail-cameras');
      if (!cameras) return;
      var byBrooder = {};
      cameras.forEach(function(c){
        if (c.assignment && c.assignment.brooder_id != null) {
          (byBrooder[c.assignment.brooder_id] = byBrooder[c.assignment.brooder_id] || []).push(c);
        }
      });
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        var bid = parseInt(el.getAttribute('data-brooder-cameras'), 10);
        var list = byBrooder[bid] || [];
        if (!list.length) { el.style.display = 'none'; el.innerHTML = ''; continue; }
        el.style.display = '';
        el.innerHTML = list.map(function(c){
          var name = escapeHtml(c.name || c.spypoint_camera_id || ('Camera #' + c.id));
          return '<div style="display:flex;align-items:center;gap:.3rem;padding:2px 0">'
            + '<span>📷</span>'
            + '<span style="color:#888">' + name + '</span>'
            + '<span style="color:#aaa"> · seen ' + relativeTime(c.last_seen) + '</span>'
            + '</div>';
        }).join('');
      }
    },

    /* ---------- Indoor Camera (live chick count + image + assignment) ---------- */

    // The indoor camera(s): GET /api/indoor-cameras for the registry + current
    // assignment, and /api/indoorcam/latest/{id} for the live chick count and
    // any saved image. Assignment is restricted to brooders + incubators.
    _pollIndoorCam: async function(){
      var el = document.getElementById('d-indoorcam');
      if(!el) return;
      var results = await Promise.all([
        API.get('/api/indoor-cameras'),
        API.get('/api/brooders'),
      ]);
      var cameras = results[0];
      // Indoor cameras only watch brooders/incubators — never hutches.
      this._indoorBrooders = (results[1] || []).filter(function(b){
        return b.housing_type === 'brooder' || b.housing_type === 'incubator';
      });
      if(!cameras){ el.innerHTML = emptyState('&#x1F4F7;','Could not load indoor camera','',''); return; }
      if(!cameras.length){
        el.innerHTML = emptyState('&#x1F4F7;','No indoor camera registered yet','','');
        return;
      }
      var self = this;
      var cards = await Promise.all(cameras.map(async function(cam){
        // 404 (no observations yet) -> null, handled in the renderer.
        var latest = await API.get('/api/indoorcam/latest/' + encodeURIComponent(cam.camera_id));
        return self._renderIndoorCamCard(cam, latest);
      }));
      el.innerHTML = '<div class="indoorcam-cards">' + cards.join('') + '</div>';
    },

    _indoorBrooderOptions: function(){
      return this._indoorBrooders.map(function(b){
        var kind = b.housing_type === 'incubator' ? ' (incubator)' : '';
        return '<option value="'+b.id+'">'+escapeHtml(b.name)+kind+'</option>';
      }).join('');
    },

    _renderIndoorCamCard: function(cam, latest){
      var title = escapeHtml(cam.name || cam.camera_id);

      // Live count + when it was captured.
      var countHtml;
      if(latest && latest.detection_count != null){
        var n = latest.detection_count;
        countHtml = '<div style="font-size:1.4rem;font-weight:700;color:var(--sage-dark)">'
          + n + ' chick' + (n === 1 ? '' : 's') + ' detected</div>'
          + '<div style="color:#888;font-size:.8rem">' + relativeTime(latest.timestamp) + '</div>';
      } else {
        countHtml = '<div style="color:#999">No detections yet</div>';
      }

      // Saved image, if this observation kept one (most won't). Prefer the
      // annotated frame (boxes drawn) when it's on disk; hide on 404, e.g. when
      // the frame was uploaded to Roboflow and then deleted.
      var imgUrl = (latest && (latest.annotated_image_url || latest.image_url)) || null;
      var imgHtml = '';
      if(imgUrl){
        // Cache-bust: the rolling latest.jpg keeps the same URL but changes each
        // cycle, so key the <img> by the observation timestamp to force a reload.
        var src = encodeURI(imgUrl) + (latest.timestamp ? ('?v=' + encodeURIComponent(latest.timestamp)) : '');
        imgHtml = '<img src="' + src + '" alt="latest indoor frame" '
          + 'style="width:100%;max-width:320px;border-radius:10px;margin-top:.6rem;display:block" '
          + 'onerror="this.style.display=\'none\'">';
      }

      // Assignment status + control (brooders/incubators only).
      var assignHtml;
      if(cam.assignment){
        var kind = cam.assignment.housing_type ? ' ('+escapeHtml(cam.assignment.housing_type)+')' : '';
        assignHtml = '<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.7rem">'
          + '<span style="color:#888">Watching</span>'
          + '<span style="font-weight:600;color:var(--sage-dark)">'+escapeHtml(cam.assignment.brooder_name)+kind+'</span>'
          + '<button class="status-btn" onclick="Page.Dashboard.unassignIndoorCam('+cam.id+')">Unassign</button></div>';
      } else if(this._indoorBrooders.length){
        assignHtml = '<div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-top:.7rem">'
          + '<span style="color:#999">Unassigned</span>'
          + '<select id="indoorcam-assign-'+cam.id+'" style="padding:.35rem;border-radius:6px;border:1px solid #ccc">'+this._indoorBrooderOptions()+'</select>'
          + '<button class="btn-primary" style="padding:.35rem .7rem" onclick="Page.Dashboard.assignIndoorCam('+cam.id+')">Assign</button></div>';
      } else {
        assignHtml = '<div style="color:#999;margin-top:.7rem">Unassigned &middot; no brooders or incubators to assign</div>';
      }

      return '<div class="indoorcam-card" style="border:1px solid var(--border,#e6e0d8);border-radius:12px;padding:1rem;background:#fff">'
        + '<div style="font-weight:600;margin-bottom:.4rem">' + title + '</div>'
        + countHtml + imgHtml + assignHtml
        + '</div>';
    },

    assignIndoorCam: async function(camId){
      var sel = document.getElementById('indoorcam-assign-'+camId);
      if(!sel || !sel.value){ toast('Select a brooder or incubator first','error'); return; }
      try {
        var resp = await fetch('/api/indoor-cameras/'+camId+'/assign', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ brooder_id: parseInt(sel.value, 10) }),
        });
        if(!resp.ok){ var msg = await resp.text(); toast(msg || 'Assign failed','error'); return; }
        toast('Indoor camera assigned');
        this._pollIndoorCam();
      } catch(e){ toast('Assign failed: '+(e && e.message ? e.message : 'network error'),'error'); }
    },

    unassignIndoorCam: async function(camId){
      if(!confirm('Unassign the indoor camera?')) return;
      try {
        var resp = await fetch('/api/indoor-cameras/'+camId+'/assign', { method: 'DELETE' });
        if(!resp.ok){ var msg = await resp.text(); toast(msg || 'Unassign failed','error'); return; }
        toast('Indoor camera unassigned');
        this._pollIndoorCam();
      } catch(e){ toast('Unassign failed','error'); }
    },

    /* ---------- Trail Cam Analytics (7-day bird-count trends) ---------- */

    // Fetch each camera with observations, pull its last 7 days of history,
    // and render a per-camera card: summary stats, a bird-count line chart
    // (with an optional temperature overlay) and an hour-of-day heatmap.
    _pollTrailcamAnalytics: async function(){
      var el = document.getElementById('d-trailcam');
      if(!el) return;
      var cameras = await API.get('/api/trailcam/cameras');
      if(!cameras){ el.innerHTML = emptyState('&#x1F4F8;','Could not load trail cam data','',''); return; }
      if(cameras.length === 0){
        el.innerHTML = emptyState('&#x1F4F8;','No trail cam observations yet','','');
        return;
      }
      var self = this;
      var cards = await Promise.all(cameras.map(async function(cam){
        var history = await API.get('/api/trailcam/history/' + encodeURIComponent(cam.camera_id) + '?hours=168');
        return self._renderCameraAnalytics(cam, history || []);
      }));
      el.innerHTML = '<div class="trailcam-analytics">' + cards.join('') + '</div>';
    },

    // Build one camera's analytics card from its 7-day observation history
    // (oldest-first array of {bird_count, ambient_temperature_f, created_at}).
    _renderCameraAnalytics: function(cam, history){
      var label = escapeHtml(cam.label || cam.camera_id);
      if(!history.length){
        return '<div class="tca-card"><div class="tca-title">' + label + '</div>'
          + '<div class="tca-empty">No observations in the last 7 days.</div></div>';
      }

      // --- summary stats -------------------------------------------------
      var counts = history.map(function(o){ return o.bird_count || 0; });
      var total = counts.length;
      var sum = counts.reduce(function(a,b){ return a+b; }, 0);
      var avg = sum / total;
      var max = Math.max.apply(null, counts);

      // hour-of-day buckets (local time): running sum + n per hour.
      var hourSum = new Array(24).fill(0), hourN = new Array(24).fill(0);
      history.forEach(function(o){
        var d = parseServerTime(o.created_at || o.timestamp);
        if(!d) return;
        var h = d.getHours();
        hourSum[h] += (o.bird_count || 0);
        hourN[h] += 1;
      });
      var hourAvg = hourSum.map(function(s, i){ return hourN[i] ? s / hourN[i] : 0; });
      var peakHour = 0, peakVal = -1;
      for(var i=0;i<24;i++){ if(hourN[i] && hourAvg[i] > peakVal){ peakVal = hourAvg[i]; peakHour = i; } }
      var mostActive = peakVal < 0 ? '&mdash;' : tcaPad2(peakHour) + ':00';
      var last = history[history.length - 1];
      var lastSeen = relativeTime(last.created_at || last.timestamp);

      // temperatures present? collect (count, temp) aligned for overlay.
      var temps = history.map(function(o){
        var t = o.ambient_temperature_f;
        return (t === null || t === undefined) ? null : Number(t);
      });
      var hasTemp = temps.some(function(t){ return t !== null && !isNaN(t); });
      var lastTemp = null;
      for(var j=temps.length-1;j>=0;j--){ if(temps[j] !== null && !isNaN(temps[j])){ lastTemp = temps[j]; break; } }

      var statsHtml = '<div class="tca-stats">'
        + '<div class="tca-stat"><span class="tca-stat-num">' + total + '</span><span class="tca-stat-label">observations</span></div>'
        + '<div class="tca-stat"><span class="tca-stat-num">' + avg.toFixed(1) + '</span><span class="tca-stat-label">avg birds</span></div>'
        + '<div class="tca-stat"><span class="tca-stat-num">' + max + '</span><span class="tca-stat-label">max birds</span></div>'
        + '<div class="tca-stat"><span class="tca-stat-num">' + mostActive + '</span><span class="tca-stat-label">most active</span></div>'
        + (hasTemp && lastTemp !== null ? '<div class="tca-stat"><span class="tca-stat-num">' + lastTemp.toFixed(0) + '°F</span><span class="tca-stat-label">last temp</span></div>' : '')
        + '</div>';

      var chartHtml = this._tcaLineChart(counts, hasTemp ? temps : null);
      var heatHtml = this._tcaHeatmap(hourAvg, hourN);

      return '<div class="tca-card">'
        + '<div class="tca-head"><span class="tca-title">' + label + '</span>'
        + '<span class="tca-last">last seen ' + lastSeen + '</span></div>'
        + statsHtml
        + '<div class="tca-section-label">Bird count'
        + (hasTemp ? ' <span style="color:var(--dusty-rose,#D4A0A0)">&middot; temp</span>' : '')
        + ' &mdash; last 7 days</div>'
        + chartHtml
        + '<div class="tca-section-label">Activity by hour of day</div>'
        + heatHtml
        + '</div>';
    },

    // SVG line chart of bird counts (sage) with an optional temperature overlay
    // (dusty-rose, scaled to its own range). `counts`/`temps` share the x-axis;
    // null temp points break the temperature line into segments.
    _tcaLineChart: function(counts, temps){
      var W = 100, H = 36, pad = 2; // viewBox units; SVG scales to container width.
      var n = counts.length;
      function xAt(i){ return n <= 1 ? W/2 : pad + (i/(n-1)) * (W - 2*pad); }
      function pathFor(vals, vMin, vMax){
        var range = (vMax - vMin) || 1;
        var d = '', started = false;
        for(var i=0;i<vals.length;i++){
          var v = vals[i];
          if(v === null || v === undefined || isNaN(v)){ started = false; continue; }
          var y = (H - pad) - ((v - vMin) / range) * (H - 2*pad);
          d += (started ? ' L' : ' M') + xAt(i).toFixed(2) + ' ' + y.toFixed(2);
          started = true;
        }
        return d.trim();
      }
      var cMax = Math.max.apply(null, counts), cMin = 0;
      var birdPath = pathFor(counts, cMin, cMax);
      var svg = '<svg class="tca-chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" role="img">';
      if(temps){
        var tv = temps.filter(function(t){ return t !== null && !isNaN(t); });
        if(tv.length){
          var tMin = Math.min.apply(null, tv), tMax = Math.max.apply(null, tv);
          var tempPath = pathFor(temps, tMin, tMax);
          if(tempPath) svg += '<path d="' + tempPath + '" fill="none" stroke="var(--dusty-rose,#D4A0A0)" stroke-width="0.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>';
        }
      }
      if(birdPath) svg += '<path d="' + birdPath + '" fill="none" stroke="var(--sage-dark,#9ab085)" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>';
      svg += '</svg>';
      return svg;
    },

    // 24-column hour-of-day heatmap of average bird count, light→dark green.
    // Hours with no observations render as a flat "no data" cell.
    _tcaHeatmap: function(hourAvg, hourN){
      var max = Math.max.apply(null, hourAvg);
      if(max <= 0) max = 1;
      var cells = '';
      for(var h=0; h<24; h++){
        var hasData = hourN[h] > 0;
        var frac = hasData ? hourAvg[h] / max : 0;
        // light (#eef3e6) → dark green (#3f6b2e) by interpolation.
        var bg = hasData ? tcaLerpGreen(frac) : '#f0f0f0';
        var title = tcaPad2(h) + ':00 — ' + (hasData ? hourAvg[h].toFixed(1) + ' avg birds (' + hourN[h] + ' obs)' : 'no data');
        var lbl = (h % 6 === 0) ? '<span class="tca-hm-tick">' + h + '</span>' : '';
        cells += '<div class="tca-hm-cell" style="background:' + bg + '" title="' + title + '">' + lbl + '</div>';
      }
      return '<div class="tca-heatmap">' + cells + '</div>';
    },

    /* ---------- Issue #13: hutch residents (assign / unassign) ---------- */

    // Called after _pollBrooder renders to backfill resident counts on
    // every hutch card. Each card has `data-residents-hc="<id>"` we look up.
    // The headcount is purely "Active birds housed here right now" — the
    // server's active_bird_count. Graduated chick groups are provenance only
    // (shown in the detail modal) and never drive this number, so culls/sales/
    // deaths since graduation are reflected.
    _pollHutchResidents: async function(){
      var els = document.querySelectorAll('[data-residents-hc]');
      if (!els.length) return;
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        var hid = el.getAttribute('data-residents-hc');
        try {
          var res = await API.get('/api/brooders/' + hid + '/residents');
          var count = (res && res.active_bird_count != null) ? res.active_bird_count : 0;
          var countEl = el.querySelector('.reading-value');
          if (countEl) countEl.textContent = String(count);
        } catch (e) { /* leave the placeholder */ }
      }
    },

    openAssignBirdsModal: async function(housingId) {
      // Fetch all birds and filter to active unhoused — server returns the
      // full list cheaply, client-side filter is fine.
      var birds = await API.get('/api/birds') || [];
      var unhoused = birds.filter(function(b) {
        return b.housing_id == null && (b.status || '').toLowerCase() === 'active';
      });
      var rows = unhoused.length === 0
        ? '<p style="color:#888;font-size:.85rem">No unhoused active birds available.</p>'
        : unhoused.map(function(b) {
            var bandHtml = b.band_color ? '<span style="color:#888;font-size:.72rem"> · band: ' + escapeHtml(b.band_color) + '</span>' : '';
            var sex = b.sex ? '<span style="color:#888;font-size:.72rem">' + escapeHtml(b.sex) + '</span>' : '';
            return '<label style="display:flex;align-items:center;gap:.5rem;padding:4px 0">'
              + '<input type="checkbox" class="m-assign-bird" value="' + b.id + '">'
              + '<span>Bird #' + b.id + '</span>' + (sex ? ' ' + sex : '') + bandHtml
              + '</label>';
          }).join('');
      var html = '<div class="modal-overlay" id="assign-modal-overlay" onclick="if(event.target===this)Page.Dashboard.closeAssignBirdsModal()">'
        + '<div class="modal"><h3>Assign Birds</h3>'
        + '<div style="max-height:50vh;overflow-y:auto;margin:.5rem 0">' + rows + '</div>'
        + '<div class="modal-actions">'
        +   '<button class="btn-cancel" onclick="Page.Dashboard.closeAssignBirdsModal()">Cancel</button>'
        +   '<button class="btn-primary" onclick="Page.Dashboard.submitAssignBirds(' + housingId + ')">Assign</button>'
        + '</div>'
        + '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },

    closeAssignBirdsModal: function(){
      var ov = document.getElementById('assign-modal-overlay');
      if (ov) ov.remove();
    },

    submitAssignBirds: async function(housingId) {
      var checks = document.querySelectorAll('.m-assign-bird:checked');
      var ids = Array.prototype.map.call(checks, function(c) { return parseInt(c.value, 10); });
      if (ids.length === 0) { toast('Select at least one bird', 'error'); return; }
      try {
        var resp = await API.post('/api/brooders/' + housingId + '/assign-birds', { bird_ids: ids });
        if (resp && resp.updated != null) {
          toast('Assigned ' + resp.updated + ' bird' + (resp.updated !== 1 ? 's' : ''));
          this.closeAssignBirdsModal();
          this._pollBrooder();
          // If the hutch detail modal is open behind this picker, refresh it
          // so the just-assigned birds appear without forcing a close/reopen.
          var detail = document.getElementById('hutch-detail-overlay');
          if (detail) this._renderHutchDetailContents(housingId);
        } else {
          toast('Failed to assign birds', 'error');
        }
      } catch (e) {
        toast('Failed to assign birds: ' + (e && e.message ? e.message : 'unknown'), 'error');
      }
    },

    /* ---------- Issue #13: hutch detail modal (residents + unassign) ---------- */

    // Opens a modal showing the hutch's current residents with band-color
    // swatch + lineages + a per-bird Unassign action. The contents render
    // inside `#hutch-detail-body` so unassign / assign refreshes can rebuild
    // just the list without re-mounting the modal frame.
    openHutchDetailModal: async function(housingId) {
      var existing = document.getElementById('hutch-detail-overlay');
      if (existing) existing.remove();
      // Modal skeleton — body is filled by _renderHutchDetailContents so we
      // can re-render after an assign/unassign without flicker.
      var skeleton = '<div class="modal-overlay" id="hutch-detail-overlay" onclick="if(event.target===this)Page.Dashboard.closeHutchDetailModal()">'
        + '<div class="modal" style="min-width:360px;max-width:520px">'
        +   '<h3 id="hutch-detail-title">Hutch Residents</h3>'
        +   '<div id="hutch-detail-body">'+loadingHTML()+'</div>'
        +   '<div class="modal-actions" style="flex-wrap:wrap">'
        +     '<button class="btn-cancel" onclick="Page.Dashboard.closeHutchDetailModal()">Close</button>'
        +     '<button class="status-btn" onclick="Page.Dashboard.openAssignGradGroupModal('+housingId+')">+ Graduated Group</button>'
        +     '<button class="btn-primary" onclick="Page.Dashboard.openAssignBirdsModal('+housingId+')">+ Assign Birds</button>'
        +   '</div>'
        + '</div></div>';
      document.body.insertAdjacentHTML('beforeend', skeleton);
      await this._renderHutchDetailContents(housingId);
    },

    _renderHutchDetailContents: async function(housingId) {
      var bodyEl = document.getElementById('hutch-detail-body');
      var titleEl = document.getElementById('hutch-detail-title');
      if (!bodyEl) return;
      try {
        // The residents endpoint returns birds with their lineages already
        // populated. There's no single-id GET on /api/brooders/{id}, so we
        // pull the list once to label the modal.
        var results = await Promise.all([
          API.get('/api/brooders'),
          API.get('/api/brooders/' + housingId + '/residents'),
        ]);
        var all = results[0] || [];
        var hutch = null;
        for (var i = 0; i < all.length; i++) {
          if (all[i].id === housingId) { hutch = all[i]; break; }
        }
        if (hutch && titleEl) titleEl.textContent = hutch.name + ' — Residents';

        // Issue #14: the /residents endpoint now returns graduated chick
        // groups too (chick_groups with status=Graduated and housing_id=this
        // hutch). They render as a separate section above individual birds.
        var residentsResp = results[1] || {};
        var groups = (residentsResp.chick_groups || []).filter(function(g) {
          return (g.status === 'Graduated');
        });
        var birds = residentsResp.individual_birds || [];

        if (groups.length === 0 && birds.length === 0) {
          bodyEl.innerHTML = '<p style="color:#888;font-size:.85rem;margin:.5rem 0">No residents in this hutch yet.</p>';
          return;
        }

        // Birds that belong to one of the visible groups are nested under
        // that group rather than listed twice. Birds without a group go to
        // the bottom "Individual birds" section.
        var birdsByGroup = {};
        var ungrouped = [];
        for (var bi = 0; bi < birds.length; bi++) {
          var b = birds[bi];
          if (b.chick_group_id != null && groups.find(function(g){ return g.id === b.chick_group_id; })) {
            (birdsByGroup[b.chick_group_id] = birdsByGroup[b.chick_group_id] || []).push(b);
          } else {
            ungrouped.push(b);
          }
        }

        function renderBirdRow(b) {
          var dot = bandDot(b.band_color || '#ccc', 16);
          var sex = b.sex ? escapeHtml(b.sex) : '—';
          var lineages = formatLineages(b.lineages) || '<span style="color:#bbb">(no lineage)</span>';
          return '<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem .2rem;border-bottom:1px solid var(--beige)">'
            +   '<span style="flex-shrink:0">' + dot + '</span>'
            +   '<div style="flex:1;min-width:0">'
            +     '<div style="font-size:.82rem">' + birdLink(b.id) + ' <span style="color:#888;font-size:.72rem">· ' + sex + '</span></div>'
            +     '<div style="font-size:.7rem;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + lineages + '</div>'
            +   '</div>'
            +   '<button class="btn-cancel" style="font-size:.7rem;padding:3px 8px" onclick="Page.Dashboard.unassignBirdFromHutch(' + housingId + ',' + b.id + ')">Unassign</button>'
            + '</div>';
        }

        var html = '';
        groups.forEach(function(g) {
          var groupLineages = formatLineages(g.lineages) || '<span style="color:#bbb">(no lineage)</span>';
          var groupBirds = (birdsByGroup[g.id] || []);
          html += '<div style="margin-bottom:.6rem;border:1px solid var(--beige);border-radius:8px;overflow:hidden">'
            +   '<div style="display:flex;align-items:center;gap:.5rem;background:var(--beige);padding:.4rem .5rem">'
            +     '<strong style="font-size:.82rem">Group #' + g.id + '</strong>'
            +     '<span style="font-size:.72rem;color:#888">' + groupLineages + ' · ' + g.current_count + ' birds · hatched ' + escapeHtml(g.hatch_date) + '</span>'
            +     '<button class="btn-cancel" style="margin-left:auto;font-size:.7rem;padding:3px 8px" onclick="Page.Dashboard.unassignGraduatedGroup(' + housingId + ',' + g.id + ')">Unassign group</button>'
            +   '</div>';
          if (groupBirds.length > 0) {
            html += '<div>' + groupBirds.map(renderBirdRow).join('') + '</div>';
          } else {
            html += '<div style="padding:.4rem .5rem;font-size:.72rem;color:#888">No birds with this group id yet.</div>';
          }
          html += '</div>';
        });
        if (ungrouped.length > 0) {
          if (groups.length > 0) {
            html += '<div style="font-size:.72rem;color:#888;margin:.5rem 0 .25rem">Individual birds</div>';
          }
          html += ungrouped.map(renderBirdRow).join('');
        }
        bodyEl.innerHTML = '<div style="max-height:50vh;overflow-y:auto">' + html + '</div>';
      } catch (e) {
        bodyEl.innerHTML = '<p style="color:var(--danger);font-size:.85rem">Failed to load residents: ' + escapeHtml(e && e.message ? e.message : 'unknown') + '</p>';
      }
    },

    /* ---------- Issue #14: assign a graduated group to a hutch ---------- */

    // Picker showing every Graduated group whose housing_id is currently
    // NULL or pointing somewhere other than this hutch. Hidden when none
    // are available so the button doesn't pop an empty list.
    openAssignGradGroupModal: async function(housingId) {
      var groups = await API.get('/api/chick-groups') || [];

      });

              + '<input type="radio" name="grad-group-pick" class="m-grad-group" value="' + g.id + '">'
              + '<span style="flex:1"><strong>Group #' + g.id + '</strong> <span style="color:#888;font-size:.72rem">· ' + lineages + ' · ' + g.current_count + ' birds</span>' + where + '</span>'
              + '</label>';
          }).join('');
      var html = '<div class="modal-overlay" id="grad-pick-overlay" onclick="if(event.target===this)Page.Dashboard.closeAssignGradGroupModal()">'
        + '<div class="modal" style="max-width:480px"><h3>Assign Graduated Group</h3>'
        + '<div style="max-height:50vh;overflow-y:auto;margin:.5rem 0">' + rows + '</div>'
        + '<div class="modal-actions">'
        +   '<button class="btn-cancel" onclick="Page.Dashboard.closeAssignGradGroupModal()">Cancel</button>'
        +   '<button class="btn-primary" onclick="Page.Dashboard.submitAssignGradGroup(' + housingId + ')">Assign</button>'
        + '</div>'
        + '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },

    closeAssignGradGroupModal: function() {
      var ov = document.getElementById('grad-pick-overlay');
      if (ov) ov.remove();
    },

    submitAssignGradGroup: async function(housingId) {
      var picked = document.querySelector('.m-grad-group:checked');
      if (!picked) { toast('Select a group', 'error'); return; }
      var groupId = parseInt(picked.value, 10);
      // Direct fetch (not API.post, which swallows the body on non-2xx) so we
      // can surface the server's warning — e.g. a group that hasn't been banded
      // yet has no individual bird records and can't be housed in a hutch.
      try {
        var r = await fetch('/api/brooders/' + housingId + '/assign-graduated-group', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ group_id: groupId }),
        });
        if (!r.ok) {
          var msg = await r.text();
          toast(msg || 'Failed to assign group', 'error');
          return;
        }
        var resp = await r.json();
        toast('Group #' + resp.group_id + ' assigned (' + resp.birds_updated + ' birds)');
        this.closeAssignGradGroupModal();
        // Detail modal stays open behind the picker — refresh it so the
        // new group appears immediately.
        var detail = document.getElementById('hutch-detail-overlay');
        if (detail) await this._renderHutchDetailContents(housingId);
        this._pollBrooder();
      } catch (e) {
        toast('Failed to assign group: ' + (e && e.message ? e.message : 'unknown'), 'error');
      }
    },

    // Detaches a graduated group from this hutch by clearing chick_groups.housing_id
    // and unhousing every bird that came from the group. Backend doesn't have
    // a dedicated endpoint — we use PUT /api/chick-groups/{id} (housing_id=null)
    // plus the existing unassign-birds batch endpoint.
    unassignGraduatedGroup: async function(housingId, groupId) {
      try {
        // Find the birds in this group (we already fetched them as residents,
        // but re-fetch to be safe in case the modal is stale).
        var residents = await API.get('/api/brooders/' + housingId + '/residents') || {};
        var birdIds = (residents.individual_birds || [])
          .filter(function(b){ return b.chick_group_id === groupId; })
          .map(function(b){ return b.id; });

        // Clear the group's housing_id first.
        var groupResp = await API.put('/api/chick-groups/' + groupId, { housing_id: null });
        if (groupResp === null) {
          toast('Failed to unassign group', 'error');
          return;
        }
        // Then unassign every bird in the group from this hutch.
        if (birdIds.length > 0) {
          await API.post('/api/brooders/' + housingId + '/unassign-birds', { bird_ids: birdIds });
        }
        toast('Group #' + groupId + ' unassigned');
        await this._renderHutchDetailContents(housingId);
        this._pollBrooder();
      } catch (e) {
        toast('Failed to unassign group: ' + (e && e.message ? e.message : 'unknown'), 'error');
      }
    },

    _pollAlerts: async function(){
      var data = await API.get('/api/alerts?minutes=120');
      var el = document.getElementById('d-alerts');
      var viewAll = document.getElementById('d-alerts-viewall');
      if(!el) return;
      if(!data || data.length===0){ el.innerHTML='<div class="no-data" style="padding:.5rem">All clear &mdash; no recent alerts</div>'; if(viewAll) viewAll.style.display='none'; return; }
      var html='';
      var show = data.slice(0,5);
      show.forEach(function(a){
        var cls = a.severity==='Critical'?'critical':'warning';
        var time = a.timestamp ? (a.timestamp.split(' ').pop()||'') : '';
        html+='<div class="alert-item '+cls+'"><span class="alert-time">'+escapeHtml(time)+'</span>'+escapeHtml(a.message)+'</div>';
      });
      el.innerHTML=html;
      if(viewAll && data.length>5) viewAll.style.display='';
      else if(viewAll) viewAll.style.display='none';
    },

    _pollStats: async function(){
      var el = document.getElementById('d-stats');
      if(!el) return;
      var summary = await API.get('/api/flock/summary');
      var clutches = await API.get('/api/clutches');
      var queue = await API.get('/api/processing/queue');

      var totalBirds = summary ? summary.total_birds : 0;
      var activeCl = 0;
      var nextHatchDays = '&mdash;';
      if(clutches){
        var now = new Date();
        var minDays = Infinity;
        clutches.forEach(function(c){
          if(c.status==='Incubating'){
            activeCl++;
            var hd = new Date(c.expected_hatch_date+'T00:00:00');
            var d = Math.max(0, Math.ceil((hd - now)/86400000));
            if(d < minDays) minDays = d;
          }
        });
        if(minDays < Infinity) nextHatchDays = minDays;
      }
      var pendingProc = queue ? queue.length : 0;

      el.innerHTML = '<div class="quick-stats">' +
        '<div class="qs-card"><div class="qs-num">'+totalBirds+'</div><div class="qs-label">Total Birds</div></div>' +
        '<div class="qs-card"><div class="qs-num">'+activeCl+'</div><div class="qs-label">Active Clutches</div></div>' +
        '<div class="qs-card"><div class="qs-num">'+pendingProc+'</div><div class="qs-label">Pending Processing</div></div>' +
        '<div class="qs-card"><div class="qs-num">'+nextHatchDays+'</div><div class="qs-label">Days to Next Hatch</div></div>' +
      '</div>';
    },

    _pollFlock: async function(){
      var el = document.getElementById('d-flock');
      if(!el) return;
      var bl = await API.get('/api/lineages');
      if(bl) _lineages = bl;
      var birds = await API.get('/api/birds');
      if(birds) _birds = birds; else _birds = [];
      if(_birds.length === 0){
        el.innerHTML = emptyState('&#x1F426;','No birds in your flock yet','+ Add Bird','Router.navigate(\'#/flock\')');
        return;
      }
      // Build stacked bar data
      var malesByBl = {};
      var femalesByBl = {};
      var totalM = 0, totalF = 0;
      // Bucket each bird by its primary (first) lineage. Birds with multiple
      // lineages count once toward the dashboard chart — the per-lineage
      // /api/flock/summary endpoint gives the multi-lineage breakdown.
      _birds.forEach(function(b){
        if(b.status !== 'Active') return;
        var blId = firstLineageId(b) || 0;
        if(b.sex === 'Male'){ malesByBl[blId] = (malesByBl[blId]||0) + 1; totalM++; }
        else if(b.sex === 'Female'){ femalesByBl[blId] = (femalesByBl[blId]||0) + 1; totalF++; }
      });

      // Get unique lineage IDs that have birds
      var blIds = [];
      var seen = {};
      _birds.forEach(function(b){
        var blId = firstLineageId(b);
        if(b.status==='Active' && blId != null && !seen[blId]){
          seen[blId] = true;
          blIds.push(blId);
        }
      });

      var html = '';
      // Males bar
      html += '<div class="bar-chart-row"><span class="bar-chart-label">Males</span><div class="bar-chart-track">';
      if(totalM > 0){
        blIds.forEach(function(blId, idx){
          var count = malesByBl[blId] || 0;
          if(count > 0){
            var pct = (count / totalM) * 100;
            html += '<div class="bar-chart-seg" style="width:'+pct.toFixed(1)+'%;background:'+lineageColor(idx)+'" title="'+lineageName(blId)+': '+count+'"></div>';
          }
        });
      }
      html += '</div><span class="bar-chart-count">'+totalM+'</span></div>';

      // Females bar
      html += '<div class="bar-chart-row"><span class="bar-chart-label">Females</span><div class="bar-chart-track">';
      if(totalF > 0){
        blIds.forEach(function(blId, idx){
          var count = femalesByBl[blId] || 0;
          if(count > 0){
            var pct = (count / totalF) * 100;
            html += '<div class="bar-chart-seg" style="width:'+pct.toFixed(1)+'%;background:'+lineageColor(idx)+'" title="'+lineageName(blId)+': '+count+'"></div>';
          }
        });
      }
      html += '</div><span class="bar-chart-count">'+totalF+'</span></div>';

      // Legend
      html += '<div class="bar-legend">';
      blIds.forEach(function(blId, idx){
        html += '<span class="bar-legend-item"><span class="bar-legend-dot" style="background:'+lineageColor(idx)+'"></span>'+lineageName(blId)+'</span>';
      });
      html += '</div>';

      // Summary line
      var active = _birds.filter(function(b){return b.status==='Active'}).length;
      html += '<div style="margin-top:.6rem;font-size:.78rem;color:#999">'+active+' active birds &middot; '+totalM+' males &middot; '+totalF+' females &middot; ratio 1:'+( totalM>0 ? (totalF/totalM).toFixed(1) : '0' )+'</div>';

      el.innerHTML = html;
    }
  };

  Page.Flock = {
    filter: 'all',
    lineageFilter: null,
    render: function(app){
      app.innerHTML =
        '<div class="page-top"><div class="page-title">&#x1F426; Flock</div><button class="btn-primary" onclick="Page.Flock.openModal()">+ Add Bird</button></div>' +
        '<div class="filter-bar" id="flock-filters"></div>' +
        '<div class="table-wrap"><table class="data-table"><thead><tr>' +
        '<th>ID</th><th>Band</th><th>Sex</th><th>Lineage</th><th>Hatch</th><th>Gen</th><th>Status</th><th>Parents</th>' +
        '</tr></thead><tbody id="flock-tbody"><tr><td colspan="8">'+loadingHTML()+'</td></tr></tbody></table></div>';
    },
    start: function(){
      this.filter = 'all';
      this.lineageFilter = null;
      this._load();
      addInterval(this._load.bind(this), 60000);
    },
    stop: function(){},
    _load: async function(){
      var bl = await API.get('/api/lineages');
      if(bl) _lineages = bl;
      var birds = await API.get('/api/birds');
      if(birds) _birds = birds;
      this._renderFilters();
      this._renderTable();
    },
    _renderFilters: function(){
      var el = document.getElementById('flock-filters');
      if(!el) return;
      var self = this;
      var filters = [
        {key:'all',label:'All'},
        {key:'active',label:'Active'},
        {key:'males',label:'Males'},
        {key:'females',label:'Females'}
      ];
      var html='';
      filters.forEach(function(f){
        var active = (self.filter===f.key && !self.lineageFilter)?'active':'';
        html+='<button class="filter-btn '+active+'" onclick="Page.Flock.applyFilter(\''+f.key+'\')">'+f.label+'</button>';
      });
      var seenBl = {};
      _lineages.forEach(function(bl){
        if(seenBl[bl.id]) return;
        seenBl[bl.id] = true;
        var active = (self.lineageFilter===bl.id)?'active':'';
        html+='<button class="filter-btn '+active+'" onclick="Page.Flock.applyLineageFilter('+bl.id+')">'+bl.name+'</button>';
      });
      el.innerHTML = html;
    },
    _renderTable: function(){
      var tbody = document.getElementById('flock-tbody');
      if(!tbody) return;
      var self = this;
      var filtered = _birds.filter(function(b){
        // Match birds with ANY lineage equal to the filter target — under
        // many-to-many a bird with [Fernbank, NWQuail] should appear under
        // both filters.
        if(self.lineageFilter) {
          return (b.lineages || []).some(function(l){ return l.id === self.lineageFilter; });
        }
        if(self.filter==='active') return b.status==='Active';
        if(self.filter==='males') return b.sex==='Male';
        if(self.filter==='females') return b.sex==='Female';
        return true;
      });

      if(filtered.length===0){
        tbody.innerHTML='<tr><td colspan="8">'+emptyState('&#x1F426;','No birds found','+ Add Bird','Page.Flock.openModal()')+'</td></tr>';
        return;
      }

      var html='';
      filtered.forEach(function(b){
        var blName = formatLineages(b.lineages);
        var bandHtml = b.band_color ? bandDot(b.band_color) : '&mdash;';
        var parents = '';
        if(b.mother_id || b.father_id){
          parents = (b.mother_id ? birdLink(b.mother_id,'M#'+b.mother_id) : '?') + ' / ' + (b.father_id ? birdLink(b.father_id,'F#'+b.father_id) : '?');
        } else { parents = '&mdash;'; }

        var statusCls = b.status.toLowerCase();
        var statusHtml = '<span class="status-badge '+statusCls+'">'+escapeHtml(b.status)+'</span>';

        html+='<tr onclick="Router.navigate(\'#/flock/bird/'+b.id+'\')" style="cursor:pointer"><td>'+birdLink(b.id)+'</td><td>'+bandHtml+'</td><td>'+escapeHtml(b.sex)+'</td><td>'+blName+'</td><td>'+escapeHtml(b.hatch_date)+'</td><td>'+b.generation+'</td><td>'+statusHtml+'</td><td>'+parents+'</td></tr>';
      });
      tbody.innerHTML = html;
    },
    applyFilter: function(key){
      this.filter = key;
      this.lineageFilter = null;
      this._renderFilters();
      this._renderTable();
    },
    applyLineageFilter: function(id){
      this.lineageFilter = (this.lineageFilter === id) ? null : id;
      this.filter = 'all';
      this._renderFilters();
      this._renderTable();
    },
    openModal: function(){
      var blOpts = '';
      _lineages.forEach(function(bl){
        blOpts+='<option value="'+bl.id+'">'+bl.name+'</option>';
      });
      var today = new Date().toISOString().split('T')[0];
      var html = '<div class="modal-overlay" id="bird-modal-overlay" onclick="if(event.target===this)Page.Flock.closeModal()">' +
        '<div class="modal"><h3>Add Bird</h3>' +
        '<label>Band Color</label><input id="m-band" type="text" placeholder="e.g. red, blue">' +
        '<label>Sex</label><select id="m-sex"><option value="Male">Male</option><option value="Female">Female</option><option value="Unknown">Unknown</option></select>' +
        '<label>Lineage</label><select id="m-lineage">'+blOpts+'</select>' +
        '<label>Hatch Date</label><input id="m-hatch" type="date" value="'+today+'">' +
        '<label>Mother ID (optional)</label><input id="m-mother" type="number" placeholder="Bird ID">' +
        '<label>Father ID (optional)</label><input id="m-father" type="number" placeholder="Bird ID">' +
        '<label>Generation</label><input id="m-gen" type="number" value="1" min="1">' +
        '<label>Notes</label><textarea id="m-notes" placeholder="Optional notes"></textarea>' +
        '<div class="modal-actions"><button class="btn-cancel" onclick="Page.Flock.closeModal()">Cancel</button><button class="btn-primary" onclick="Page.Flock.submitBird()">Add Bird</button></div>' +
        '</div></div>';
      document.body.insertAdjacentHTML('beforeend', html);
    },
    closeModal: function(){
      var ov = document.getElementById('bird-modal-overlay');
      if(ov) ov.remove();
    },
    submitBird: async function(){
      var band = document.getElementById('m-band').value.trim() || null;
      var sex = document.getElementById('m-sex').value;
      var lineage_id = parseInt(document.getElementById('m-lineage').value);
      var hatch_date = document.getElementById('m-hatch').value;
      var mother = document.getElementById('m-mother').value;
      var father = document.getElementById('m-father').value;
      var gen = parseInt(document.getElementById('m-gen').value) || 1;
      var notes = document.getElementById('m-notes').value.trim() || null;

      if(!lineage_id || !hatch_date){ toast('Lineage and hatch date are required','error'); return; }

      var result = await API.post('/api/birds', {
        band_color: band, sex: sex, lineage_id: lineage_id,
        hatch_date: hatch_date,
        mother_id: mother ? parseInt(mother) : null,
        father_id: father ? parseInt(father) : null,
        generation: gen, status: 'Active', notes: notes
      });
      this.closeModal();
      if(result){ toast('Bird #'+result.id+' added successfully'); }
      else { toast('Failed to add bird','error'); }
      this._load();
    }
  };

        html += '<div class="bird-profile-photo placeholder" title="No photos yet">&#x1F426;</div>';
      }
      html += '<div class="band-dot-lg" style="background:'+escapeHtml(bandColor)+'"></div>';
      html += '<div class="bird-profile-info">';
      html += '<h2>Bird #'+b.id+' <span class="status-badge '+statusCls+'">'+escapeHtml(b.status)+'</span></h2>';
      html += '<dl class="bird-meta-grid">';
      html += '<dt>Sex</dt><dd>'+b.sex+'</dd>';
      html += '<dt>Lineage</dt><dd>'+blName+'</dd>';
      html += '<dt>Band Color</dt><dd>'+(b.band_color || 'None')+'</dd>';
      html += '<dt>Generation</dt><dd>'+b.generation+'</dd>';
      html += '<dt>Hatch Date</dt><dd>'+b.hatch_date+'</dd>';
      html += '<dt>Mother</dt><dd>'+(b.mother_id ? birdLink(b.mother_id) : 'Unknown')+'</dd>';
      html += '<dt>Father</dt><dd>'+(b.father_id ? birdLink(b.father_id) : 'Unknown')+'</dd>';
      if(b.nfc_tag_id) html += '<dt>NFC Tag</dt><dd>'+escapeHtml(b.nfc_tag_id)+'</dd>';
      html += '</dl>';
      html += '</div></div>';

      // Two-column detail grid
      html += '<div class="bird-detail-grid">';

      // Weight chart
      html += '<div class="panel"><div class="panel-header"><span class="panel-header-left">&#x1F4C8; Weight History</span></div><div class="panel-body">';

        html += '<div class="weight-chart-wrap">' + this._buildWeightChart() + '</div>';
      } else {
        html += '<div class="no-data">No weight records yet</div>';
      }
      html += '</div></div>';

      // Growth metrics
      html += '<div class="panel"><div class="panel-header"><span class="panel-header-left">&#x1F4CA; Growth Metrics</span></div><div class="panel-body">';
      html += this._buildGrowthMetrics();
      html += '</div></div>';

      html += '</div>'; // end detail grid

      // Photos — only shown when the bird actually has photos.
      if(this._photos.length){
        html += '<div class="panel" style="margin-bottom:1.25rem"><div class="panel-header"><span class="panel-header-left">&#x1F4F8; Photos ('+this._photos.length+')</span></div><div class="panel-body">';
        html += '<div class="photo-grid">';
        this._photos.forEach(function(p){
          var dateLabel = Page.BirdDetail._formatPhotoDate(p.uploaded_at);
          html += '<figure class="photo-thumb" onclick="Page.BirdDetail.openLightbox(\''+escapeHtml(p.url)+'\')">'+
            '<img loading="lazy" src="'+escapeHtml(p.url)+'" alt="Photo from '+escapeHtml(dateLabel)+'">'+
            '<figcaption>'+escapeHtml(dateLabel)+'</figcaption>'+
            '</figure>';
        });
        html += '</div></div></div>';
      }

      // Notes
      html += '<div class="panel" style="margin-bottom:1.25rem"><div class="panel-header"><span class="panel-header-left">&#x1F4DD; Notes</span></div><div class="panel-body">';
      html += '<div class="bird-notes">'+escapeHtml(b.notes || 'No notes')+'</div>';
      html += '</div></div>';

      // Actions
      html += '<div class="bird-actions">';
      html += '<button class="btn-primary" onclick="Page.BirdDetail.openWeightModal()">Log Weight</button>';
      if(b.status === 'Active'){
        html += '<button class="btn-secondary" onclick="Page.BirdDetail.updateStatus(\'Culled\')">Mark Culled</button>';
        html += '<button class="btn-secondary" onclick="Page.BirdDetail.updateStatus(\'Deceased\')">Mark Deceased</button>';
        html += '<button class="btn-secondary" onclick="Page.BirdDetail.updateStatus(\'Sold\')">Mark Sold</button>';
        html += '<button class="btn-danger" onclick="Page.BirdDetail.scheduleProcessing()">Schedule Processing</button>';
      }
      html += '</div>';

      el.innerHTML = html;
    },

    _formatPhotoDate: function(iso){
      if(!iso) return '';
      var d = new Date(iso);
      if(isNaN(d.getTime())) return iso;
      return d.toLocaleString(undefined, {year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    },

    openLightbox: function(url){
      this.closeLightbox();
      var ov = document.createElement('div');
      ov.id = 'photo-lightbox';
      ov.className = 'photo-lightbox';
      ov.onclick = function(){ Page.BirdDetail.closeLightbox(); };
      // stopPropagation on the image so only backdrop/close clicks dismiss it.
      ov.innerHTML = '<button class="photo-lightbox-close" aria-label="Close">&times;</button>'+
        '<img src="'+escapeHtml(url)+'" alt="Bird photo" onclick="event.stopPropagation()">';

    closeLightbox: function(){

      if(ov) ov.remove();

        document.removeEventListener('keydown', this._lightboxKey);
