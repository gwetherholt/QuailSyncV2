[pytest]
# The tests import the pipeline modules by bare name (``import config``,
# ``import detector``, …). tests/conftest.py puts this package directory on
# sys.path so those resolve to the indoor-pipeline modules. No real camera,
# ultralytics, or network is ever touched — YOLO models and HTTP calls are faked.
markers =
    integration: exercises a real camera / model / backend end-to-end (slow)
