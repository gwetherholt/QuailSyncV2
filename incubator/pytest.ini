[pytest]
# The tests import the pipeline modules by bare name (``import config``,
# ``import roi``, …). tests/conftest.py puts this package directory on sys.path
# so those resolve to the incubator modules. No real camera / OpenCV GUI is ever
# touched; cv2 (headless) is only used for pure array ops (gray/blur/imwrite).
markers =
    integration: exercises a real camera or the on-disk DB end-to-end (slow)
