name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login quailsyncregistry.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t quailsyncregistry.azurecr.io/quailsync-server:latest -t quailsyncregistry.azurecr.io/quailsync-server:${{ github.sha }} .
          docker push quailsyncregistry.azurecr.io/quailsync-server:latest
          docker push quailsyncregistry.azurecr.io/quailsync-server:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-quailsync
          cluster-name: aks-quailsync

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/quailsync-server quailsync-server=quailsyncregistry.azurecr.io/quailsync-server:${{ github.sha }}
          kubectl rollout status deployment/quailsync-server --timeout=120s