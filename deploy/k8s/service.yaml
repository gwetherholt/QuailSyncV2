apiVersion: v1
kind: Service
metadata:
  name: quailsync-server
  annotations:
    service.beta.kubernetes.io/azure-dns-label-name: quailsync
spec:
  type: LoadBalancer
  selector:
    app: quailsync-server
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: api
      port: 3000
      targetPort: 3000
