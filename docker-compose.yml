services:
  server:
    build: .
    # Run as the host user (gwetherholt = UID 1000 / GID 1000) instead of root,
    # so files written into the ./data volume (uploaded bird photos, the SQLite
    # db, auto-backups, generated TLS certs) are owned by 1000:1000 — letting the
    # photo-backup prune step (which runs as gwetherholt) delete them. Confirm
    # the real UID:GID with `id gwetherholt` on the Pi and adjust if different.
    # NOTE: the ./data tree must be chown'd to 1000:1000 first or the server
    # can't open the db / write files. Ports 3000+3443 are unprivileged, so a
    # non-root process can still bind them.
    user: "1000:1000"
    network_mode: host
    volumes:
      - ./data:/data
      # Read-only access to the trail-cam pipeline's output (observations.jsonl
      # + per-camera JPEGs) so the server can surface the latest outdoor-cam
      # observation and serve images. The pipeline owns/writes these on the host.
      - /home/gwetherholt/trailcam/processed:/trailcam/processed:ro
    restart: always
    environment:
      - QUAILSYNC_ENV=prod
      # Where the server reads trail-cam output (matches the volume mount above).
      - TRAILCAM_PROCESSED_DIR=/trailcam/processed
      # Uncomment to enable DEV mode (exposes /api/dev/{status,seed,stress-seed,restore}).
      # When unset, those routes aren't registered — invisible to clients
      # (Android Settings → Developer Tools hides itself when /api/dev/status
      # returns 404). Never set this in a real deployment.
      # - DEV_MODE=true
      
  # sensors service removed — ESP32 wireless nodes now send data directly via WebSocket

  # Camera runs via systemd (quailsync-camera.service) — Docker containers cannot
  # reliably access Pi camera hardware. The libcamera/picamera2 stack requires direct
  # access to /dev/video*, DMA buffers, and GPU firmware that don't survive container
  # isolation even with --privileged and volume mounts. See deploy/quailsync-camera.service.

  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.listen-address=:9090"
    depends_on:
      - server
    restart: always

  grafana:
    image: grafana/grafana:latest
    network_mode: host
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=quailsync
      - GF_SERVER_HTTP_PORT=3001
    depends_on:
      - prometheus
    restart: always

volumes:
  prometheus_data:
  grafana_data:
