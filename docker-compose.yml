services:
  server:
    build: .
    network_mode: host
    volumes:
      - ./data:/data
    restart: always

  sensors:
    build:
      context: ./pi-agent
      dockerfile: Dockerfile.sensors
    network_mode: host
    privileged: true
    volumes:
      - /sys/bus/iio/devices:/sys/bus/iio/devices:ro
    depends_on:
      - server
    restart: always

  camera1:
    build:
      context: ./pi-agent
      dockerfile: Dockerfile.camera
    network_mode: host
    privileged: true
    volumes:
      - /run/udev:/run/udev:ro
    depends_on:
      - server
    command: >
      python3 camera_stream.py
      --server ws://localhost:3000/ws
      --brooder-id 1
      --camera-index 0
      --port 8080
    restart: always

  camera2:
    build:
      context: ./pi-agent
      dockerfile: Dockerfile.camera
    network_mode: host
    privileged: true
    volumes:
      - /run/udev:/run/udev:ro
    depends_on:
      - server
    command: >
      python3 camera_stream.py
      --server ws://localhost:3000/ws
      --brooder-id 2
      --camera-index 1
      --port 8081
    restart: always
